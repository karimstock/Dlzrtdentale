<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JADOMI — Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f0e0d;--surface:#1a1917;--surface2:#242220;--border:#2e2c29;--text:#f0ede8;--muted:#6b6760;--accent:#c8f060;--red:#f05050;--font:'DM Sans',sans-serif;--display:'Syne',sans-serif;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 32px;width:100%;max-width:440px;}
.logo{font-family:var(--display);font-size:28px;font-weight:800;color:var(--accent);letter-spacing:-1px;margin-bottom:4px;text-align:center;}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:24px;text-align:center;}
.step{display:none;}
.step.active{display:block;}
.professions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.prof-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;}
.prof-card:hover,.prof-card.selected{border-color:var(--accent);background:rgba(200,240,96,0.04);}
.prof-icon{font-size:32px;margin-bottom:6px;}
.prof-name{font-size:13px;font-weight:600;}
.field{margin-bottom:12px;}
.field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px;}
.field input{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--accent);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{width:100%;padding:14px;background:var(--accent);color:#0f0e0d;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.2s;margin-top:8px;}
.btn:hover{background:#8fb840;}
.btn-ghost{width:100%;padding:12px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;font-size:13px;cursor:pointer;font-family:var(--font);margin-top:6px;}
.error{background:rgba(240,80,80,0.1);border:1px solid rgba(240,80,80,0.3);border-radius:8px;padding:10px;font-size:12px;color:#f09090;margin-bottom:12px;display:none;}
.link{font-size:13px;color:var(--muted);margin-top:16px;text-align:center;}
.link a{color:var(--accent);font-weight:500;}
.success{text-align:center;padding:20px 0;}
.success-icon{font-size:48px;margin-bottom:12px;}
.success-title{font-family:var(--display);font-size:20px;font-weight:700;color:var(--accent);margin-bottom:6px;}
.success-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">JADOMI</div>
  <div class="subtitle" id="step-subtitle">Choisissez votre profession</div>
  <div class="error" id="error"></div>

  <!-- ÉTAPE 1 : Profession -->
  <div class="step active" id="step1">
    <div class="professions">
      <div class="prof-card" onclick="choisirProfession('chirurgien_dentiste',this)">
        <div class="prof-icon">🦷</div>
        <div class="prof-name">Chirurgien-Dentiste</div>
      </div>
      <div class="prof-card" onclick="choisirProfession('orthodontiste',this)">
        <div class="prof-icon">🦴</div>
        <div class="prof-name">Orthodontiste</div>
      </div>
      <div class="prof-card" onclick="choisirProfession('prothesiste',this)">
        <div class="prof-icon">🔧</div>
        <div class="prof-name">Prothesiste</div>
      </div>
      <div class="prof-card" onclick="choisirProfession('veterinaire',this)">
        <div class="prof-icon">🐾</div>
        <div class="prof-name">Veterinaire</div>
      </div>
    </div>
    <button class="btn" onclick="allerEtape2()" id="btn-step1" disabled style="opacity:0.5;">Continuer</button>
    <div class="link">Deja un compte ? <a href="login.html">Se connecter</a></div>
  </div>

  <!-- ÉTAPE 2 : Informations -->
  <div class="step" id="step2">
    <div class="row">
      <div class="field"><label>Prenom</label><input id="prenom" placeholder="Jean"></div>
      <div class="field"><label>Nom</label><input id="nom" placeholder="Martin"></div>
    </div>
    <div class="field"><label>Nom du cabinet</label><input id="cabinet" placeholder="Cabinet dentaire Martin"></div>
    <div class="field"><label>Ville</label><input id="ville" placeholder="Paris"></div>
    <div class="field"><label>Email professionnel</label><input type="email" id="email" placeholder="dr.martin@cabinet.fr"></div>
    <div class="field"><label>Mot de passe</label><input type="password" id="password" placeholder="Minimum 6 caracteres"></div>
    <button class="btn" onclick="inscrire()">Creer mon compte</button>
    <button class="btn-ghost" onclick="retourEtape1()">Retour</button>
  </div>

  <!-- ÉTAPE 3 : Succès -->
  <div class="step" id="step3">
    <div class="success">
      <div class="success-icon">🎉</div>
      <div class="success-title">Bienvenue dans JADOMI !</div>
      <div class="success-sub" id="welcome-msg">Votre espace est pret.</div>
      <button class="btn" onclick="window.location.href='index.html'">Acceder a JADOMI</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY='sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
let db;
try{const{createClient}=supabase;db=createClient(SUPABASE_URL,SUPABASE_KEY);}catch(e){}

let selectedProfession='';

function showError(msg){const el=document.getElementById('error');el.textContent=msg;el.style.display='block';}

function choisirProfession(prof,el){
  document.querySelectorAll('.prof-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedProfession=prof;
  const btn=document.getElementById('btn-step1');btn.disabled=false;btn.style.opacity='1';
}

function allerEtape2(){
  if(!selectedProfession){showError('Choisissez une profession');return;}
  document.getElementById('step1').classList.remove('active');
  document.getElementById('step2').classList.add('active');
  document.getElementById('step-subtitle').textContent='Vos informations';
  document.getElementById('error').style.display='none';
}

function retourEtape1(){
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  document.getElementById('step-subtitle').textContent='Choisissez votre profession';
}

async function inscrire(){
  const prenom=document.getElementById('prenom').value.trim();
  const nom=document.getElementById('nom').value.trim();
  const cabinet=document.getElementById('cabinet').value.trim();
  const ville=document.getElementById('ville').value.trim();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  if(!prenom||!nom||!email||!pass){showError('Remplissez tous les champs obligatoires');return;}
  if(pass.length<6){showError('Mot de passe : 6 caracteres minimum');return;}
  document.getElementById('error').style.display='none';

  try{
    const{data,error}=await db.auth.signUp({
      email,password:pass,
      options:{data:{nom:prenom+' '+nom,profession:selectedProfession,cabinet,ville}}
    });
    if(error) throw error;
    afficherSucces(prenom,nom);
  }catch(e){
    // Fallback localStorage
    const users=JSON.parse(localStorage.getItem('jadomi_users')||'[]');
    if(users.find(u=>u.email===email)){showError('Cet email est deja utilise');return;}
    const user={id:Date.now(),email,password:pass,nom:prenom+' '+nom,profession:selectedProfession,cabinet,ville,plan:'gratuit',created_at:new Date().toISOString()};
    users.push(user);
    localStorage.setItem('jadomi_users',JSON.stringify(users));
    localStorage.setItem('jadomi_session',JSON.stringify(user));
    afficherSucces(prenom,nom);
  }
}

function afficherSucces(prenom,nom){
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step3').classList.add('active');
  document.getElementById('step-subtitle').textContent='';
  document.getElementById('welcome-msg').textContent='Bienvenue Dr '+nom+' ! Votre espace JADOMI est pret.';
}
</script>
</body>
</html>
