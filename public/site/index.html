<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e" id="meta-theme">
  <title id="page-title">Chargement...</title>
  <meta name="description" id="meta-desc" content="">
  <link rel="canonical" id="meta-canonical" href="">
  <meta property="og:type" content="website">
  <meta property="og:title" id="og-title" content="">
  <meta property="og:description" id="og-desc" content="">
  <meta property="og:url" id="og-url" content="">
  <meta property="og:image" id="og-image" content="">
  <meta property="og:locale" content="fr_FR">
  <script id="json-ld" type="application/ld+json">{}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root{--site-primary:#1a1a2e;--site-secondary:#16213e;--site-accent:#c9a961;--site-text:#2a2a2a;--site-text-muted:#777;--site-bg:#faf8f5;--site-surface:#fff;--site-surface-alt:rgba(0,0,0,.03);--site-border:#e8e2d9;--site-header-bg:rgba(255,255,255,.97);--site-header-text:#2a2a2a;--site-hero-overlay-top:rgba(0,0,0,.25);--site-hero-overlay-bottom:rgba(0,0,0,.55);--site-btn-text:#fff;--site-card-heading:#1a1a2e;--site-font-heading:'Playfair Display',serif;--site-font-body:'DM Sans',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--site-font-body);font-size:17px;line-height:1.7;color:var(--site-text);background:var(--site-bg);cursor:default}
    a{color:var(--site-accent);text-decoration:none;transition:color .3s}
    h1,h2,h3,h4{font-family:var(--site-font-heading);font-weight:300;letter-spacing:-.01em;line-height:1.15}
    img{max-width:100%;display:block}

    /* ---- Loader ---- */
    .site-loader{position:fixed;inset:0;background:var(--site-primary);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
    .site-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .loader-initial{font-family:var(--site-font-heading);font-size:8rem;color:var(--site-accent);font-weight:300;animation:loaderPulse 1.5s ease-in-out infinite}
    @keyframes loaderPulse{0%,100%{opacity:.3;transform:scale(.95)}50%{opacity:1;transform:scale(1)}}

    /* ---- Cursor ---- */
    #cursor-dot{position:fixed;width:40px;height:40px;border:1.5px solid var(--site-accent);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s;mix-blend-mode:difference;opacity:.7}
    #cursor-dot.hover{width:70px;height:70px;opacity:1}
    @media(max-width:900px){#cursor-dot{display:none}}
    @media(hover:none){#cursor-dot{display:none}}

    /* ---- Header ---- */
    .site-header{position:sticky;top:0;z-index:100;background:var(--site-header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--site-border);transition:box-shadow .3s}
    .site-header.scrolled{box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .header-inner{max-width:1400px;margin:0 auto;padding:.8rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:2rem}
    .header-logo{display:flex;align-items:center;gap:.75rem;text-decoration:none;color:var(--site-header-text);font-family:var(--site-font-heading);font-size:1.2rem;font-weight:500}
    .header-logo img{height:36px}
    .header-nav{display:flex;gap:1.2rem;align-items:center;flex-wrap:nowrap}
    .header-nav a{color:var(--site-header-text);text-decoration:none;font-size:.85rem;font-weight:500;letter-spacing:.02em;padding:.4rem 0;position:relative;transition:color .3s;white-space:nowrap}
    .header-nav a:hover,.header-nav a.active{color:var(--site-accent)}
    .header-nav a.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1.5px;background:var(--site-accent)}
    .header-actions{display:flex;gap:1rem;align-items:center}
    .header-phone{color:var(--site-header-text);text-decoration:none;font-weight:600;font-size:.9rem}
    .header-cta{background:var(--site-accent);color:var(--site-btn-text);padding:.65rem 1.4rem;border-radius:6px;text-decoration:none;font-weight:600;font-size:.85rem;letter-spacing:.03em;transition:all .3s}
    .header-cta:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.15);color:var(--site-btn-text)}
    .header-burger{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--site-header-text)}
    *:focus-visible{outline:2px solid var(--site-accent);outline-offset:2px;border-radius:2px}
    @media(max-width:1200px){.header-nav{gap:.8rem}.header-nav a{font-size:.8rem}.header-logo{font-size:1.05rem}}
    @media(max-width:900px){.header-nav,.header-actions{display:none}.header-burger{display:block}.site-header.menu-open .header-nav{display:flex;flex-direction:column;position:absolute;top:100%;left:0;right:0;background:var(--site-header-bg);backdrop-filter:blur(12px);padding:1.5rem 2rem;gap:1rem;box-shadow:0 8px 30px rgba(0,0,0,.12);z-index:99}}

    /* ---- Hero Cinema ---- */
    .hero-cinema{position:relative;height:100vh;min-height:600px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#fff}
    .hero-vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;filter:brightness(.55) saturate(1.1)}
    .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.55) saturate(1.1);animation:heroZoom 25s ease-out infinite alternate}
    @keyframes heroZoom{from{transform:scale(1)}to{transform:scale(1.08)}}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,var(--site-hero-overlay-top) 0%,rgba(0,0,0,.05) 40%,var(--site-hero-overlay-bottom) 100%)}
    .hero-content{position:relative;z-index:2;text-align:center;max-width:900px;padding:0 2rem}
    .hero-eyebrow{font-size:.82rem;letter-spacing:.3em;text-transform:uppercase;color:var(--site-accent);margin-bottom:2rem;font-weight:500;opacity:0;animation:fadeUp .8s .3s forwards}
    .hero-title{font-size:clamp(3rem,9vw,8rem);font-weight:300;line-height:.95;letter-spacing:-.03em;margin-bottom:2rem}
    .hero-title .wr{display:inline-block;opacity:0;transform:translateY(50px);animation:wordUp 1s cubic-bezier(.16,1,.3,1) forwards}
    .hero-title .wr:nth-child(2){animation-delay:.15s}
    .hero-title .wr:nth-child(3){animation-delay:.3s}
    @keyframes wordUp{to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
    .hero-subtitle{font-size:clamp(1rem,2vw,1.3rem);font-weight:300;opacity:0;max-width:600px;margin:0 auto 3rem;line-height:1.6;animation:fadeUp 1s .6s forwards;transform:translateY(20px)}
    .hero-ctas{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp 1s .8s forwards;transform:translateY(20px)}
    .btn-c{padding:1rem 2.5rem;font-size:.88rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;transition:all .4s cubic-bezier(.16,1,.3,1);text-decoration:none;display:inline-block}
    .btn-c.primary{background:var(--site-accent);color:var(--site-btn-text);border:1px solid var(--site-accent)}
    .btn-c.primary:hover{background:transparent;color:var(--site-accent);transform:translateY(-2px)}
    .btn-c.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4)}
    .btn-c.ghost:hover{background:rgba(255,255,255,.9);color:var(--site-primary);transform:translateY(-2px)}
    .hero-scroll{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;animation:scrollBob 2s ease-in-out infinite}
    @keyframes scrollBob{0%,100%{transform:translate(-50%,0);opacity:.5}50%{transform:translate(-50%,8px);opacity:1}}

    /* ---- Reveal ---- */
    [data-r]{opacity:0;transform:translateY(35px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1)}
    [data-r].vis{opacity:1;transform:none}
    [data-r="1"]{transition-delay:.1s}[data-r="2"]{transition-delay:.2s}[data-r="3"]{transition-delay:.3s}[data-r="4"]{transition-delay:.4s}

    /* ---- Sections ---- */
    .sec{padding:5rem 2rem}
    .sec-alt{background:var(--site-surface-alt,var(--site-surface))}
    .sec-inner{max-width:1200px;margin:0 auto}
    .sec h2{font-size:clamp(2.2rem,4.5vw,3.8rem);margin-bottom:1rem;text-align:center}
    .sec h2::after{content:'';display:block;width:45px;height:1.5px;background:var(--site-accent);margin:1.2rem auto 0}
    .sec-desc{max-width:700px;margin:-0.5rem auto 4rem;text-align:center;font-size:1.05rem;color:var(--site-text-muted);line-height:1.85}

    /* ---- Page Hero (sub) ---- */
    .page-hero-c{padding:6rem 2rem 4rem;text-align:center;background:var(--site-primary);color:#fff;position:relative}
    .page-hero-c .page-eyebrow{font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;color:var(--site-accent);margin-bottom:1rem}
    .page-hero-c h1{font-size:clamp(2.5rem,5vw,4.5rem);font-weight:300;margin-bottom:1rem}
    .page-hero-c p{color:rgba(255,255,255,.7);max-width:600px;margin:0 auto;font-size:1.05rem}

    /* ---- Cards ---- */
    .items-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2rem;margin-top:3rem}
    .item-card{background:var(--site-surface);border:1px solid var(--site-border);padding:2.5rem 2rem;text-align:center;transition:all .5s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
    .item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--site-accent);transform:scaleX(0);transform-origin:left;transition:transform .5s cubic-bezier(.16,1,.3,1)}
    .item-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.06)}
    .item-card:hover::before{transform:scaleX(1)}
    .item-card h3{font-family:var(--site-font-heading);font-size:1.5rem;margin-bottom:.75rem;color:var(--site-card-heading);font-weight:400}
    .item-card p{color:var(--site-text-muted);line-height:1.7;font-size:.95rem}
    .item-card .item-img{margin:-2.5rem -2rem 2rem;width:calc(100% + 4rem);aspect-ratio:4/3;object-fit:cover}

    /* ---- Gallery ---- */
    .media-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;margin-top:3rem}
    .media-gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:4px;box-shadow:0 8px 30px rgba(0,0,0,.08);transition:transform .6s cubic-bezier(.16,1,.3,1),box-shadow .6s;cursor:pointer}
    .media-gallery img:hover{transform:scale(1.03);box-shadow:0 16px 50px rgba(0,0,0,.15)}

    /* ---- Narrative (cabinet page) ---- */
    .narrative-block{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;max-width:1300px;margin:6rem auto;padding:0 2rem}
    .narrative-block.rev{direction:rtl}.narrative-block.rev>*{direction:ltr}
    .narrative-block img{width:100%;aspect-ratio:4/5;object-fit:cover;filter:grayscale(.15);transition:filter .6s}
    .narrative-block img:hover{filter:grayscale(0)}
    .narrative-num{font-family:var(--site-font-heading);font-size:5rem;color:var(--site-accent);opacity:.25;line-height:.8;margin-bottom:1rem;font-weight:300}
    .narrative-block h2{text-align:left;font-size:clamp(2rem,4vw,3rem);margin-bottom:1.5rem}.narrative-block h2::after{margin:1rem 0 0}
    .narrative-block p{font-size:1.05rem;line-height:1.9;color:var(--site-text)}
    @media(max-width:900px){.narrative-block{grid-template-columns:1fr;gap:2rem}.narrative-block.rev{direction:ltr}}

    /* ---- Team ---- */
    .team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem;max-width:1300px;margin:0 auto;padding:0 2rem}
    .team-portrait{position:relative;aspect-ratio:3/4;overflow:hidden;cursor:pointer}
    .team-portrait img{width:100%;height:100%;object-fit:cover;filter:grayscale(1);transition:filter .8s,transform .8s}
    .team-portrait:hover img{filter:grayscale(0);transform:scale(1.04)}
    .team-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.85) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:2rem;color:#fff;transform:translateY(calc(100% - 70px));transition:transform .6s cubic-bezier(.16,1,.3,1)}
    .team-portrait:hover .team-overlay{transform:translateY(0)}
    .team-overlay h3{font-size:1.6rem;margin-bottom:.2rem;font-weight:400}
    .team-role{color:var(--site-accent);font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.75rem}

    /* ---- Quote ---- */
    /* ---- Presentation video ---- */
    .pres-vid-wrap{max-width:900px;margin:0 auto;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);aspect-ratio:16/9;background:#000}
    .pres-vid-wrap video{width:100%;height:100%;display:block}
    .vid-caption{text-align:center;margin-top:1.5rem;color:var(--site-text-muted);font-style:italic;font-size:1.05rem}

    .sec-quote{padding:6rem 2rem;background:var(--site-primary);color:#fff;text-align:center;position:relative}
    .sec-quote::before{content:'';position:absolute;left:50%;top:3rem;width:50px;height:1px;background:var(--site-accent);transform:translateX(-50%)}
    .quote-mark{font-family:var(--site-font-heading);font-size:8rem;color:var(--site-accent);line-height:.4;opacity:.35;margin-bottom:1rem}
    .quote-text{font-family:var(--site-font-heading);font-size:clamp(1.6rem,3vw,2.6rem);font-weight:300;font-style:italic;line-height:1.45;max-width:800px;margin:0 auto 3rem}
    .quote-author-name{color:var(--site-accent);font-weight:600;font-size:.88rem;letter-spacing:.15em;text-transform:uppercase}
    .quote-author-title{color:rgba(255,255,255,.5);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;margin-top:.3rem}

    /* ---- Numbers ---- */
    .sec-numbers{padding:5rem 2rem}
    .numbers-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:2rem;text-align:center}
    .num-val{font-family:var(--site-font-heading);font-size:clamp(3rem,6vw,5rem);color:var(--site-accent);font-weight:300;line-height:1;margin-bottom:.5rem}
    .num-lbl{font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;color:var(--site-text-muted)}
    @media(max-width:900px){.numbers-grid{grid-template-columns:repeat(2,1fr)}}

    /* ---- Divider ---- */
    .sec-div{max-width:60px;height:1px;background:var(--site-accent);margin:0 auto}

    /* ---- Contact ---- */
    .contact-layout{max-width:1200px;margin:3rem auto;padding:0 2rem;display:grid;grid-template-columns:1fr 1.5fr;gap:3rem}
    .contact-block{margin-bottom:2rem}.contact-block h3{color:var(--site-accent);margin-bottom:.5rem;font-size:1rem;font-weight:500}
    .contact-form-wrapper{max-width:800px;margin:4rem auto;padding:0 2rem}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
    .form-field{display:flex;flex-direction:column}
    .form-field label{margin-bottom:.5rem;font-weight:500;font-size:.9rem}
    .form-field input,.form-field select,.form-field textarea{padding:.75rem 1rem;border:1px solid var(--site-border);border-radius:6px;font-family:inherit;font-size:1rem;background:var(--site-surface);color:var(--site-text);transition:border-color .3s}
    .form-field input:focus,.form-field textarea:focus{outline:none;border-color:var(--site-accent)}
    .checkbox-field{flex-direction:row;align-items:flex-start;gap:.75rem;margin-bottom:1.5rem}
    .checkbox-field input{margin-top:.3rem}.checkbox-field label{font-size:.85rem;font-weight:400}
    .btn-primary{background:var(--site-accent);color:var(--site-btn-text);padding:.9rem 2rem;border:none;border-radius:6px;font-size:1rem;font-weight:600;cursor:pointer;letter-spacing:.03em;transition:all .3s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
    .rgpd-notice{font-size:.85rem;color:var(--site-text-muted);font-style:italic;margin-bottom:1.5rem;padding:.75rem 1rem;border-left:2px solid var(--site-accent);background:var(--site-surface)}
    @media(max-width:900px){.contact-layout{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}

    /* ---- Legal ---- */
    .legal-page{max-width:800px;margin:0 auto;padding:3rem 2rem}
    .legal-page h1{font-size:1.8rem;margin-bottom:2rem}
    .legal-page h2{font-size:1.2rem;margin:2rem 0 1rem;color:var(--site-accent)}
    .legal-page p,.legal-page li{margin-bottom:.75rem;line-height:1.8}
    .legal-page ul{padding-left:1.5rem}

    /* ---- Footer ---- */
    .site-footer{background:var(--site-footer-bg,var(--site-primary));color:var(--site-footer-text,rgba(255,255,255,.85));padding:5rem 2rem 1rem;margin-top:0}
    .footer-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:3rem}
    .footer-col h4{color:var(--site-accent);font-family:var(--site-font-heading);margin-bottom:1rem;font-size:1rem;font-weight:400}
    .footer-col p,.footer-col a{color:var(--site-footer-text,rgba(255,255,255,.65));text-decoration:none;line-height:1.9;font-size:.9rem;opacity:.75}
    .footer-col a:hover{color:var(--site-accent);opacity:1}
    .footer-col ul{list-style:none;padding:0}.footer-col ul li{margin-bottom:.4rem}
    .footer-social{display:flex;gap:1rem;margin-top:1rem}
    .footer-bottom{max-width:1400px;margin:3rem auto 0;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;font-size:.82rem;color:var(--site-footer-text,rgba(255,255,255,.4));opacity:.6;padding-bottom:1rem}
    .footer-credits a{color:var(--site-accent);text-decoration:none}
    @media(max-width:900px){.footer-inner{grid-template-columns:1fr 1fr;gap:2rem}.footer-bottom{flex-direction:column;gap:.5rem;text-align:center}}
    @media(max-width:600px){.footer-inner{grid-template-columns:1fr}}

    /* ---- Mobile comprehensive ---- */
    @media(max-width:768px){
      .hero-cinema{height:85vh;min-height:500px}
      .hero-title{font-size:clamp(2.2rem,10vw,4rem)!important;letter-spacing:-.02em}
      .hero-subtitle{font-size:1rem}
      .hero-ctas{flex-direction:column;width:100%;max-width:300px;margin:0 auto}
      .btn-c{width:100%;text-align:center;padding:.9rem 1.5rem}
      .hero-scroll{display:none}
      .sec{padding:3rem 1.25rem!important}
      .sec h2{font-size:clamp(1.6rem,6vw,2.5rem)!important;margin-bottom:1.5rem}
      .sec-desc{margin-bottom:2.5rem;font-size:1rem}
      .items-grid{grid-template-columns:1fr!important;gap:1.25rem}
      .item-card{padding:1.5rem 1.25rem}
      .item-card .item-img{margin:-1.5rem -1.25rem 1.25rem;width:calc(100% + 2.5rem)}
      .media-gallery{grid-template-columns:1fr!important;gap:1rem}
      .narrative-block,.narrative-block.rev{grid-template-columns:1fr!important;gap:1.5rem;margin:3rem auto;direction:ltr!important}
      .narrative-block>*{direction:ltr!important}
      .narrative-num{font-size:3.5rem}
      .narrative-block h2{font-size:2rem!important}
      .narrative-block img{aspect-ratio:4/3}
      .team-grid{grid-template-columns:1fr!important}
      .team-portrait{max-width:100%}
      .numbers-grid{grid-template-columns:1fr 1fr!important;gap:1.5rem}
      .num-val{font-size:clamp(2.5rem,8vw,4rem)}
      .sec-quote{padding:5rem 1.25rem}
      .quote-mark{font-size:5rem}
      .quote-text{font-size:clamp(1.2rem,4vw,1.8rem)}
      .contact-layout{grid-template-columns:1fr!important;gap:2rem;padding:0 1.25rem}
      .contact-form-wrapper{padding:0 1.25rem}
      .form-row{grid-template-columns:1fr!important}
      .page-hero-c{padding:3rem 1.25rem 2rem}
      .page-hero-c h1{font-size:clamp(2rem,7vw,3.5rem)}
      .legal-page{padding:2rem 1.25rem}
      .footer-inner{grid-template-columns:1fr!important;gap:1.5rem}
      .footer-bottom{flex-direction:column;gap:.5rem;text-align:center}
      .header-inner{padding:.7rem 1rem}
      #cursor-dot{display:none!important}
    }
    @media(max-width:480px){
      .hero-title{font-size:2rem!important}
      .numbers-grid{grid-template-columns:1fr!important}
      .sec{padding:2.5rem 1rem!important}
    }

    #loading{text-align:center;padding:20vh 2rem;font-size:1.1rem;color:var(--site-text-muted)}
  </style>
</head>
<body>
  <div class="site-loader" id="loader"><span class="loader-initial" id="loader-letter">J</span></div>
  <div id="cursor-dot"></div>
  <div id="loading" style="display:none">Chargement du site...</div>
  <header class="site-header" id="header" style="display:none"></header>
  <main id="main-content" style="display:none"></main>
  <footer class="site-footer" id="footer" style="display:none"></footer>

  <script>
    // ================================================================
    // CONFIG
    // ================================================================
    var PALETTES = {
      ivory_gold:{primary:'#1a1a2e',secondary:'#16213e',accent:'#c9a961',text:'#2a2a2a',textMuted:'#777',bg:'#faf8f5',surface:'#fff',border:'#e8e2d9'},
      noir_ivoire:{primary:'#1a1a1a',secondary:'#2a2a2a',accent:'#c9a961',text:'#2a2a2a',textMuted:'#777',bg:'#faf8f5',surface:'#fff',border:'#e0dcd5'},
      slate_blue:{primary:'#0f172a',secondary:'#1e293b',accent:'#3b82f6',text:'#1e293b',textMuted:'#64748b',bg:'#f8fafc',surface:'#fff',border:'#e2e8f0'},
      forest_green:{primary:'#14281d',secondary:'#1a3a2a',accent:'#6ab04c',text:'#1a3a2a',textMuted:'#5a7a5a',bg:'#f5faf5',surface:'#fff',border:'#d5e8d5'},
      warm_terracotta:{primary:'#2d1810',secondary:'#3d2418',accent:'#c76f30',text:'#3d2418',textMuted:'#8a6a5a',bg:'#fdf8f5',surface:'#fff',border:'#e8d8c8'},
      midnight_purple:{primary:'#1a0a2e',secondary:'#2d1654',accent:'#8b5cf6',text:'#2d1654',textMuted:'#7a6a90',bg:'#faf8ff',surface:'#fff',border:'#e0d8f0'},
      ocean_teal:{primary:'#0a1a2e',secondary:'#103040',accent:'#14b8a6',text:'#103040',textMuted:'#5a7a7a',bg:'#f5fafa',surface:'#fff',border:'#d0e8e0'}
    };
    var TYPOGRAPHIES = {
      editorial:{heading:"'Playfair Display',serif",body:"'DM Sans',sans-serif"},
      modern:{heading:"'Syne',sans-serif",body:"'Inter',sans-serif"},
      classic:{heading:"'Lora',serif",body:"'Inter',sans-serif"},
      minimal:{heading:"'DM Sans',sans-serif",body:"'DM Sans',sans-serif"}
    };
    // Mapping EXCLUSIF : chaque category dans UNE SEULE section (zero doublons)
    var SECTION_MEDIA_MAP = {
      hero:['accueil','facade','hero','vitrine','vitrine_salon','facade_agence'],
      cabinet:['cabinet','interieur_boutique','salle_principale','espace_coiffage','cabine_soin','bureau_prive','bureau_notarial','salle_reunion','salle_attente','salle_consultation','cabine_individuelle'],
      technologies:['plateau_technique','equipement','equipement_medical','equipement_specialise','machines_cfao','outils_digitaux','balneotherapie','materiel_location'],
      made_in_france:['couronnes_finies','bridges','etapes_conception','pieces_signatures','pieces_finies','detail_couture'],
      cas_cliniques:['cas_clinique','cas_en_bouche','realisations_avant_apres','bouquets_signatures','plats_signatures','buffets_realises','interventions_realisees','installations_salle_bain','realisations'],
      expertises:['salle_soin','salle_examen'],
      equipe:['equipe','portrait_praticien','portrait','portrait_artisan','portrait_chef','equipe_brigade','equipe_artisans'],
      process:['atelier','atelier_composition','atelier_creation','atelier_conception','atelier_maquettes','etabli_outils','laboratoire'],
      sterilisation:['sterilisation'],
      bibliotheque:['bibliotheque','bibliotheque_juridique','bibliotheque_materiaux'],
      realisations_ext:['evenementiel','chantier_en_cours']
    };
    // Video category mapping (separate, videos not in photo dedup)
    var VIDEO_MAP = {
      hero:['hero_cabinet','hero_ambiance','video_presentation'],
      presentation:['presentation_praticien','presentation_maitre','process_video']
    };
    // Validation: aucun doublon entre photo sections
    var _allCats=[];Object.keys(SECTION_MEDIA_MAP).forEach(function(k){SECTION_MEDIA_MAP[k].forEach(function(c){if(_allCats.indexOf(c)>=0)console.error('DOUBLON mapping:',c);_allCats.push(c)})});
    var NAV_MENUS = {
      sante:[{l:'Accueil',p:''},{l:'Le cabinet',p:'/cabinet'},{l:'L\'équipe',p:'/equipe'},{l:'Traitements',p:'/traitements'},{l:'Technologies',p:'/technologies'},{l:'Cas cliniques',p:'/cas-cliniques'},{l:'Contact',p:'/contact'}],
      liberale:[{l:'Accueil',p:''},{l:'Le cabinet',p:'/cabinet'},{l:'L\'équipe',p:'/equipe'},{l:'Domaines',p:'/traitements'},{l:'Actualités',p:'/blog'},{l:'Contact',p:'/contact'}],
      beaute:[{l:'Accueil',p:''},{l:'Le salon',p:'/cabinet'},{l:'Prestations',p:'/traitements'},{l:'L\'équipe',p:'/equipe'},{l:'Réalisations',p:'/cas-cliniques'},{l:'Contact',p:'/contact'}],
      commerce:[{l:'Accueil',p:''},{l:'La boutique',p:'/cabinet'},{l:'Notre sélection',p:'/traitements'},{l:'L\'équipe',p:'/equipe'},{l:'Contact',p:'/contact'}],
      restauration:[{l:'Accueil',p:''},{l:'Notre maison',p:'/cabinet'},{l:'Notre carte',p:'/traitements'},{l:'Le chef',p:'/equipe'},{l:'Réserver',p:'/contact'}],
      artisan:[{l:'Accueil',p:''},{l:'L\'atelier',p:'/cabinet'},{l:'Nos services',p:'/traitements'},{l:'Réalisations',p:'/cas-cliniques'},{l:'Contact',p:'/contact'}]
    };

    // ================================================================
    // HELPERS
    // ================================================================
    function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    function gm(type,medias){var cats=SECTION_MEDIA_MAP[type]||[];var seen={};return(medias||[]).filter(function(m){if(cats.indexOf(m.category)<0||m.media_type==='video')return false;if(seen[m.id])return false;seen[m.id]=true;return true})}
    function gv(type,medias){var cats=VIDEO_MAP[type]||[];return(medias||[]).filter(function(m){return cats.indexOf(m.category)>=0&&m.media_type==='video'})}
    function gal(imgs){if(!imgs.length)return'';return'<div class="media-gallery">'+imgs.map(function(m){return'<img src="'+m.url+'" alt="'+esc(m.alt_text||'')+'" loading="lazy" data-r>'}).join('')+'</div>'}
    // Relative luminance (0=black, 1=white) — WCAG formula
    function hexLum(hex){
      hex=hex.replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
      var r=parseInt(hex.substr(0,2),16)/255,g=parseInt(hex.substr(2,2),16)/255,b=parseInt(hex.substr(4,2),16)/255;
      r=r<=.03928?r/12.92:Math.pow((r+.055)/1.055,2.4);
      g=g<=.03928?g/12.92:Math.pow((g+.055)/1.055,2.4);
      b=b<=.03928?b/12.92:Math.pow((b+.055)/1.055,2.4);
      return .2126*r+.7152*g+.0722*b;
    }
    // Mix two hex colors by ratio (0=a, 1=b)
    function hexMix(a,b,t){
      a=a.replace('#','');b=b.replace('#','');if(a.length===3)a=a[0]+a[0]+a[1]+a[1]+a[2]+a[2];if(b.length===3)b=b[0]+b[0]+b[1]+b[1]+b[2]+b[2];
      var r=Math.round(parseInt(a.substr(0,2),16)*(1-t)+parseInt(b.substr(0,2),16)*t);
      var g=Math.round(parseInt(a.substr(2,2),16)*(1-t)+parseInt(b.substr(2,2),16)*t);
      var bl=Math.round(parseInt(a.substr(4,2),16)*(1-t)+parseInt(b.substr(4,2),16)*t);
      return'#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
    }

    function applyTheme(pal,typo,themeObj){
      var r=document.documentElement.style;
      var isDark=false;

      if(themeObj&&themeObj.color_primary){
        // -- DB theme object --
        var bg=themeObj.color_background||'#faf8f5';
        var surface=themeObj.color_surface||'#ffffff';
        var text=themeObj.color_text||'#1a1a1a';
        var textMuted=themeObj.color_text_muted||'#777';
        var accent=themeObj.color_primary;
        var accentDark=themeObj.color_primary_dark||accent;
        var secondary=themeObj.color_secondary||accent;
        var border=themeObj.color_border||'#e8e2d9';
        var footerBg=themeObj.color_footer_bg||'#1a1a2e';
        var footerText=themeObj.color_footer_text||'rgba(255,255,255,.85)';

        isDark=hexLum(bg)<.4;

        // Core palette
        r.setProperty('--site-primary',footerBg);
        r.setProperty('--site-secondary',secondary);
        r.setProperty('--site-accent',accent);
        r.setProperty('--site-text',text);
        r.setProperty('--site-text-muted',textMuted);
        r.setProperty('--site-bg',bg);
        r.setProperty('--site-surface',surface);
        r.setProperty('--site-border',border);
        r.setProperty('--site-footer-bg',footerBg);
        r.setProperty('--site-footer-text',footerText);

        // Header: on dark themes use surface (dark) bg with text readable on it
        if(isDark){
          r.setProperty('--site-header-bg',surface+'e6');
          r.setProperty('--site-header-text',text);
        } else {
          r.setProperty('--site-header-bg','rgba(255,255,255,.97)');
          r.setProperty('--site-header-text',text);
        }

        // Hero overlay: stronger on dark themes so white text stays readable
        if(isDark){
          r.setProperty('--site-hero-overlay-top','rgba(0,0,0,.45)');
          r.setProperty('--site-hero-overlay-bottom','rgba(0,0,0,.7)');
        } else {
          r.setProperty('--site-hero-overlay-top','rgba(0,0,0,.25)');
          r.setProperty('--site-hero-overlay-bottom','rgba(0,0,0,.55)');
        }

        // Section alternation: slight shift from bg toward surface (or vice versa)
        if(isDark){
          r.setProperty('--site-surface-alt',hexMix(bg,surface,.5));
        } else {
          r.setProperty('--site-surface-alt',surface);
        }

        // Card heading: accent on dark themes (visible), dark primary on light themes
        r.setProperty('--site-card-heading',isDark?accent:footerBg);

        // Button text: pick white or dark depending on accent luminance
        r.setProperty('--site-btn-text',hexLum(accent)>.35?'#1a1a1a':'#ffffff');

        // Fonts
        if(themeObj.font_heading){
          var fh="'"+themeObj.font_heading+"'"+(['Inter','DM Sans','Syne'].indexOf(themeObj.font_heading)>=0?',sans-serif':',serif');
          r.setProperty('--site-font-heading',fh);
        }
        if(themeObj.font_body){
          r.setProperty('--site-font-body',"'"+themeObj.font_body+"',sans-serif");
        }

        // Theme-color meta
        var tc=document.getElementById('meta-theme');if(tc)tc.content=footerBg;
        // Mark mode on html element
        document.documentElement.dataset.themeMode=isDark?'dark':'light';
        return;
      }

      // -- Legacy palette fallback --
      var p=PALETTES[pal]||PALETTES.ivory_gold,t=TYPOGRAPHIES[typo]||TYPOGRAPHIES.editorial;
      r.setProperty('--site-primary',p.primary);r.setProperty('--site-secondary',p.secondary);r.setProperty('--site-accent',p.accent);
      r.setProperty('--site-text',p.text);r.setProperty('--site-text-muted',p.textMuted);r.setProperty('--site-bg',p.bg);
      r.setProperty('--site-surface',p.surface);r.setProperty('--site-border',p.border);
      r.setProperty('--site-font-heading',t.heading);r.setProperty('--site-font-body',t.body);
      // Legacy themes are all light
      r.setProperty('--site-header-bg','rgba(255,255,255,.97)');
      r.setProperty('--site-header-text',p.text);
      r.setProperty('--site-hero-overlay-top','rgba(0,0,0,.25)');
      r.setProperty('--site-hero-overlay-bottom','rgba(0,0,0,.55)');
      r.setProperty('--site-surface-alt',p.surface);
      r.setProperty('--site-card-heading',p.primary);
      r.setProperty('--site-btn-text',hexLum(p.accent)>.45?'#1a1a1a':'#ffffff');
      document.documentElement.dataset.themeMode='light';
    }
    // Read ?theme= query parameter for live preview
    function getQueryParam(name){var m=window.location.search.match(new RegExp('[?&]'+name+'=([^&]+)'));return m?decodeURIComponent(m[1]):null}

    // ================================================================
    // SCROLL REVEAL + COUNTER
    // ================================================================
    var revealObs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('vis');revealObs.unobserve(e.target)}})},{threshold:.12});
    function setupReveals(){document.querySelectorAll('[data-r]').forEach(function(el){revealObs.observe(el)})}
    function animCounter(el){var t=parseInt(el.dataset.target)||0,dur=2000,start=performance.now();(function tick(now){var p=Math.min((now-start)/dur,1);el.textContent=Math.floor(t*(1-Math.pow(1-p,3)));if(p<1)requestAnimationFrame(tick)})(start)}
    var counterObs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){animCounter(e.target);counterObs.unobserve(e.target)}})},{threshold:.5});

    // ================================================================
    // CURSOR
    // ================================================================
    var cursorEl=document.getElementById('cursor-dot');
    document.addEventListener('mousemove',function(e){cursorEl.style.left=e.clientX+'px';cursorEl.style.top=e.clientY+'px'});
    function setupCursor(){document.querySelectorAll('a,button,.item-card,.team-portrait').forEach(function(el){el.addEventListener('mouseenter',function(){cursorEl.classList.add('hover')});el.addEventListener('mouseleave',function(){cursorEl.classList.remove('hover')})})}

    // ================================================================
    // HEADER + FOOTER
    // ================================================================
    window.addEventListener('scroll',function(){document.querySelector('.site-header').classList.toggle('scrolled',window.scrollY>50)});
    function renderHeader(site,path){
      var base='/site/'+site.slug,cat=site.metier_category||'sante',links=NAV_MENUS[cat]||NAV_MENUS.sante;
      var phone=site.telephone||site.societe_telephone||'',nom=site.societe_nom||'';
      return'<div class="header-inner"><a href="'+base+'" class="header-logo">'+(site.logo_url?'<img src="'+site.logo_url+'" alt="'+esc(nom)+'">':'')+'<span>'+esc(nom)+'</span></a><nav class="header-nav">'+links.map(function(lk){var h=base+lk.p;return'<a href="'+h+'"'+(path===h||(!lk.p&&(path===base||path===base+'/'))?' class="active"':'')+'>'+esc(lk.l)+'</a>'}).join('')+'</nav><div class="header-actions">'+(phone?'<a href="tel:'+phone+'" class="header-phone">'+esc(phone)+'</a>':'')+'<a href="'+base+'/contact" class="header-cta">Prendre rendez-vous</a></div><button class="header-burger" onclick="toggleMenu()" aria-label="Menu navigation">&#9776;</button></div>'
    }
    function toggleMenu(){document.querySelector('.site-header').classList.toggle('menu-open')}
    function renderFooter(site){
      var base='/site/'+site.slug,cat=site.metier_category||'sante',links=NAV_MENUS[cat]||NAV_MENUS.sante,nom=site.societe_nom||'',ville=site.societe_ville||'';
      var hasContact=!!(site.adresse||ville||site.telephone||site.societe_telephone||site.email||site.societe_email);
      return'<div class="footer-inner"><div class="footer-col"><h4>'+esc(nom)+'</h4><p>'+esc(site.footer_pitch||('Votre professionnel de confiance'+(ville?' a '+ville:'')))+'</p><div class="footer-social">'+(site.social_instagram?'<a href="'+site.social_instagram+'" target="_blank" aria-label="Instagram">Instagram</a>':'')+(site.social_facebook?'<a href="'+site.social_facebook+'" target="_blank" aria-label="Facebook">Facebook</a>':'')+(site.social_linkedin?'<a href="'+site.social_linkedin+'" target="_blank" aria-label="LinkedIn">LinkedIn</a>':'')+'</div></div><div class="footer-col"><h4>Navigation</h4><ul>'+links.map(function(lk){return'<li><a href="'+base+lk.p+'">'+esc(lk.l)+'</a></li>'}).join('')+'</ul></div>'+(hasContact?'<div class="footer-col"><h4>Contact</h4>'+(site.adresse||ville?'<p>'+esc(site.adresse||ville)+'</p>':'')+(site.telephone||site.societe_telephone?'<p><a href="tel:'+(site.telephone||site.societe_telephone)+'">'+esc(site.telephone||site.societe_telephone)+'</a></p>':'')+(site.email||site.societe_email?'<p><a href="mailto:'+(site.email||site.societe_email)+'">'+esc(site.email||site.societe_email)+'</a></p>':'')+'</div>':'')+'<div class="footer-col"><h4>Informations</h4><ul><li><a href="'+base+'/mentions-legales">Mentions légales</a></li><li><a href="'+base+'/confidentialite">Confidentialité</a></li><li><a href="'+base+'/cookies">Cookies</a></li></ul></div></div><div class="footer-bottom"><p>&copy; '+new Date().getFullYear()+' '+esc(nom)+' — Tous droits réservés</p><p class="footer-credits">Site réalisé avec <a href="https://jadomi.fr" target="_blank">JADOMI</a></p></div>'
    }

    // ================================================================
    // SECTION RENDERER
    // ================================================================
    function renderSection(sec,medias,site){
      var c=sec.content||{},sm,h='';
      switch(sec.type){
        case'hero':{
          sm=gm('hero',medias);var heroVid=gv('hero',medias)[0];var bg=sm[0]?sm[0].url:'';
          var words=(c.titre||site.societe_nom||'').split(' ');
          var heroBgHtml;
          if(heroVid){
            heroBgHtml='<video class="hero-vid" autoplay muted loop playsinline'+(heroVid.poster_url?' poster="'+heroVid.poster_url+'"':'')+'><source src="'+heroVid.url+'" type="video/mp4"></video>';
          } else if(bg){
            heroBgHtml='<div class="hero-bg" style="background-image:url(\''+bg+'\')"></div>';
          } else {
            heroBgHtml='<div class="hero-bg" style="background:linear-gradient(135deg,var(--site-primary),var(--site-secondary))"></div>';
          }
          return'<section class="hero-cinema">'+heroBgHtml+'<div class="hero-overlay"></div><div class="hero-content"><div class="hero-eyebrow">'+esc(c.sous_titre||'')+'</div><h1 class="hero-title">'+words.map(function(w){return'<span class="wr">'+esc(w)+'</span>'}).join(' ')+'</h1><p class="hero-subtitle">'+esc(c.ville?'L\'exigence au service de votre confiance — '+c.ville:'')+'</p><div class="hero-ctas"><a href="/site/'+site.slug+'/contact" class="btn-c primary">'+esc(c.cta_text||'Prendre rendez-vous')+'</a><a href="/site/'+site.slug+'/cabinet" class="btn-c ghost">Découvrir</a></div></div><div class="hero-scroll">Découvrir</div></section>'
        }
        case'expertises':{
          sm=gm('expertises',medias);
          return'<section class="sec" data-r><div class="sec-inner"><h2 data-r>'+esc(c.titre||'Nos expertises')+'</h2><div class="items-grid">'+(c.items||[]).map(function(i,idx){var img=sm[idx]?'<img src="'+sm[idx].url+'" alt="'+esc(i.nom)+'" class="item-img" loading="lazy">':'';return'<div class="item-card" data-r="'+(idx%4+1)+'">'+img+'<h3>'+esc(i.nom)+'</h3><p>'+esc(i.description||'')+'</p></div>'}).join('')+'</div></div></section>'
        }
        case'technologies':{
          sm=gm('technologies',medias);
          return'<section class="sec sec-alt" data-r><div class="sec-inner"><h2 data-r>'+esc(c.titre||'Nos équipements')+'</h2><div class="items-grid">'+(c.items||[]).map(function(i,idx){var img=sm[idx]?'<img src="'+sm[idx].url+'" alt="'+esc(i.nom)+'" class="item-img" loading="lazy">':'';return'<div class="item-card" data-r="'+(idx%4+1)+'">'+img+'<h3>'+esc(i.nom)+'</h3><p>'+esc(i.description||'')+'</p></div>'}).join('')+'</div></div></section>'
        }
        case'made_in_france':{
          sm=gm('made_in_france',medias);
          return'<section class="sec" data-r><div class="sec-inner"><h2 data-r>'+esc(c.titre||'Fabrication française')+'</h2>'+(c.texte?'<p class="sec-desc">'+esc(c.texte)+'</p>':'')+(c.materiaux&&c.materiaux.length?'<div class="items-grid">'+c.materiaux.map(function(m,i){return'<div class="item-card" data-r="'+(i%4+1)+'"><h3>'+esc(m)+'</h3></div>'}).join('')+'</div>':'')+gal(sm.slice(0,6))+'</div></section>'
        }
        case'cabinet':case'process':{
          sm=gm(sec.type,medias);
          return'<section class="sec sec-alt" data-r><div class="sec-inner"><h2 data-r>'+esc(c.titre||'')+'</h2>'+(c.description?'<p class="sec-desc">'+esc(c.description)+'</p>':'')+gal(sm)+'</div></section>'
        }
        case'equipe':{
          sm=gm('equipe',medias);
          if(c.membres&&c.membres.length){h='<div class="team-grid">'+c.membres.map(function(m,idx){var img=sm[idx]?sm[idx].url:'';return'<div class="team-portrait" data-r="'+(idx%4+1)+'">'+(img?'<img src="'+img+'" alt="'+esc(m.nom||'')+'" loading="lazy">':'<div style="width:100%;height:100%;background:var(--site-secondary)"></div>')+'<div class="team-overlay"><h3>'+esc(m.nom||'')+'</h3><p class="team-role">'+esc(m.role||'')+'</p></div></div>'}).join('')+'</div>'}
          else if(sm.length){h=gal(sm)}
          else return'' // Hide empty equipe section
          return'<section class="sec" data-r><div class="sec-inner"><h2 data-r>'+esc(c.titre||'Notre équipe')+'</h2>'+h+'</div></section>'
        }
        case'cas_cliniques':{
          sm=gm('cas_cliniques',medias);
          return'<section class="sec sec-alt" data-r><div class="sec-inner"><h2 data-r>'+esc(c.titre||'Nos réalisations')+'</h2><p class="rgpd-notice">Photos publiées avec le consentement des patients, dans le respect du RGPD.</p>'+gal(sm)+'</div></section>'
        }
        case'testimonials':
          if(!c.avis||!c.avis.length)return'' // Hide empty testimonials section
          return'<section class="sec" data-r><div class="sec-inner"><h2 data-r>'+esc(c.titre||'Témoignages')+'</h2><div class="items-grid">'+c.avis.map(function(a,i){return'<div class="item-card" data-r="'+(i%4+1)+'"><p style="font-style:italic;font-size:1.05rem;line-height:1.7">"'+esc(a.texte||'')+'"</p><p style="margin-top:1rem;color:var(--site-accent);font-weight:600">— '+esc(a.auteur||'')+'</p></div>'}).join('')+'</div></div></section>'
        case'contact':return''
        default:{sm=(medias||[]).filter(function(m){return m.media_type!=='video'});return'<section class="sec"><div class="sec-inner"><h2>'+esc(c.titre||sec.type)+'</h2>'+gal(sm.slice(0,4))+'</div></section>'}
      }
    }

    // ================================================================
    // PAGE RENDERERS
    // ================================================================
    function renderHome(site,sections,medias){
      var html=sections.map(function(s){return renderSection(s,medias,site)}).join('');
      // Presentation video (if available)
      var presVid=gv('presentation',medias)[0];
      if(presVid){

      html+='<section class="sec" style="text-align:center" data-r><a href="/site/'+site.slug+'/contact" class="btn-c primary" style="font-size:1rem;padding:1.2rem 3rem">Prendre rendez-vous</a></section>';

    }

    function renderCabinet(site,sections,medias){
      var sec=sections.find(function(s){return s.type==='cabinet'||s.type==='process'});

      // Narrative blocks

    function renderEquipe(site,sections,medias){

    function renderTraitements(site,sections,medias){
      var traitements=site.traitements||[];
      var sec=sections.find(function(s){return s.type==='expertises'});
      var items=sec?(sec.content||{}).items||[]:[];
      var list=traitements.length?traitements:items.map(function(i){return{nom:i.nom,slug:i.nom.toLowerCase().replace(/[^a-z0-9]+/g,'-'),description_courte:i.description||''}});

      var sm=gm('expertises',medias);
      return'<div class="page-hero-c"><div class="page-eyebrow">Notre savoir-faire</div><h1>Nos prestations</h1></div><section class="sec"><div class="sec-inner"><div class="items-grid">'+list.map(function(t,idx){var img=sm[idx]?'<img src="'+sm[idx].url+'" alt="'+esc(t.nom)+'" class="item-img" loading="lazy">':'';return'<div class="item-card" data-r="'+(idx%4+1)+'">'+img+'<h3>'+esc(t.nom)+'</h3><p>'+esc(t.description_courte||'')+'</p>'+(t.slug?'<a href="'+base+'/traitements/'+t.slug+'" style="display:inline-block;margin-top:1rem;font-weight:600;font-size:.9rem">En savoir plus &rarr;</a>':'')+'</div>'}).join('')+'</div></div></section>'

    function renderTraitementDetail(site,sections,medias,slug){

    function renderCasCliniques(site,sections,medias){
      var sm=gm('cas_cliniques',medias);

    }

    function renderContact(site,sections,medias){
      var sec=sections.find(function(s){return s.type==='contact'});var c=sec?sec.content||{}:{};
      var addr=c.adresse||site.adresse||site.societe_ville||'';var phone=c.telephone||site.telephone||site.societe_telephone||'';var email=c.email||site.email||site.societe_email||'';

      return'<div class="page-hero-c"><div class="page-eyebrow">Rendez-vous</div><h1>'+esc(c.titre||'Nous contacter')+'</h1><p>Nous sommes à votre écoute.</p></div><div class="contact-layout" data-r><div>'+(addr?'<div class="contact-block"><h3>Adresse</h3><p>'+esc(addr)+'</p></div>':'')+(phone?'<div class="contact-block"><h3>Téléphone</h3><p><a href="tel:'+phone+'">'+esc(phone)+'</a></p></div>':'')+(email?'<div class="contact-block"><h3>Email</h3><p><a href="mailto:'+email+'">'+esc(email)+'</a></p></div>':'')+(c.horaires||site.horaires?'<div class="contact-block"><h3>Horaires</h3><p style="white-space:pre-line">'+esc(c.horaires||site.horaires)+'</p></div>':'')+'</div><div><iframe src="https://www.google.com/maps?q='+mq+'&output=embed" width="100%" height="400" style="border:0;border-radius:8px" allowfullscreen loading="lazy"></iframe></div></div><div class="contact-form-wrapper" data-r><h2 style="text-align:center;margin-bottom:2rem">Envoyez-nous un message</h2><form id="contact-form" onsubmit="submitContact(event)"><div class="form-row"><div class="form-field"><label>Nom *</label><input type="text" name="name" required></div><div class="form-field"><label>Email *</label><input type="email" name="email" required></div></div><div class="form-row"><div class="form-field"><label>Téléphone</label><input type="tel" name="phone"></div><div class="form-field"><label>Motif</label><select name="motif"><option value="">--</option><option value="rdv">Rendez-vous</option><option value="info">Information</option><option value="devis">Devis</option><option value="autre">Autre</option></select></div></div><div class="form-field"><label>Message *</label><textarea name="message" rows="5" required></textarea></div><div class="checkbox-field"><input type="checkbox" id="rgpd" required><label for="rgpd">J\'accepte le traitement de mes données (<a href="/site/'+site.slug+'/confidentialite">politique</a>).</label></div><button type="submit" class="btn-primary">Envoyer</button><p id="contact-success" style="display:none;color:#22c55e;margin-top:1rem">Message envoyé. Réponse sous 48h.</p><p id="contact-error" style="display:none;color:#ef4444;margin-top:1rem">Erreur. Contactez-nous par téléphone.</p></form></div>'
    }

    function renderMentions(site){
      var n=site.societe_nom||'',cat=site.metier_category||'sante',addr=site.adresse||'',cp=site.code_postal||'',v=site.ville||site.societe_ville||'',tel=site.telephone||site.societe_telephone||'',em=site.email||site.societe_email||'';
      var h='<div class="legal-page"><h1>Mentions légales</h1>';
      h+='<h2>Éditeur du site</h2><p><strong>'+esc(n)+'</strong></p>';
      if(addr||v) h+='<p>'+esc(addr)+(cp?' '+esc(cp):'')+(v?' '+esc(v):'')+'</p>';
      if(tel) h+='<p>Téléphone : '+esc(tel)+'</p>';
      if(em) h+='<p>Email : '+esc(em)+'</p>';
      if(site.siret) h+='<p>SIRET : '+esc(site.siret)+'</p>';
      // Sante
      if(cat==='sante'){
        if(site.rpps) h+='<p>N° RPPS : '+esc(site.rpps)+'</p>';
        if(site.ordre_numero) h+='<p>N° Ordre : '+esc(site.ordre_numero)+'</p>';
        if(site.secteur_conventionnel) h+='<p>Secteur conventionnel : '+esc(site.secteur_conventionnel)+'</p>';
        h+='<h2>Obligations professionnelles</h2><p>Profession réglementée. Inscription a l\'Ordre professionnel competent. Soumis au Code de la sante publique.</p>';
      }
      // Avocat
      if(cat==='liberale'){
        if(site.barreau) h+='<p>Barreau de '+esc(site.barreau)+'</p>';
        if(site.numero_toque) h+='<p>Toque n° '+esc(site.numero_toque)+'</p>';
        if(site.carpa) h+='<p>CARPA : '+esc(site.carpa)+'</p>';
        if(site.assurance_rc) h+='<p>Assurance RC Pro : '+esc(site.assurance_rc)+'</p>';
        h+='<h2>Obligations déontologiques</h2><p>Profession réglementée soumise au Règlement Intérieur National de la profession d\'avocat (RIN). Ce site respecte les dispositions de l\'article 10 du RIN relatif a la communication.</p>';
        h+='<p>Médiateur de la consommation : Médiateur National près du Conseil National des Barreaux.</p>';
      }
      h+='<h2>Hébergement</h2><p>JADOMI SAS<br>France<br>jadomi.fr</p>';
      h+='<h2>Directeur de la publication</h2><p>'+esc(n)+'</p>';
      h+='<h2>Propriété intellectuelle</h2><p>L\'ensemble du contenu de ce site (textes, photographies, graphismes, logo) est protégé par le droit d\'auteur et le droit de la propriété intellectuelle. Toute reproduction, même partielle, sans autorisation écrite préalable, est interdite.</p>';
      h+='<h2>Crédits</h2><p>Conception et réalisation : JADOMI (jadomi.fr)</p>';
      h+='</div>';
      return h;
    }
    function renderConfidentialite(site){
      var n=site.societe_nom||'',cat=site.metier_category||'sante',em=site.email||site.societe_email||'contact@jadomi.fr';
      var isSante=cat==='sante';
      var h='<div class="legal-page"><h1>Politique de confidentialité</h1>';
      h+='<p>Dernière mise à jour : '+new Date().toLocaleDateString('fr-FR')+'</p>';
      h+='<h2>Responsable du traitement</h2><p>'+esc(n)+'</p>';
      if(site.adresse) h+='<p>'+esc(site.adresse)+(site.code_postal?' '+esc(site.code_postal):'')+(site.ville?' '+esc(site.ville):'')+'</p>';
      h+='<p>Contact : '+esc(em)+'</p>';
      h+='<h2>Données personnelles collectées</h2><p>Les données collectées via le formulaire de contact sont : nom, prénom, adresse email, numéro de téléphone (optionnel), motif de la demande, contenu du message.</p>';
      h+='<h2>Finalités du traitement</h2><ul><li>Répondre à votre demande de contact ou de rendez-vous</li><li>Gestion de la relation '+(isSante?'patient':'client')+'</li><li>Amélioration de nos services</li></ul>';
      h+='<h2>Base légale</h2><p>Le traitement est fondé sur votre consentement explicite (case a cocher du formulaire) et sur l\'intérêt légitime du professionnel à répondre aux demandes.</p>';
      if(isSante){
        h+='<h2>Données de santé</h2><p>Les données de santé constituent une catégorie particulière au sens de l\'article 9 du RGPD. <strong>Aucune donnée de santé n\'est collectée via ce site internet.</strong> Les échanges relatifs à votre santé se font exclusivement dans le cadre du secret professionnel, lors de la consultation au cabinet.</p>';
      }
      h+='<h2>Durée de conservation</h2><p>Vos données sont conservées pendant une durée de 3 ans à compter du dernier contact. Au-delà, elles sont supprimées automatiquement.</p>';
      h+='<h2>Destinataires des données</h2><p>Vos données sont exclusivement destinées à '+esc(n)+'. Elles ne sont transmises à aucun tiers commercial.</p>';
      h+='<h2>Vos droits</h2><p>Conformément au RGPD (Règlement UE 2016/679), vous disposez des droits suivants :</p><ul><li>Droit d\'accès à vos données</li><li>Droit de rectification</li><li>Droit à l\'effacement ("droit a l\'oubli")</li><li>Droit à la portabilité</li><li>Droit d\'opposition</li><li>Droit à la limitation du traitement</li></ul>';
      h+='<p>Pour exercer vos droits : <a href="mailto:'+esc(em)+'">'+esc(em)+'</a></p>';
      h+='<h2>Autorité de contrôle</h2><p>Si vous estimez que le traitement de vos données n\'est pas conforme, vous pouvez introduire une réclamation auprès de la CNIL (Commission Nationale de l\'Informatique et des Libertes) : <a href="https://www.cnil.fr" target="_blank">www.cnil.fr</a></p>';
      h+='</div>';
      return h;
    }
    function renderCookies(){
      return'<div class="legal-page"><h1>Politique relative aux cookies</h1>'
      +'<h2>Qu\'est-ce qu\'un cookie ?</h2><p>Un cookie est un petit fichier texte déposé sur votre terminal (ordinateur, smartphone, tablette) lors de la visite d\'un site internet. Il permet de stocker des informations relatives a votre navigation.</p>'
      +'<h2>Cookies utilisés sur ce site</h2>'
      +'<h3>Cookies strictement nécessaires</h3><p>Ces cookies sont indispensables au fonctionnement du site. Ils permettent la navigation et l\'utilisation des fonctionnalités essentielles (session, préférences d\'affichage). Ils ne peuvent pas être désactivés.</p>'
      +'<h3>Cookies analytiques</h3><p>Ces cookies nous permettent de mesurer l\'audience du site de manière anonyme (nombre de visites, pages consultées, durée de session). Aucune donnée personnelle identifiable n\'est collectée.</p>'
      +'<h2>Durée de conservation</h2><p>Les cookies sont conservés pour une durée maximale de 13 mois conformément aux recommandations de la CNIL.</p>'
      +'<h2>Gestion des cookies</h2><p>Vous pouvez à tout moment modifier vos préférences en configurant votre navigateur. Consultez l\'aide de votre navigateur pour la procédure spécifique :<br>• Chrome : Paramètres > Confidentialité et sécurité > Cookies<br>• Firefox : Options > Vie privée et sécurité<br>• Safari : Préférences > Confidentialité</p>'
      +'<h2>En savoir plus</h2><p>Pour en savoir plus sur les cookies et vos droits, consultez le site de la CNIL : <a href="https://www.cnil.fr/fr/cookies-et-traceurs" target="_blank">www.cnil.fr/fr/cookies-et-traceurs</a></p>'
      +'</div>';
    }
    function render404(site){return'<div class="page-hero-c"><h1>Page introuvable</h1><p style="margin-top:2rem"><a href="/site/'+site.slug+'" class="btn-c primary">Retour</a></p></div>'}

    // ================================================================
    // SPA ROUTER
    // ================================================================
    var _site,_sections,_medias;
    function route(){
      if(!_site)return;var path=window.location.pathname,base='/site/'+_site.slug,html;
      if(path===base||path===base+'/')html=renderHome(_site,_sections,_medias);
      else if(path===base+'/cabinet')html=renderCabinet(_site,_sections,_medias);
      else if(path===base+'/equipe')html=renderEquipe(_site,_sections,_medias);
      else if(path===base+'/traitements')html=renderTraitements(_site,_sections,_medias);
      else if(path.indexOf(base+'/traitements/')===0)html=renderTraitementDetail(_site,_sections,_medias,path.split(base+'/traitements/')[1]);
      else if(path===base+'/technologies')html=renderTechnologies(_site,_sections,_medias);
      else if(path===base+'/cas-cliniques'||path===base+'/domaines')html=renderCasCliniques(_site,_sections,_medias);
      else if(path===base+'/contact')html=renderContact(_site,_sections,_medias);
      else if(path===base+'/mentions-legales')html=renderMentions(_site);
      else if(path===base+'/confidentialite')html=renderConfidentialite(_site);
      else if(path===base+'/cookies')html=renderCookies();
      else if(path===base+'/blog')html='<div class="page-hero-c"><h1>Actualités</h1><p>Bientôt disponible.</p></div>';
      else html=render404(_site);
      document.getElementById('header').innerHTML=renderHeader(_site,path);
      document.getElementById('main-content').innerHTML=html;
      document.getElementById('footer').innerHTML=renderFooter(_site);
      window.scrollTo(0,0);bindLinks();setupReveals();setupCursor();
      document.querySelectorAll('.num-val[data-target]').forEach(function(el){counterObs.observe(el)});
    }
    function bindLinks(){if(!_site)return;var base='/site/'+_site.slug;document.querySelectorAll('a[href^="'+base+'"]').forEach(function(a){a.onclick=function(e){var h=a.getAttribute('href');if(h.indexOf(base)===0){e.preventDefault();history.pushState(null,'',h);route()}}})}
    window.addEventListener('popstate',route);

    // ================================================================
    // CONTACT + TRACKING
    // ================================================================
    function submitContact(e){e.preventDefault();var f=e.target;fetch('/api/vitrines/public/site/'+_site.slug+'/contact',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:f.name.value,email:f.email.value,phone:f.phone.value,motif:f.motif?f.motif.value:'',message:f.message.value,rgpd:true})}).then(function(r){return r.json()}).then(function(d){if(d.success){document.getElementById('contact-success').style.display='block';document.getElementById('contact-error').style.display='none';f.reset()}else{document.getElementById('contact-error').style.display='block'}}).catch(function(){document.getElementById('contact-error').style.display='block'})}
    function trackEv(ev){fetch('/api/vitrines/public/site/'+(_site?_site.slug:'')+'/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event:ev})}).catch(function(){})}

    // ================================================================
    // LOAD
    // ================================================================
    function loadSite(){
      var pp=window.location.pathname.split('/site/');if(pp.length<2){document.getElementById('loader').classList.add('hidden');document.getElementById('loading').style.display='block';document.getElementById('loading').textContent='Page introuvable';return}
      var slugFull=pp[1].split('/')[0];
      // Pass ?theme= query to API for live preview
      var themeQ=getQueryParam('theme');
      var apiUrl='/api/vitrines/public/site/'+slugFull+(themeQ?'?theme='+encodeURIComponent(themeQ):'');
      fetch(apiUrl).then(function(r){return r.json()}).then(function(data){
        if(!data.success){document.getElementById('loader').classList.add('hidden');document.getElementById('loading').style.display='block';document.getElementById('loading').innerHTML='<h1 style="font-size:2rem;margin-bottom:1rem">Site introuvable</h1>';return}
        _site=data.site;_sections=data.sections||[];_medias=data.medias||[];
        _site.slug=slugFull;
        // Apply theme: DB theme object > legacy palette
        applyTheme(_site.palette,_site.typography,data.theme||null);
        var nom=_site.societe_nom||'Site';
        var ville=_site.societe_ville||'';
        var desc=nom+(ville?' — '+ville:'');
        document.getElementById('page-title').textContent=nom;
        document.getElementById('meta-desc').content=desc;
        // OG tags
        var canonical='https://jadomi.fr/site/'+slugFull;
        var ogTitle=document.getElementById('og-title');if(ogTitle)ogTitle.content=nom;
        var ogDesc=document.getElementById('og-desc');if(ogDesc)ogDesc.content=desc;
        var ogUrl=document.getElementById('og-url');if(ogUrl)ogUrl.content=canonical;
        var metaCanon=document.getElementById('meta-canonical');if(metaCanon)metaCanon.href=canonical;
        // OG image from hero media
        var heroImgs=gm('hero',_medias);if(heroImgs.length){var ogImg=document.getElementById('og-image');if(ogImg)ogImg.content=heroImgs[0].url}
        // JSON-LD LocalBusiness
        var ldEl=document.getElementById('json-ld');
        if(ldEl){
          var ld={'@context':'https://schema.org','@type':'LocalBusiness','name':nom};
          if(_site.adresse||ville)ld.address={'@type':'PostalAddress','streetAddress':_site.adresse||'','addressLocality':ville,'postalCode':_site.code_postal||'','addressCountry':'FR'};
          if(_site.telephone||_site.societe_telephone)ld.telephone=_site.telephone||_site.societe_telephone;
          if(_site.email||_site.societe_email)ld.email=_site.email||_site.societe_email;
          ld.url=canonical;
          if(heroImgs.length)ld.image=heroImgs[0].url;
          ldEl.textContent=JSON.stringify(ld);
        }
        document.getElementById('loader-letter').textContent=(nom||'J').charAt(0);
        setTimeout(function(){
          document.getElementById('loader').classList.add('hidden');
          document.getElementById('header').style.display='block';
          document.getElementById('main-content').style.display='block';
          document.getElementById('footer').style.display='block';
          route();trackEv('page_view');
        },1200);
      }).catch(function(err){document.getElementById('loader').classList.add('hidden');document.getElementById('loading').style.display='block';document.getElementById('loading').innerHTML='<h1>Erreur</h1>';console.error(err)});
    }
    loadSite();
  </script>
