<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI Showroom &mdash; Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/css/jadomi-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ms-switcher.js" defer></script>
<script src="/jadomi-legal-widget.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--sidebar-w:220px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.08) 0%,transparent 55%);-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--font);cursor:pointer;}

.nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,31,61,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;}
.nav-left{display:flex;align-items:center;gap:18px;}
.logo{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;}
.crumb{display:flex;align-items:center;gap:10px;}
.crumb-ico{font-size:20px;}
.crumb-name{font-weight:700;font-size:14px;}
.crumb-sep{color:var(--muted);font-size:12px;}
.crumb-module{font-size:13px;color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;font-weight:600;transition:all 0.15s;text-decoration:none;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0a1628 0%,#121f3a 50%,#0a1628 100%);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;transition:all 0.15s;text-decoration:none;border-left:3px solid transparent;}
.sidebar-link:hover{background:rgba(99,102,241,0.1);color:var(--text);}
.sidebar-link.active{background:rgba(99,102,241,0.15);color:var(--accent);border-left-color:var(--accent);}
.sidebar-link .ico{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.sidebar-sep{height:1px;background:var(--border);margin:12px 16px;}

.content{flex:1;min-width:0;display:flex;flex-direction:column;height:calc(100vh - 57px);}

/* Messaging layout */
.msg-layout{display:flex;flex:1;min-height:0;}
.conv-list{width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(10,22,40,0.6);}
.conv-list-header{padding:16px;border-bottom:1px solid var(--border);font-family:var(--display);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.conv-list-header .badge{background:var(--danger);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;}
.conv-items{flex:1;overflow-y:auto;}
.conv-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:all 0.15s;position:relative;}
.conv-item:hover{background:rgba(99,102,241,0.08);}
.conv-item.active{background:rgba(99,102,241,0.15);border-left:3px solid var(--accent);}
.conv-item.unread::after{content:'';position:absolute;top:18px;right:14px;width:8px;height:8px;border-radius:50%;background:var(--accent);}
.conv-avatar{width:40px;height:40px;border-radius:50%;background:rgba(99,102,241,0.2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--accent);flex-shrink:0;}
.conv-info{flex:1;min-width:0;}
.conv-name{font-weight:700;font-size:13px;margin-bottom:2px;}
.conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conv-time{font-size:10px;color:var(--muted);position:absolute;top:14px;right:14px;}

.thread-panel{flex:1;display:flex;flex-direction:column;min-width:0;}
.thread-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(15,31,61,0.6);}
.thread-header .name{font-weight:700;font-size:14px;}
.thread-header .sub{font-size:12px;color:var(--muted);}
.thread-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
.bubble{max-width:70%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.5;word-wrap:break-word;}
.bubble.sent{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.bubble.received{align-self:flex-start;background:rgba(30,52,96,0.8);border:1px solid var(--border);border-bottom-left-radius:4px;}
.bubble-time{font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;text-align:right;}
.bubble.received .bubble-time{color:var(--muted);}
.thread-compose{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;background:rgba(15,31,61,0.6);}
.thread-compose input{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:12px;background:rgba(20,40,80,0.6);color:var(--text);font-size:13px;font-family:var(--font);outline:none;}
.thread-compose input:focus{border-color:var(--accent);}
.thread-compose button{padding:12px 20px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;transition:all 0.15s;}
.thread-compose button:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(99,102,241,0.3);}

.empty-thread{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;flex-direction:column;gap:10px;}
.empty-thread .ico{font-size:48px;opacity:0.3;}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:14px;margin:20px;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(25,45,85,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.ok{border-color:var(--success);color:var(--success);}

@media(max-width:768px){
  .sidebar{display:none;}
  .conv-list{width:100%;display:flex;}
  .thread-panel{display:none;}
  .msg-layout.thread-open .conv-list{display:none;}
  .msg-layout.thread-open .thread-panel{display:flex;}
  .mobile-menu-btn{display:block !important;}
  .back-btn{display:inline-flex !important;}
}
.mobile-menu-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:30;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
.sidebar.mobile-open{display:flex !important;flex-direction:column;position:fixed;top:57px;left:0;bottom:0;z-index:25;width:var(--sidebar-w);}
.back-btn{display:none;padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="logo">JADOMI</div>
    <div class="crumb">
      <span class="crumb-ico">&#127912;</span>
      <span class="crumb-name">Showroom</span>
      <span class="crumb-sep">&rsaquo;</span>
      <span class="crumb-module">Messages</span>
    </div>
  </div>
  <div class="nav-right"><a class="nav-btn" href="dashboard.html">&larr; Dashboard</a></div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <a class="sidebar-link" href="dashboard.html"><span class="ico">&#128202;</span> Vue d'ensemble</a>
      <a class="sidebar-link" href="mes-creations.html"><span class="ico">&#128717;&#65039;</span> Mes cr&eacute;ations</a>
      <a class="sidebar-link" href="commandes.html"><span class="ico">&#128230;</span> Commandes</a>
      <a class="sidebar-link" href="stock.html"><span class="ico">&#128230;</span> Stock</a>
      <a class="sidebar-link" href="planning.html"><span class="ico">&#128197;</span> Planning location</a>
      <a class="sidebar-link active" href="messages.html"><span class="ico">&#128172;</span> Messages</a>
      <a class="sidebar-link" href="avis.html"><span class="ico">&#11088;</span> Avis</a>
      <a class="sidebar-link" href="revenus.html"><span class="ico">&#128176;</span> Revenus</a>
      <a class="sidebar-link" href="parametres.html"><span class="ico">&#9881;&#65039;</span> Param&egrave;tres</a>
      <div class="sidebar-sep"></div>
      <a class="sidebar-link" href="/showroom/" target="_blank"><span class="ico">&#128279;</span> Ma boutique</a>
    </nav>
  </aside>

  <main class="content">
    <div class="msg-layout" id="msg-layout">
      <div class="conv-list">
        <div class="conv-list-header">
          <span>&#128172; Conversations</span>
          <span class="badge" id="unread-badge" style="display:none;">0</span>
        </div>
        <div class="conv-items" id="conv-items">
          <div class="loader"><div class="spinner"></div>Chargement&hellip;</div>
        </div>
      </div>
      <div class="thread-panel" id="thread-panel">
        <div class="empty-thread" id="empty-thread">
          <div class="ico">&#128172;</div>
          <div>S&eacute;lectionnez une conversation</div>
        </div>
        <div id="thread-content" style="display:none;flex-direction:column;flex:1;min-height:0;">
          <div class="thread-header" id="thread-header"></div>
          <div class="thread-messages" id="thread-messages"></div>
          <div class="thread-compose">
            <input type="text" id="msg-input" placeholder="&Eacute;crivez votre message&hellip;" onkeydown="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">Envoyer</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">&#9776;</button>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let token = null, societeId = null;
let conversations = [], currentConvId = null;

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg,k){ const t=$('toast'); t.textContent=msg; t.className='toast show '+(k||''); setTimeout(()=>t.className='toast',2800); }

function timeAgo(d){
  if(!d) return '';
  const now = new Date(), then = new Date(d);
  const diff = Math.floor((now - then) / 1000);
  if(diff < 60) return 'maintenant';
  if(diff < 3600) return Math.floor(diff/60) + ' min';
  if(diff < 86400) return Math.floor(diff/3600) + ' h';
  if(diff < 604800) return Math.floor(diff/86400) + ' j';
  return then.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

function fmtTime(d){
  if(!d) return '';
  return new Date(d).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

function fmtDateFull(d){
  if(!d) return '';
  return new Date(d).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

async function api(path, opts={}) {
  try { const{data:sd}=await db.auth.getSession(); if(sd?.session) token=sd.session.access_token; } catch(_){}
  const r = await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})}});
  if(r.status===401){ try{const{data:ref}=await db.auth.refreshSession();if(ref?.session){token=ref.session.access_token;return(await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})}})).json();}}catch(_){} location.href='/login.html';return{success:false};}
  return r.json();
}

function getInitials(name){
  return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function renderConversations(){
  const list = $('conv-items');
  if(!conversations.length){
    list.innerHTML = '<div class="empty">Aucune conversation</div>';
    return;
  }

  let totalUnread = 0;
  list.innerHTML = conversations.map(c => {
    const unread = c.non_lu || 0;
    totalUnread += unread;
    const name = (c.client_prenom||'') + ' ' + (c.client_nom||'');
    return `<div class="conv-item${c.id===currentConvId?' active':''}${unread?' unread':''}" onclick="openConversation('${c.id}')">
      <div class="conv-avatar">${getInitials(name)}</div>
      <div class="conv-info">
        <div class="conv-name">${esc(name.trim()||'Client')}</div>
        <div class="conv-preview">${esc(c.dernier_message||'')}</div>
      </div>
      <span class="conv-time">${timeAgo(c.dernier_message_date||c.updated_at)}</span>
    </div>`;
  }).join('');

  const badge = $('unread-badge');
  if(totalUnread > 0){ badge.style.display=''; badge.textContent=totalUnread; }
  else badge.style.display='none';
}

async function openConversation(convId){
  currentConvId = convId;
  renderConversations();

  $('empty-thread').style.display = 'none';
  $('thread-content').style.display = 'flex';
  $('msg-layout').classList.add('thread-open');

  const conv = conversations.find(c => c.id === convId);
  const name = conv ? ((conv.client_prenom||'')+' '+(conv.client_nom||'')).trim() : 'Client';

  $('thread-header').innerHTML = `
    <button class="back-btn" onclick="closeThread()">&larr;</button>
    <div>
      <div class="name">${esc(name||'Client')}</div>
      <div class="sub">${conv?.client_email ? esc(conv.client_email) : ''}</div>
    </div>
  `;

  $('thread-messages').innerHTML = '<div class="loader"><div class="spinner"></div>Chargement&hellip;</div>';

  const r = await api('/api/showroom/messages?conversation_id=' + convId);
  const messages = r.messages || [];

  if(!messages.length){
    $('thread-messages').innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px;">Aucun message dans cette conversation</div>';
    return;
  }

  let html = '';
  let lastDate = '';
  messages.forEach(m => {
    const msgDate = fmtDateFull(m.created_at);
    if(msgDate !== lastDate){
      html += '<div style="text-align:center;font-size:11px;color:var(--muted);padding:8px 0;">'+esc(msgDate)+'</div>';
      lastDate = msgDate;
    }
    const isSent = m.expediteur === 'createur';
    html += `<div class="bubble ${isSent?'sent':'received'}">
      ${esc(m.contenu||'')}
      <div class="bubble-time">${fmtTime(m.created_at)}</div>
    </div>`;
  });

  $('thread-messages').innerHTML = html;
  const container = $('thread-messages');
  container.scrollTop = container.scrollHeight;

  $('msg-input').focus();
}

function closeThread(){
  $('msg-layout').classList.remove('thread-open');
  $('empty-thread').style.display = '';
  $('thread-content').style.display = 'none';
  currentConvId = null;
  renderConversations();
}

async function sendMessage(){
  const input = $('msg-input');
  const text = input.value.trim();
  if(!text || !currentConvId) return;

  input.value = '';
  input.disabled = true;

  // Optimistic add
  const container = $('thread-messages');
  const bubble = document.createElement('div');
  bubble.className = 'bubble sent';
  bubble.innerHTML = esc(text) + '<div class="bubble-time">maintenant</div>';
  container.appendChild(bubble);
  container.scrollTop = container.scrollHeight;

  const r = await api('/api/showroom/messages', {
    method: 'POST',
    body: JSON.stringify({ conversation_id: currentConvId, contenu: text })
  });

  input.disabled = false;
  input.focus();

  if(r.success){
    // Update preview in conversation list
    const conv = conversations.find(c => c.id === currentConvId);
    if(conv){
      conv.dernier_message = text;
      conv.dernier_message_date = new Date().toISOString();
    }
    renderConversations();
  } else {
    toast(r.error || 'Erreur d\'envoi', 'error');
    bubble.style.opacity = '0.5';
  }
}

async function loadMessages(){
  societeId = new URLSearchParams(location.search).get('societe') || localStorage.getItem('jadomi_societe_id') || '';
  const{data:sd}=await db.auth.getSession();
  if(!sd?.session){location.href='/login.html';return;}
  token=sd.session.access_token;

  const r = await api('/api/showroom/messages');
  conversations = r.conversations || [];
  renderConversations();
}

loadMessages();
</script>
</body>
</html>
