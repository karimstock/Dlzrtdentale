<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI — Mes Cr&eacute;ations</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/css/jadomi-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ms-switcher.js" defer></script>
<script src="/jadomi-legal-widget.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--sidebar-w:220px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.08) 0%,transparent 55%);-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--font);cursor:pointer;}

.nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,31,61,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;}
.nav-left{display:flex;align-items:center;gap:18px;}
.logo{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;}
.crumb{display:flex;align-items:center;gap:10px;}
.crumb-ico{font-size:20px;}
.crumb-name{font-weight:700;font-size:14px;}
.crumb-sep{color:var(--muted);font-size:12px;}
.crumb-module{font-size:13px;color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;font-weight:600;transition:all 0.15s;text-decoration:none;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0a1628 0%,#121f3a 50%,#0a1628 100%);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;transition:all 0.15s;text-decoration:none;border-left:3px solid transparent;}
.sidebar-link:hover{background:rgba(99,102,241,0.1);color:var(--text);}
.sidebar-link.active{background:rgba(99,102,241,0.15);color:var(--accent);border-left-color:var(--accent);}
.sidebar-link .ico{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.sidebar-sep{height:1px;background:var(--border);margin:12px 16px;}

.content{flex:1;padding:28px 28px 100px;max-width:1000px;min-width:0;}

.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.toolbar-left{display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:8px 16px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,0.1);}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;transition:all 0.2s;white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.3);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}

.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.product-card{background:rgba(30,52,96,0.6);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all 0.2s;position:relative;}
.product-card:hover{border-color:rgba(99,102,241,0.4);box-shadow:0 0 30px rgba(99,102,241,0.15);}
.product-card.inactive{opacity:0.5;}
.product-img{width:100%;aspect-ratio:4/5;background:rgba(15,31,61,0.6);overflow:hidden;position:relative;}
.product-img img{width:100%;height:100%;object-fit:cover;}
.product-status{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;}
.product-status.active{background:rgba(16,185,129,0.9);color:#fff;}
.product-status.inactive{background:rgba(239,68,68,0.9);color:#fff;}
.product-type-tag{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;}
.product-type-tag.vente{background:rgba(16,185,129,0.9);color:#fff;}
.product-type-tag.location{background:rgba(99,102,241,0.9);color:#fff;}
.product-type-tag.sur_mesure{background:rgba(245,158,11,0.9);color:#fff;}
.product-body{padding:14px 16px;}
.product-body h4{font-size:14px;font-weight:700;margin-bottom:4px;}
.product-body .detail{font-size:12px;color:var(--muted);margin-bottom:8px;}
.product-prices{font-family:var(--display);font-size:16px;font-weight:800;color:var(--accent);margin-bottom:8px;}
.product-actions{display:flex;gap:6px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:rgba(15,31,61,0.98);border:1px solid var(--border);border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;}
.modal h2{font-family:var(--display);font-size:20px;font-weight:800;margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--font);color:var(--text);background:rgba(20,40,80,0.6);outline:none;transition:border-color 0.2s;}
.field textarea{min-height:80px;resize:vertical;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.2s;margin-bottom:14px;}
.drop-zone:hover{border-color:var(--accent);color:var(--accent);}
.drop-zone.dragover{border-color:var(--accent);background:rgba(99,102,241,0.05);}

.bijou-fields{display:none;border-top:1px solid var(--border);padding-top:14px;margin-top:14px;}
.bijou-fields.show{display:block;}

.ia-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:8px 16px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.ia-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,0.3);}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:14px;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(25,45,85,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.ok{border-color:var(--success);color:var(--success);}

@media(max-width:768px){.sidebar{display:none;}.content{padding:18px 14px 80px;}.products-grid{grid-template-columns:1fr 1fr;}.field-row,.field-row-3{grid-template-columns:1fr;}.mobile-menu-btn{display:block !important;}}
@media(max-width:480px){.products-grid{grid-template-columns:1fr;}}
.mobile-menu-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:30;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
.sidebar.mobile-open{display:flex !important;flex-direction:column;position:fixed;top:57px;left:0;bottom:0;z-index:25;width:var(--sidebar-w);}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="logo">JADOMI</div>
    <div class="crumb">
      <span class="crumb-ico">&#127912;</span>
      <span class="crumb-name">Showroom</span>
      <span class="crumb-sep">&rsaquo;</span>
      <span class="crumb-module">Mes cr&eacute;ations</span>
    </div>

  <div class="nav-right"><a class="nav-btn" href="dashboard.html">&larr; Dashboard</a></div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <a class="sidebar-link" href="dashboard.html"><span class="ico">&#128202;</span> Vue d'ensemble</a>
      <a class="sidebar-link active" href="mes-creations.html"><span class="ico">&#128717;&#65039;</span> Mes cr&eacute;ations</a>
      <a class="sidebar-link" href="commandes.html"><span class="ico">&#128230;</span> Commandes</a>
      <a class="sidebar-link" href="planning.html"><span class="ico">&#128197;</span> Planning location</a>

      <a class="sidebar-link" href="revenus.html"><span class="ico">&#128176;</span> Revenus</a>

  <main class="content">
    <div class="toolbar">

      <div class="loader" style="grid-column:1/-1;"><div class="spinner"></div>Chargement&hellip;</div>
    </div>

</div>

<!-- CREATE/EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Nouvelle cr&eacute;ation</h2>
    <form id="product-form" onsubmit="saveProduct(event)">
      <input type="hidden" id="f-id">
      <div class="field-row">
        <div class="field"><label>Nom *</label><input id="f-nom" required></div>
        <div class="field"><label>Cat&eacute;gorie *</label>
          <select id="f-categorie" required>
            <option value="">Choisir&hellip;</option>
            <option value="robes">Robes</option>
            <option value="bijoux">Bijoux</option>
            <option value="accessoires">Accessoires</option>
            <option value="maison">Maison</option>
            <option value="art">Art</option>
            <option value="beaute">Beaut&eacute;</option>
            <option value="gastronomie">Gastronomie</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Type *</label>
          <select id="f-type" required onchange="toggleFields()">
            <option value="vente">Vente</option>
            <option value="location">Location</option>
            <option value="sur_mesure">Sur mesure</option>
          </select>
        </div>
        <div class="field"><label>Collection</label><input id="f-collection" placeholder="Ex: Printemps 2026"></div>
      </div>

      <div class="field">
        <label>Description</label>
        <textarea id="f-description" placeholder="D&eacute;crivez votre cr&eacute;ation&hellip;"></textarea>
        <button type="button" class="ia-btn" style="margin-top:8px;" onclick="generateDescription()">&#10024; JADOMI IA &mdash; G&eacute;n&eacute;rer la description</button>
      </div>

      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('f-photos-input').click()">
        &#128247; Glissez vos photos ici ou cliquez pour s&eacute;lectionner<br><small>Format 4:5 recommand&eacute; &bull; JPG, PNG, WebP</small>
        <input type="file" id="f-photos-input" accept="image/*" multiple style="display:none">
      </div>
      <div id="photos-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;"></div>

      <div class="field-row-3" id="vente-fields">
        <div class="field"><label>Prix de vente (&euro;)</label><input type="number" step="0.01" id="f-prix-vente"></div>
        <div class="field"><label>Stock</label><input type="number" id="f-stock"></div>
        <div class="field"><label>Poids (g)</label><input type="number" id="f-poids"></div>
      </div>

      <div id="location-fields" style="display:none;">
        <div class="field-row-3">
          <div class="field"><label>Prix/jour (&euro;)</label><input type="number" step="0.01" id="f-prix-location"></div>
          <div class="field"><label>Caution (&euro;)</label><input type="number" step="0.01" id="f-caution"></div>
          <div class="field"><label>Dur&eacute;e min (jours)</label><input type="number" id="f-duree-min"></div>
        </div>
        <div class="field"><label>Dur&eacute;e max (jours)</label><input type="number" id="f-duree-max"></div>
      </div>

      <div id="sur-mesure-fields" style="display:none;">
        <div class="field-row">
          <div class="field"><label>Prix de base (&euro;)</label><input type="number" step="0.01" id="f-prix-sm"></div>
          <div class="field"><label>D&eacute;lai (jours)</label><input type="number" id="f-delai-sm"></div>
        </div>
      </div>

      <div class="field-row">
        <div class="field"><label>Tailles (s&eacute;par&eacute;es par virgule)</label><input id="f-tailles" placeholder="S, M, L, XL"></div>
        <div class="field"><label>Couleurs</label><input id="f-couleurs" placeholder="Noir, Blanc, Rouge"></div>
      </div>
      <div class="field"><label>Mati&egrave;res</label><input id="f-matieres" placeholder="Soie, Lin, Coton"></div>

      <!-- Bijouterie fields -->
      <div class="bijou-fields" id="bijou-fields">
        <h3 style="font-family:var(--display);font-size:14px;margin-bottom:12px;color:#c9a84c;">&#128142; Champs Bijouterie</h3>
        <div class="field-row">
          <div class="field"><label>M&eacute;tal</label><input id="f-metal" placeholder="Or 18 carats, Argent 925&hellip;"></div>
          <div class="field"><label>Pierres</label><input id="f-pierres" placeholder="Diamant, Saphir&hellip;"></div>
        </div>
        <div class="field-row-3">
          <div class="field"><label>Poin&ccedil;on</label><input id="f-poincon" placeholder="Poin&ccedil;on de ma&icirc;tre"></div>
          <div class="field"><label>Certificat</label><input id="f-certificat" placeholder="GIA, HRD&hellip;"></div>
          <div class="field"><label>Taille bague</label><input id="f-taille-bague" placeholder="48, 50, 52&hellip;"></div>
        </div>
        <div class="field"><label><input type="checkbox" id="f-gravure"> Gravure disponible</label></div>
      </div>

      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      </div>
    </form>
  </div>
</div>

<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">&#9776;</button>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let token = null, societeId = null, allProduits = [], currentFilter = 'all';

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function eur(n){ return (Number(n)||0).toFixed(2).replace('.',',') + ' \u20ac'; }
function toast(msg,k){ const t=$('toast'); t.textContent=msg; t.className='toast show '+(k||''); setTimeout(()=>t.className='toast',2800); }

async function api(path, opts={}) {
  try { const { data:sd } = await db.auth.getSession(); if(sd?.session) token=sd.session.access_token; } catch(_){}
  const r = await fetch(path, { ...opts, headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})} });
  if(r.status===401){ try{ const{data:ref}=await db.auth.refreshSession(); if(ref?.session){token=ref.session.access_token; return(await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})}})).json();} }catch(_){} location.href='/login.html'; return{success:false}; }
  return r.json();
}

function toggleFields(){
  const t = $('f-type').value;
  $('vente-fields').style.display = t==='vente'?'':'none';
  $('location-fields').style.display = t==='location'?'':'none';
  $('sur-mesure-fields').style.display = t==='sur_mesure'?'':'none';
}

// Show bijou fields when bijoux category selected
$('f-categorie').addEventListener('change', () => {
  $('bijou-fields').classList.toggle('show', $('f-categorie').value==='bijoux');
});

function openCreateModal(){
  $('modal-title').textContent = 'Nouvelle cr\u00e9ation';
  $('product-form').reset();
  $('f-id').value = '';
  $('photos-preview').innerHTML = '';
  toggleFields();
  $('bijou-fields').classList.remove('show');
  $('modal-overlay').classList.add('show');
}

function openEditModal(p){
  $('modal-title').textContent = 'Modifier : '+p.nom;
  $('f-id').value = p.id;
  $('f-nom').value = p.nom||'';
  $('f-categorie').value = p.categorie||'';
  $('f-type').value = p.type||'vente';
  $('f-collection').value = p.collection||'';
  $('f-description').value = p.description||'';
  $('f-prix-vente').value = p.prix_vente||'';
  $('f-stock').value = p.stock||'';
  $('f-poids').value = p.poids||'';
  $('f-prix-location').value = p.prix_location_jour||'';
  $('f-caution').value = p.caution_location||'';
  $('f-duree-min').value = p.duree_location_min||'';
  $('f-duree-max').value = p.duree_location_max||'';
  $('f-prix-sm').value = p.prix_sur_mesure_base||'';
  $('f-delai-sm').value = p.delai_sur_mesure_jours||'';
  $('f-tailles').value = (p.tailles||[]).join(', ');
  $('f-couleurs').value = (p.couleurs||[]).join(', ');
  $('f-matieres').value = (p.matieres||[]).join(', ');
  $('f-metal').value = p.metal||'';
  $('f-pierres').value = p.pierres||'';
  $('f-poincon').value = p.poincon||'';
  $('f-certificat').value = p.certificat||'';
  $('f-taille-bague').value = p.taille_bague||'';
  $('f-gravure').checked = !!p.gravure;
  toggleFields();
  $('bijou-fields').classList.toggle('show', p.categorie==='bijoux');
  $('photos-preview').innerHTML = (p.photos||[]).map(ph=>'<img src="'+esc(ph)+'" style="width:60px;height:60px;border-radius:8px;object-fit:cover;">').join('');
  $('modal-overlay').classList.add('show');
}

function closeModal(){ $('modal-overlay').classList.remove('show'); }

function parseCSV(s){ return s ? s.split(',').map(x=>x.trim()).filter(Boolean) : []; }

async function saveProduct(e){
  e.preventDefault();
  const id = $('f-id').value;
  const body = {
    nom: $('f-nom').value,
    categorie: $('f-categorie').value,
    type: $('f-type').value,
    collection: $('f-collection').value||null,
    description: $('f-description').value||null,
    prix_vente: $('f-prix-vente').value?Number($('f-prix-vente').value):null,
    stock: $('f-stock').value?Number($('f-stock').value):null,
    poids: $('f-poids').value?Number($('f-poids').value):null,
    prix_location_jour: $('f-prix-location').value?Number($('f-prix-location').value):null,
    caution_location: $('f-caution').value?Number($('f-caution').value):null,
    duree_location_min: $('f-duree-min').value?Number($('f-duree-min').value):null,
    duree_location_max: $('f-duree-max').value?Number($('f-duree-max').value):null,
    prix_sur_mesure_base: $('f-prix-sm').value?Number($('f-prix-sm').value):null,
    delai_sur_mesure_jours: $('f-delai-sm').value?Number($('f-delai-sm').value):null,
    tailles: parseCSV($('f-tailles').value),
    couleurs: parseCSV($('f-couleurs').value),
    matieres: parseCSV($('f-matieres').value),
    metal: $('f-metal').value||null,
    pierres: $('f-pierres').value||null,
    poincon: $('f-poincon').value||null,
    certificat: $('f-certificat').value||null,
    taille_bague: $('f-taille-bague').value||null,
    gravure: $('f-gravure').checked
  };
  const r = id
    ? await api('/api/showroom/produits/'+id, { method:'PATCH', body:JSON.stringify(body) })
    : await api('/api/showroom/produits', { method:'POST', body:JSON.stringify(body) });
  if(r.success){ toast(id?'Cr\u00e9ation modifi\u00e9e':'Cr\u00e9ation ajout\u00e9e','ok'); closeModal(); loadProduits(); }
  else toast(r.error||'Erreur','error');
}

async function toggleActive(id, actif){
  const r = await api('/api/showroom/produits/'+id, { method:'PATCH', body:JSON.stringify({actif:!actif}) });
  if(r.success){ toast(actif?'D\u00e9sactiv\u00e9e':'Activ\u00e9e','ok'); loadProduits(); }
}

async function deleteProduct(id){
  if(!confirm('Supprimer cette cr\u00e9ation ?')) return;
  const r = await api('/api/showroom/produits/'+id, { method:'DELETE' });
  if(r.success){ toast('Supprim\u00e9e','ok'); loadProduits(); }
}

async function generateDescription(){
  const nom = $('f-nom').value;
  if(!nom){ toast('Entrez d\'abord le nom du produit','error'); return; }
  const btn = document.querySelector('.ia-btn');
  btn.disabled = true; btn.textContent = 'G\u00e9n\u00e9ration en cours\u2026';
  try{
    const r = await api('/api/showroom/produits/ia-description', {
      method:'POST',
      body:JSON.stringify({
        nom, categorie:$('f-categorie').value, type:$('f-type').value,
        matieres:parseCSV($('f-matieres').value), couleurs:parseCSV($('f-couleurs').value),
        metal:$('f-metal').value, pierres:$('f-pierres').value
      })
    });
    if(r.success&&r.description){ $('f-description').value = r.description; toast('Description g\u00e9n\u00e9r\u00e9e par JADOMI IA','ok'); }
    else toast(r.error||'Erreur IA','error');
  }catch(e){ toast('Erreur','error'); }
  btn.disabled = false; btn.innerHTML = '&#10024; JADOMI IA \u2014 G\u00e9n\u00e9rer la description';
}

function renderProduits(){
  let list = allProduits;
  if(currentFilter!=='all') list = list.filter(p=>p.type===currentFilter);
  const g = $('products-grid');
  if(!list.length){ g.innerHTML='<div class="empty" style="grid-column:1/-1;">Aucune cr\u00e9ation. Commencez par en ajouter une !</div>'; return; }
  g.innerHTML = list.map(p=>{
    const photo = (p.photos&&p.photos[0])?'<img src="'+esc(p.photos[0])+'">':'';
    const typeCls = p.type||'vente';
    const typeLbl = {vente:'Vente',location:'Location',sur_mesure:'Sur mesure'}[p.type]||p.type;
    let price = '';
    if(p.prix_vente) price = eur(p.prix_vente);
    else if(p.prix_location_jour) price = eur(p.prix_location_jour)+'/jour';
    else if(p.prix_sur_mesure_base) price = '\u00e0 partir de '+eur(p.prix_sur_mesure_base);
    return `<div class="product-card ${p.actif===false?'inactive':''}">
      <div class="product-img">
        <span class="product-type-tag ${typeCls}">${typeLbl}</span>
        <span class="product-status ${p.actif===false?'inactive':'active'}">${p.actif===false?'Inactif':'Actif'}</span>
        ${photo}
      </div>
      <div class="product-body">
        <h4>${esc(p.nom)}</h4>
        <div class="detail">${esc(p.categorie||'')}${p.collection?' \u2022 '+esc(p.collection):''}</div>
        <div class="product-prices">${price}</div>
        <div class="product-actions">
          <button class="btn btn-ghost btn-sm" onclick='openEditModal(${JSON.stringify(p).replace(/'/g,"\\'")})'>\u270f Modifier</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleActive('${p.id}',${p.actif!==false})">${p.actif===false?'\u2705 Activer':'\u23f8 D\u00e9sactiver'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function loadProduits(){
  societeId = new URLSearchParams(location.search).get('societe') || localStorage.getItem('jadomi_societe_id') || '';
  const { data:sd } = await db.auth.getSession();
  if(!sd?.session){ location.href='/login.html'; return; }
  token = sd.session.access_token;
  const r = await api('/api/showroom/produits');
  allProduits = r.produits || [];
  renderProduits();
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderProduits();
  });
});

// Drag & drop placeholder
const dz = $('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover'); toast('Upload de photos \u00e0 int\u00e9grer avec le stockage Supabase','ok');});

loadProduits();
</script>
</body>
