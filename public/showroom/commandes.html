<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI — Commandes Showroom</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/css/jadomi-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ms-switcher.js" defer></script>
<script src="/jadomi-legal-widget.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--sidebar-w:220px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.08) 0%,transparent 55%);-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--font);cursor:pointer;}

.nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,31,61,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;}
.nav-left{display:flex;align-items:center;gap:18px;}
.logo{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;}
.crumb{display:flex;align-items:center;gap:10px;}
.crumb-ico{font-size:20px;}
.crumb-name{font-weight:700;font-size:14px;}
.crumb-sep{color:var(--muted);font-size:12px;}
.crumb-module{font-size:13px;color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;font-weight:600;transition:all 0.15s;text-decoration:none;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0a1628 0%,#121f3a 50%,#0a1628 100%);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;transition:all 0.15s;text-decoration:none;border-left:3px solid transparent;}
.sidebar-link:hover{background:rgba(99,102,241,0.1);color:var(--text);}
.sidebar-link.active{background:rgba(99,102,241,0.15);color:var(--accent);border-left-color:var(--accent);}
.sidebar-link .ico{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.sidebar-sep{height:1px;background:var(--border);margin:12px 16px;}

.content{flex:1;padding:28px 28px 100px;max-width:1000px;min-width:0;}

.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.toolbar-left{display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:8px 16px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,0.1);}
.filter-select{padding:8px 14px;border:1px solid var(--border);border-radius:10px;background:rgba(20,40,80,0.6);font-size:12px;font-family:var(--font);color:var(--text);outline:none;}

.card{background:rgba(30,52,96,0.6);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;backdrop-filter:blur(10px);}
.card-title{font-family:var(--display);font-size:15px;font-weight:700;margin-bottom:16px;}

.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;}
.tbl th{text-align:left;padding:10px 12px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:700;border-bottom:1px solid var(--border);background:rgba(15,31,61,0.8);}
.tbl td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;background:rgba(20,40,80,0.5);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(99,102,241,0.1);cursor:pointer;}

.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
.chip.confirmee,.chip.en_cours,.chip.caution_encaissee{background:rgba(16,185,129,0.15);color:var(--success);}
.chip.en_attente,.chip.nouvelle{background:rgba(245,158,11,0.15);color:var(--warning);}
.chip.annulee,.chip.refusee{background:rgba(239,68,68,0.15);color:var(--danger);}
.chip.terminee{background:rgba(99,102,241,0.15);color:var(--accent);}
.chip.en_preparation,.chip.en_fabrication{background:rgba(59,130,246,0.15);color:#60a5fa;}
.chip.expediee,.chip.livree{background:rgba(168,85,247,0.15);color:#a78bfa;}
.chip.retour_initie,.chip.retour_recu{background:rgba(245,158,11,0.15);color:var(--warning);}
.chip.caution_restituee{background:rgba(16,185,129,0.15);color:var(--success);}
.chip.vente{background:rgba(16,185,129,0.1);color:var(--success);}
.chip.location{background:rgba(99,102,241,0.1);color:var(--accent);}
.chip.sur_mesure{background:rgba(245,158,11,0.1);color:var(--warning);}

.btn{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;transition:all 0.2s;cursor:pointer;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}

/* DETAIL PANEL */
.detail-panel{display:none;background:rgba(30,52,96,0.8);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;}
.detail-panel.show{display:block;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.detail-item{padding:12px;background:rgba(15,31,61,0.6);border-radius:10px;}
.detail-item .label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:4px;}
.detail-item .value{font-weight:700;font-size:14px;}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}

.field{margin-bottom:10px;}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px;}
.field input,.field select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);color:var(--text);background:rgba(20,40,80,0.6);outline:none;width:100%;}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:14px;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(25,45,85,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.ok{border-color:var(--success);color:var(--success);}

@media(max-width:768px){.sidebar{display:none;}.content{padding:18px 14px 80px;}.detail-grid{grid-template-columns:1fr;}.mobile-menu-btn{display:block !important;}}
.mobile-menu-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:30;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
.sidebar.mobile-open{display:flex !important;flex-direction:column;position:fixed;top:57px;left:0;bottom:0;z-index:25;width:var(--sidebar-w);}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="logo">JADOMI</div>
    <div class="crumb">
      <span class="crumb-ico">&#127912;</span>
      <span class="crumb-name">Showroom</span>
      <span class="crumb-sep">&rsaquo;</span>
      <span class="crumb-module">Commandes</span>
    </div>
  </div>
  <div class="nav-right"><a class="nav-btn" href="dashboard.html">&larr; Dashboard</a></div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <a class="sidebar-link" href="dashboard.html"><span class="ico">&#128202;</span> Vue d'ensemble</a>
      <a class="sidebar-link" href="mes-creations.html"><span class="ico">&#128717;&#65039;</span> Mes cr&eacute;ations</a>
      <a class="sidebar-link active" href="commandes.html"><span class="ico">&#128230;</span> Commandes</a>
      <a class="sidebar-link" href="planning.html"><span class="ico">&#128197;</span> Planning location</a>
      <a class="sidebar-link" href="messages.html"><span class="ico">&#128172;</span> Messages</a>
      <a class="sidebar-link" href="avis.html"><span class="ico">&#11088;</span> Avis</a>
      <a class="sidebar-link" href="revenus.html"><span class="ico">&#128176;</span> Revenus</a>
      <a class="sidebar-link" href="parametres.html"><span class="ico">&#9881;&#65039;</span> Param&egrave;tres</a>
    </nav>
  </aside>

  <main class="content">
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="filter-btn active" data-statut="">Toutes</button>
        <button class="filter-btn" data-statut="en_attente">En attente</button>
        <button class="filter-btn" data-statut="confirmee">Confirm&eacute;es</button>
        <button class="filter-btn" data-statut="expediee">Exp&eacute;di&eacute;es</button>
        <button class="filter-btn" data-statut="terminee">Termin&eacute;es</button>
      </div>
      <select class="filter-select" id="filter-type" onchange="loadCommandes()">
        <option value="">Tous types</option>
        <option value="vente">Vente</option>
        <option value="location">Location</option>
        <option value="sur_mesure">Sur mesure</option>
      </select>
    </div>

    <div class="detail-panel" id="detail-panel"></div>

    <div class="card">
      <div id="commandes-list">
        <div class="loader"><div class="spinner"></div>Chargement&hellip;</div>
      </div>
    </div>
  </main>
</div>

<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">&#9776;</button>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let token = null, societeId = null, currentStatut = '';

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function eur(n){ return (Number(n)||0).toFixed(2).replace('.',',')+' \u20ac'; }
function toast(msg,k){ const t=$('toast'); t.textContent=msg; t.className='toast show '+(k||''); setTimeout(()=>t.className='toast',2800); }
function fmtDate(d){ return d?new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}):''; }

async function api(path, opts={}) {
  try { const{data:sd}=await db.auth.getSession(); if(sd?.session) token=sd.session.access_token; } catch(_){}
  const r = await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})}});
  if(r.status===401){ try{const{data:ref}=await db.auth.refreshSession();if(ref?.session){token=ref.session.access_token;return(await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})}})).json();}}catch(_){} location.href='/login.html';return{success:false};}
  return r.json();
}

const statutLabels = {
  en_attente:'En attente',confirmee:'Confirm\u00e9e',en_preparation:'En pr\u00e9paration',
  expediee:'Exp\u00e9di\u00e9e',livree:'Livr\u00e9e',terminee:'Termin\u00e9e',annulee:'Annul\u00e9e',
  en_cours:'En cours',caution_encaissee:'Caution encaiss\u00e9e',retour_initie:'Retour initi\u00e9',
  retour_recu:'Retour re\u00e7u',caution_restituee:'Caution restitu\u00e9e',
  nouvelle:'Nouvelle',devis_envoye:'Devis envoy\u00e9',acompte_recu:'Acompte re\u00e7u',en_fabrication:'En fabrication'
};
function statutChip(s){ return '<span class="chip '+(s||'en_attente')+'">'+(statutLabels[s]||esc(s||'\u2014'))+'</span>'; }
function typeChip(t){ return '<span class="chip '+(t||'')+'">'+(t==='vente'?'Vente':t==='location'?'Location':t==='sur_mesure'?'Sur mesure':esc(t||''))+'</span>'; }

async function loadCommandes(){
  societeId = new URLSearchParams(location.search).get('societe') || localStorage.getItem('jadomi_societe_id') || '';
  const{data:sd}=await db.auth.getSession();
  if(!sd?.session){location.href='/login.html';return;}
  token=sd.session.access_token;

  let url = '/api/showroom/commandes?limit=100';
  if(currentStatut) url+='&statut='+currentStatut;
  const type = $('filter-type').value;
  if(type) url+='&type='+type;

  const r = await api(url);
  const cmds = r.commandes||[];
  const list = $('commandes-list');

  if(!cmds.length){ list.innerHTML='<div class="empty">Aucune commande</div>'; return; }

  list.innerHTML = '<table class="tbl"><thead><tr><th>Date</th><th>Client</th><th>Produit</th><th>Type</th><th>Montant</th><th>Statut</th><th>Actions</th></tr></thead><tbody>'+
    cmds.map(o=>`<tr onclick="showDetail('${o.id}')">
      <td>${fmtDate(o.created_at)}</td>
      <td>${esc(o.client_prenom||'')} ${esc(o.client_nom||'')}</td>
      <td>${esc(o.produit?.nom||'')}</td>
      <td>${typeChip(o.type)}</td>
      <td style="font-weight:700;color:var(--accent);">${eur(o.prix_total)}</td>
      <td>${statutChip(o.statut)}</td>
      <td><button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();showDetail('${o.id}')">D\u00e9tails</button></td>
    </tr>`).join('')+'</tbody></table>';
}

async function showDetail(id){
  const r = await api('/api/showroom/commandes/'+id);
  if(!r.success) return;
  const o = r.commande;
  const panel = $('detail-panel');
  const isLoc = o.type==='location';

  let nextStatuts = [];
  if(o.type==='vente'){
    const flow = ['en_attente','confirmee','en_preparation','expediee','livree','terminee'];
    const idx = flow.indexOf(o.statut);
    if(idx>=0&&idx<flow.length-1) nextStatuts = [flow[idx+1]];
  } else if(isLoc){
    const flow = ['en_attente','confirmee','caution_encaissee','en_cours','retour_initie','retour_recu','caution_restituee','terminee'];
    const idx = flow.indexOf(o.statut);
    if(idx>=0&&idx<flow.length-1) nextStatuts = [flow[idx+1]];
  }

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="font-family:var(--display);font-size:18px;font-weight:800;">Commande #${esc(o.id.slice(0,8))}</h3>
      <button class="btn btn-ghost btn-sm" onclick="$('detail-panel').classList.remove('show')">&times; Fermer</button>
    </div>
    <div class="detail-grid">
      <div class="detail-item"><div class="label">Client</div><div class="value">${esc(o.client_prenom||'')} ${esc(o.client_nom)}<br><small style="color:var(--muted);">${esc(o.client_email||'')} ${o.client_telephone?'\u2022 '+esc(o.client_telephone):''}</small></div></div>
      <div class="detail-item"><div class="label">Produit</div><div class="value">${esc(o.produit?.nom||'')}</div></div>
      <div class="detail-item"><div class="label">Type</div><div class="value">${typeChip(o.type)}</div></div>
      <div class="detail-item"><div class="label">Statut</div><div class="value">${statutChip(o.statut)}</div></div>
      <div class="detail-item"><div class="label">Montant</div><div class="value" style="color:var(--accent);font-size:18px;">${eur(o.prix_total)}</div></div>
      <div class="detail-item"><div class="label">Commission JADOMI</div><div class="value" style="color:var(--danger);">-${eur(o.commission_jadomi)}</div></div>
      ${isLoc?'<div class="detail-item"><div class="label">P\u00e9riode location</div><div class="value">'+fmtDate(o.date_debut_location)+' \u2192 '+fmtDate(o.date_fin_location)+'</div></div>':''}
      ${isLoc&&o.caution_montant?'<div class="detail-item"><div class="label">Caution</div><div class="value">'+eur(o.caution_montant)+(o.caution_encaissee?' (encaiss\u00e9e)':' (en attente)')+'</div></div>':''}
      ${o.tracking_number?'<div class="detail-item"><div class="label">Suivi</div><div class="value">'+(o.tracking_url?'<a href="'+esc(o.tracking_url)+'" target="_blank">'+esc(o.tracking_number)+'</a>':esc(o.tracking_number))+'</div></div>':''}
      ${o.client_adresse?'<div class="detail-item"><div class="label">Adresse</div><div class="value">'+esc(o.client_adresse)+'</div></div>':''}
    </div>
    <div class="detail-actions" id="detail-actions">
      ${nextStatuts.map(s=>'<button class="btn btn-primary btn-sm" onclick="updateStatut(\''+o.id+'\',\''+s+'\')">Passer \u00e0 : '+esc(statutLabels[s]||s)+'</button>').join('')}
      ${o.statut==='confirmee'&&o.type==='vente'?'<div style="display:flex;gap:8px;align-items:end;"><div class="field" style="margin:0;"><label>N\u00b0 suivi</label><input id="tracking-num" placeholder="Num\u00e9ro de suivi"></div><div class="field" style="margin:0;"><label>URL suivi</label><input id="tracking-url" placeholder="https://..."></div><button class="btn btn-success btn-sm" onclick="expedier(\''+o.id+'\')">Exp\u00e9dier</button></div>':''}
      ${isLoc&&o.statut==='en_cours'?'<button class="btn btn-primary btn-sm" onclick="updateStatut(\''+o.id+'\',\'retour_initie\')">Initier le retour</button>':''}
      ${isLoc&&o.statut==='retour_recu'?'<button class="btn btn-success btn-sm" onclick="restitueCaution(\''+o.id+'\')">Restituer la caution</button>':''}
      ${!['terminee','annulee'].includes(o.statut)?'<button class="btn btn-danger btn-sm" onclick="updateStatut(\''+o.id+'\',\'annulee\')">Annuler</button>':''}
    </div>`;
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth'});
}

async function updateStatut(id, statut){
  const r = await api('/api/showroom/commandes/'+id+'/statut',{method:'PATCH',body:JSON.stringify({statut})});
  if(r.success){ toast('Statut mis \u00e0 jour','ok'); loadCommandes(); showDetail(id); }
  else toast(r.error||'Erreur','error');
}

async function expedier(id){
  const tn = document.getElementById('tracking-num')?.value||'';
  const tu = document.getElementById('tracking-url')?.value||'';
  const r = await api('/api/showroom/commandes/'+id+'/statut',{method:'PATCH',body:JSON.stringify({statut:'expediee',tracking_number:tn,tracking_url:tu})});
  if(r.success){ toast('Commande exp\u00e9di\u00e9e','ok'); loadCommandes(); showDetail(id); }
  else toast(r.error||'Erreur','error');
}

async function restitueCaution(id){
  const r = await api('/api/showroom/commandes/'+id+'/caution',{method:'POST',body:JSON.stringify({action:'restituer'})});
  if(r.success){ toast('Caution restitu\u00e9e','ok'); loadCommandes(); showDetail(id); }
  else toast(r.error||'Erreur','error');
}

// Filters
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentStatut = btn.dataset.statut;
    loadCommandes();
  });
});

loadCommandes();
</script>
</body>
</html>
