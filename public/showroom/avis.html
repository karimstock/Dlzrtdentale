<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI Showroom &mdash; Avis Clients</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/css/jadomi-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ms-switcher.js" defer></script>
<script src="/jadomi-legal-widget.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--sidebar-w:220px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.08) 0%,transparent 55%);-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--font);cursor:pointer;}

.nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,31,61,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;}
.nav-left{display:flex;align-items:center;gap:18px;}
.logo{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;}
.crumb{display:flex;align-items:center;gap:10px;}
.crumb-ico{font-size:20px;}
.crumb-name{font-weight:700;font-size:14px;}
.crumb-sep{color:var(--muted);font-size:12px;}
.crumb-module{font-size:13px;color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;font-weight:600;transition:all 0.15s;text-decoration:none;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0a1628 0%,#121f3a 50%,#0a1628 100%);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;transition:all 0.15s;text-decoration:none;border-left:3px solid transparent;}
.sidebar-link:hover{background:rgba(99,102,241,0.1);color:var(--text);}
.sidebar-link.active{background:rgba(99,102,241,0.15);color:var(--accent);border-left-color:var(--accent);}
.sidebar-link .ico{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.sidebar-sep{height:1px;background:var(--border);margin:12px 16px;}

.content{flex:1;padding:28px 28px 100px;max-width:960px;min-width:0;}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.stat{background:rgba(30,52,96,0.6);border:1px solid var(--border);border-radius:16px;padding:22px;position:relative;overflow:hidden;backdrop-filter:blur(10px);transition:border-color 0.3s ease,box-shadow 0.3s ease;}
.stat:hover{border-color:rgba(99,102,241,0.4);box-shadow:0 0 30px rgba(99,102,241,0.15);}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.stat-val{font-family:var(--display);font-size:26px;font-weight:800;letter-spacing:-1px;}
.stat.accent .stat-val{color:var(--accent);}
.stat.warn .stat-val{color:var(--warning);}
.stat.ok .stat-val{color:var(--success);}

.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.toolbar-left{display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:8px 16px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,0.1);}

.card{background:rgba(30,52,96,0.6);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;backdrop-filter:blur(10px);transition:border-color 0.3s ease,box-shadow 0.3s ease;}
.card:hover{border-color:rgba(99,102,241,0.4);box-shadow:0 0 30px rgba(99,102,241,0.15);}

.star{color:#f59e0b;}
.star-empty{color:var(--muted);}
.star-big{font-size:28px;}

.avis-item{padding:20px 0;border-bottom:1px solid var(--border);}
.avis-item:last-child{border-bottom:none;}
.avis-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.avis-client{font-weight:700;font-size:14px;}
.avis-date{font-size:12px;color:var(--muted);}
.avis-product{font-size:12px;color:var(--accent);margin-bottom:6px;}
.avis-comment{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px;}
.avis-reponse{background:rgba(99,102,241,0.08);border-left:3px solid var(--accent);padding:12px 14px;border-radius:0 10px 10px 0;margin-top:10px;font-size:12px;}
.avis-reponse-label{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:4px;letter-spacing:0.5px;}
.avis-reponse-text{color:var(--text);}

.reply-form{margin-top:10px;display:none;}
.reply-form.show{display:block;}
.reply-form textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;background:rgba(20,40,80,0.6);color:var(--text);font-size:13px;font-family:var(--font);outline:none;resize:vertical;min-height:80px;}
.reply-form textarea:focus{border-color:var(--accent);}
.reply-actions{display:flex;gap:8px;margin-top:8px;justify-content:flex-end;}

.btn{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;transition:all 0.2s;cursor:pointer;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(99,102,241,0.3);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:6px 12px;font-size:11px;}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:14px;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(25,45,85,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.ok{border-color:var(--success);color:var(--success);}

.animate-fade-in{animation:fadeInUp 0.4s ease both;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:1024px){.stats{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){.sidebar{display:none;}.content{padding:18px 14px 80px;}.stats{grid-template-columns:1fr;}.mobile-menu-btn{display:block !important;}}
.mobile-menu-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:30;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
.sidebar.mobile-open{display:flex !important;flex-direction:column;position:fixed;top:57px;left:0;bottom:0;z-index:25;width:var(--sidebar-w);}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="logo">JADOMI</div>
    <div class="crumb">
      <span class="crumb-ico">&#127912;</span>
      <span class="crumb-name">Showroom</span>
      <span class="crumb-sep">&rsaquo;</span>
      <span class="crumb-module">Avis clients</span>
    </div>
  </div>
  <div class="nav-right"><a class="nav-btn" href="dashboard.html">&larr; Dashboard</a></div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <a class="sidebar-link" href="dashboard.html"><span class="ico">&#128202;</span> Vue d'ensemble</a>
      <a class="sidebar-link" href="mes-creations.html"><span class="ico">&#128717;&#65039;</span> Mes cr&eacute;ations</a>
      <a class="sidebar-link" href="commandes.html"><span class="ico">&#128230;</span> Commandes</a>
      <a class="sidebar-link" href="stock.html"><span class="ico">&#128230;</span> Stock</a>
      <a class="sidebar-link" href="planning.html"><span class="ico">&#128197;</span> Planning location</a>
      <a class="sidebar-link" href="messages.html"><span class="ico">&#128172;</span> Messages</a>
      <a class="sidebar-link active" href="avis.html"><span class="ico">&#11088;</span> Avis</a>
      <a class="sidebar-link" href="revenus.html"><span class="ico">&#128176;</span> Revenus</a>
      <a class="sidebar-link" href="parametres.html"><span class="ico">&#9881;&#65039;</span> Param&egrave;tres</a>
      <div class="sidebar-sep"></div>
      <a class="sidebar-link" href="/showroom/" target="_blank"><span class="ico">&#128279;</span> Ma boutique</a>
    </nav>
  </aside>

  <main class="content">
    <div class="stats" id="stats-grid">
      <div class="stat warn animate-fade-in">
        <div class="stat-label">Note moyenne</div>
        <div class="stat-val" id="stat-note">
          <span id="stat-note-val">-</span>
          <span style="font-size:14px;color:var(--muted);font-weight:400;"> / 5</span>
        </div>
        <div id="stat-stars" style="margin-top:4px;"></div>
      </div>
      <div class="stat accent animate-fade-in" style="animation-delay:0.05s;">
        <div class="stat-label">Total avis</div>
        <div class="stat-val" id="stat-total">0</div>
      </div>
      <div class="stat ok animate-fade-in" style="animation-delay:0.1s;">
        <div class="stat-label">Avis r&eacute;cents (30j)</div>
        <div class="stat-val" id="stat-recent">0</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="filter-btn active" data-filter="tous" onclick="setFilter('tous',this)">Tous</button>
        <button class="filter-btn" data-filter="sans_reponse" onclick="setFilter('sans_reponse',this)">Sans r&eacute;ponse</button>
        <button class="filter-btn" data-filter="avec_reponse" onclick="setFilter('avec_reponse',this)">Avec r&eacute;ponse</button>
      </div>
    </div>

    <div class="card animate-fade-in" style="animation-delay:0.15s;">
      <div id="avis-list">
        <div class="loader"><div class="spinner"></div>Chargement&hellip;</div>
      </div>
    </div>
  </main>
</div>

<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">&#9776;</button>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let token = null, societeId = null;
let allAvis = [], currentFilter = 'tous';

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg,k){ const t=$('toast'); t.textContent=msg; t.className='toast show '+(k||''); setTimeout(()=>t.className='toast',2800); }
function fmtDate(d){ return d?new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}):''; }

function renderStars(n, big){
  let s = '';
  for(let i=1;i<=5;i++) s += i<=n ? '<span class="star'+(big?' star-big':'')+'">&#9733;</span>' : '<span class="star-empty'+(big?' star-big':'')+'">&#9734;</span>';
  return s;
}

async function api(path, opts={}) {
  try { const{data:sd}=await db.auth.getSession(); if(sd?.session) token=sd.session.access_token; } catch(_){}
  const r = await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})}});
  if(r.status===401){ try{const{data:ref}=await db.auth.refreshSession();if(ref?.session){token=ref.session.access_token;return(await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})}})).json();}}catch(_){} location.href='/login.html';return{success:false};}
  return r.json();
}

function setFilter(filter, btn){
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAvis();
}

function toggleReply(id){
  const form = document.getElementById('reply-form-'+id);
  if(form) form.classList.toggle('show');
}

async function submitReply(id){
  const textarea = document.getElementById('reply-text-'+id);
  const text = textarea?.value.trim();
  if(!text) return;

  const btn = document.getElementById('reply-btn-'+id);
  if(btn) btn.disabled = true;

  const r = await api('/api/showroom/avis/'+id+'/reponse', {
    method: 'PATCH',
    body: JSON.stringify({ reponse: text })
  });

  if(r.success){
    toast('R\u00e9ponse envoy\u00e9e', 'ok');
    // Update local data
    const avis = allAvis.find(a => a.id === id);
    if(avis) avis.reponse_createur = text;
    renderAvis();
  } else {
    toast(r.error || 'Erreur', 'error');
    if(btn) btn.disabled = false;
  }
}

function renderAvis(){
  let filtered = allAvis;
  if(currentFilter === 'sans_reponse') filtered = allAvis.filter(a => !a.reponse_createur);
  if(currentFilter === 'avec_reponse') filtered = allAvis.filter(a => a.reponse_createur);

  const list = $('avis-list');
  if(!filtered.length){
    list.innerHTML = '<div class="empty">Aucun avis' + (currentFilter!=='tous'?' dans cette cat\u00e9gorie':'') + '</div>';
    return;
  }

  list.innerHTML = filtered.map(a => `
    <div class="avis-item">
      <div class="avis-header">
        <div>
          <span class="avis-client">${esc(a.client_nom||'Client anonyme')}</span>
          <span style="margin-left:8px;">${renderStars(a.note)}</span>
        </div>
        <span class="avis-date">${fmtDate(a.created_at)}</span>
      </div>
      ${a.produit_nom ? '<div class="avis-product">&#128717;&#65039; '+esc(a.produit_nom)+'</div>' : ''}
      <div class="avis-comment">${esc(a.commentaire||'')}</div>
      ${a.reponse_createur ? `
        <div class="avis-reponse">
          <div class="avis-reponse-label">Votre r&eacute;ponse</div>
          <div class="avis-reponse-text">${esc(a.reponse_createur)}</div>
        </div>
      ` : `
        <button class="btn btn-ghost btn-sm" onclick="toggleReply('${a.id}')">&#128172; R&eacute;pondre</button>
        <div class="reply-form" id="reply-form-${a.id}">
          <textarea id="reply-text-${a.id}" placeholder="&Eacute;crivez votre r&eacute;ponse&hellip;"></textarea>
          <div class="reply-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleReply('${a.id}')">Annuler</button>
            <button class="btn btn-primary btn-sm" id="reply-btn-${a.id}" onclick="submitReply('${a.id}')">Envoyer la r&eacute;ponse</button>
          </div>
        </div>
      `}
    </div>
  `).join('');
}

async function loadAvis(){
  societeId = new URLSearchParams(location.search).get('societe') || localStorage.getItem('jadomi_societe_id') || '';
  const{data:sd}=await db.auth.getSession();
  if(!sd?.session){location.href='/login.html';return;}
  token=sd.session.access_token;

  const r = await api('/api/showroom/avis');
  allAvis = r.avis || [];

  // Stats
  const total = allAvis.length;
  const avg = total > 0 ? (allAvis.reduce((s,a)=>s+(a.note||0),0)/total) : 0;
  const thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(thirtyDaysAgo.getDate()-30);
  const recent = allAvis.filter(a => new Date(a.created_at) >= thirtyDaysAgo).length;

  $('stat-note-val').textContent = avg > 0 ? avg.toFixed(1).replace('.',',') : '-';
  $('stat-stars').innerHTML = avg > 0 ? renderStars(Math.round(avg)) : '';
  $('stat-total').textContent = total;
  $('stat-recent').textContent = recent;

  renderAvis();
}

loadAvis();
</script>
</body>
</html>
