<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI Showroom &mdash; Planning Location</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/public/css/jadomi-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/ms-switcher.js" defer></script>
<script src="/jadomi-legal-widget.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--sidebar-w:220px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.08) 0%,transparent 55%);-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--font);cursor:pointer;}

.nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,31,61,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;}
.nav-left{display:flex;align-items:center;gap:18px;}
.logo{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;}
.crumb{display:flex;align-items:center;gap:10px;}
.crumb-ico{font-size:20px;}
.crumb-name{font-weight:700;font-size:14px;}
.crumb-sep{color:var(--muted);font-size:12px;}
.crumb-module{font-size:13px;color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;font-weight:600;transition:all 0.15s;text-decoration:none;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0a1628 0%,#121f3a 50%,#0a1628 100%);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;transition:all 0.15s;text-decoration:none;border-left:3px solid transparent;}
.sidebar-link:hover{background:rgba(99,102,241,0.1);color:var(--text);}
.sidebar-link.active{background:rgba(99,102,241,0.15);color:var(--accent);border-left-color:var(--accent);}
.sidebar-link .ico{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.sidebar-sep{height:1px;background:var(--border);margin:12px 16px;}

.content{flex:1;padding:28px 28px 100px;max-width:1000px;min-width:0;}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.stat{background:rgba(30,52,96,0.6);border:1px solid var(--border);border-radius:16px;padding:22px;position:relative;overflow:hidden;backdrop-filter:blur(10px);transition:border-color 0.3s ease,box-shadow 0.3s ease;}
.stat:hover{border-color:rgba(99,102,241,0.4);box-shadow:0 0 30px rgba(99,102,241,0.15);}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.stat-val{font-family:var(--display);font-size:26px;font-weight:800;letter-spacing:-1px;}
.stat.accent .stat-val{color:var(--accent);}
.stat.warn .stat-val{color:var(--warning);}
.stat.ok .stat-val{color:var(--success);}
.stat.danger .stat-val{color:var(--danger);}

.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.toolbar-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.filter-select{padding:8px 14px;border:1px solid var(--border);border-radius:10px;background:rgba(20,40,80,0.6);font-size:12px;font-family:var(--font);color:var(--text);outline:none;}

.card{background:rgba(30,52,96,0.6);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;backdrop-filter:blur(10px);}
.card-title{font-family:var(--display);font-size:15px;font-weight:700;margin-bottom:16px;}

.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-header h2{font-family:var(--display);font-size:18px;font-weight:800;}
.cal-nav{display:flex;gap:8px;}
.cal-nav button{padding:8px 14px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.cal-nav button:hover{border-color:var(--accent);color:var(--accent);}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day-head{text-align:center;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;padding:8px 0;letter-spacing:0.5px;}
.cal-cell{min-height:80px;background:rgba(15,31,61,0.5);border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;transition:all 0.15s;}
.cal-cell:hover{border-color:rgba(99,102,241,0.4);}
.cal-cell.other-month{opacity:0.35;}
.cal-cell.today{border-color:var(--accent);box-shadow:0 0 12px rgba(99,102,241,0.2);}
.cal-date{font-size:11px;font-weight:700;margin-bottom:4px;color:var(--muted);}
.cal-event{font-size:9px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;cursor:pointer;}
.cal-event.reserved{background:rgba(239,68,68,0.2);color:var(--danger);}
.cal-event.available{background:rgba(16,185,129,0.2);color:var(--success);}
.cal-event.pending{background:rgba(245,158,11,0.2);color:var(--warning);}

.legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.legend-dot.reserved{background:rgba(239,68,68,0.5);}
.legend-dot.available{background:rgba(16,185,129,0.5);}
.legend-dot.pending{background:rgba(245,158,11,0.5);}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:rgba(20,38,75,0.98);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.modal h3{font-family:var(--display);font-size:18px;font-weight:800;margin-bottom:16px;}
.modal-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.modal-row .label{color:var(--muted);font-weight:600;}
.modal-row .value{font-weight:700;}
.modal-close{margin-top:16px;padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;background:var(--accent);color:#fff;cursor:pointer;}

.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
.chip.confirmee,.chip.en_cours,.chip.caution_encaissee{background:rgba(16,185,129,0.15);color:var(--success);}
.chip.en_attente{background:rgba(245,158,11,0.15);color:var(--warning);}
.chip.annulee{background:rgba(239,68,68,0.15);color:var(--danger);}
.chip.terminee{background:rgba(99,102,241,0.15);color:var(--accent);}
.chip.retour_initie,.chip.retour_recu{background:rgba(245,158,11,0.15);color:var(--warning);}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:14px;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(25,45,85,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.ok{border-color:var(--success);color:var(--success);}

.animate-fade-in{animation:fadeInUp 0.4s ease both;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:1024px){.stats{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){.sidebar{display:none;}.content{padding:18px 14px 80px;}.stats{grid-template-columns:1fr;}.cal-cell{min-height:50px;}.mobile-menu-btn{display:block !important;}}
.mobile-menu-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:30;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
.sidebar.mobile-open{display:flex !important;flex-direction:column;position:fixed;top:57px;left:0;bottom:0;z-index:25;width:var(--sidebar-w);}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="logo">JADOMI</div>
    <div class="crumb">
      <span class="crumb-ico">&#127912;</span>
      <span class="crumb-name">Showroom</span>
      <span class="crumb-sep">&rsaquo;</span>
      <span class="crumb-module">Planning location</span>
    </div>
  </div>
  <div class="nav-right"><a class="nav-btn" href="dashboard.html">&larr; Dashboard</a></div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <a class="sidebar-link" href="dashboard.html"><span class="ico">&#128202;</span> Vue d'ensemble</a>
      <a class="sidebar-link" href="mes-creations.html"><span class="ico">&#128717;&#65039;</span> Mes cr&eacute;ations</a>
      <a class="sidebar-link" href="commandes.html"><span class="ico">&#128230;</span> Commandes</a>
      <a class="sidebar-link" href="stock.html"><span class="ico">&#128230;</span> Stock</a>
      <a class="sidebar-link active" href="planning.html"><span class="ico">&#128197;</span> Planning location</a>
      <a class="sidebar-link" href="messages.html"><span class="ico">&#128172;</span> Messages</a>
      <a class="sidebar-link" href="avis.html"><span class="ico">&#11088;</span> Avis</a>
      <a class="sidebar-link" href="revenus.html"><span class="ico">&#128176;</span> Revenus</a>
      <a class="sidebar-link" href="parametres.html"><span class="ico">&#9881;&#65039;</span> Param&egrave;tres</a>
      <div class="sidebar-sep"></div>
      <a class="sidebar-link" href="/showroom/" target="_blank"><span class="ico">&#128279;</span> Ma boutique</a>
    </nav>
  </aside>

  <main class="content">
    <div class="stats" id="stats-grid">
      <div class="stat accent animate-fade-in">
        <div class="stat-label">Locations en cours</div>
        <div class="stat-val" id="stat-en-cours">0</div>
      </div>
      <div class="stat ok animate-fade-in" style="animation-delay:0.05s;">
        <div class="stat-label">Revenus location mois</div>
        <div class="stat-val" id="stat-revenus">0,00 &euro;</div>
      </div>
      <div class="stat warn animate-fade-in" style="animation-delay:0.1s;">
        <div class="stat-label">Retours en attente</div>
        <div class="stat-val" id="stat-retours">0</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <label style="font-size:12px;color:var(--muted);font-weight:600;">Filtrer par produit :</label>
        <select class="filter-select" id="filter-produit" onchange="renderCalendar()">
          <option value="">Tous les produits</option>
        </select>
      </div>

    <div class="card animate-fade-in" style="animation-delay:0.15s;">
      <div class="cal-header">
        <div class="cal-nav">
          <button onclick="changeMonth(-1)">&larr; Pr&eacute;c&eacute;dent</button>
        </div>
        <h2 id="cal-title"></h2>
        <div class="cal-nav">
          <button onclick="changeMonth(1)">Suivant &rarr;</button>

      <div class="cal-grid" id="cal-grid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot reserved"></div> R&eacute;serv&eacute;</div>
        <div class="legend-item"><div class="legend-dot pending"></div> En attente</div>
        <div class="legend-item"><div class="legend-dot available"></div> Disponible</div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">&#9776;</button>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let token = null, societeId = null;
let currentYear, currentMonth;
let locations = [];

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function eur(n){ return (Number(n)||0).toFixed(2).replace('.',',')+' \u20ac'; }
function toast(msg,k){ const t=$('toast'); t.textContent=msg; t.className='toast show '+(k||''); setTimeout(()=>t.className='toast',2800); }
function fmtDate(d){ return d?new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}):''; }

const statutLabels = {
  en_attente:'En attente',confirmee:'Confirm\u00e9e',en_cours:'En cours',
  caution_encaissee:'Caution encaiss\u00e9e',retour_initie:'Retour initi\u00e9',
  retour_recu:'Retour re\u00e7u',caution_restituee:'Caution restitu\u00e9e',
  terminee:'Termin\u00e9e',annulee:'Annul\u00e9e'
};
function statutChip(s){ return '<span class="chip '+(s||'en_attente')+'">'+(statutLabels[s]||esc(s||'\u2014'))+'</span>'; }

async function api(path, opts={}) {
  try { const{data:sd}=await db.auth.getSession(); if(sd?.session) token=sd.session.access_token; } catch(_){}
  const r = await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})}});
  if(r.status===401){ try{const{data:ref}=await db.auth.refreshSession();if(ref?.session){token=ref.session.access_token;return(await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-Societe-Id':societeId,...(opts.headers||{})}})).json();}}catch(_){} location.href='/login.html';return{success:false};}
  return r.json();
}

function changeMonth(delta){
  currentMonth += delta;
  if(currentMonth > 11){ currentMonth=0; currentYear++; }
  if(currentMonth < 0){ currentMonth=11; currentYear--; }
  renderCalendar();
}

function getEventClass(loc){
  if(['annulee','terminee','caution_restituee'].includes(loc.statut)) return 'available';
  if(loc.statut==='en_attente') return 'pending';
  return 'reserved';
}

function renderCalendar(){
  const months = ['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
  $('cal-title').textContent = months[currentMonth] + ' ' + currentYear;

  const filterProduit = $('filter-produit').value;
  const filtered = filterProduit ? locations.filter(l => l.produit_id === filterProduit) : locations;

  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay = new Date(currentYear, currentMonth + 1, 0);
  let startDay = firstDay.getDay(); // 0=Sun
  startDay = startDay === 0 ? 6 : startDay - 1; // Convert to Mon=0

  const daysInMonth = lastDay.getDate();
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  let html = dayNames.map(d => '<div class="cal-day-head">'+d+'</div>').join('');

  // Previous month days
  const prevLast = new Date(currentYear, currentMonth, 0).getDate();
  for(let i = startDay - 1; i >= 0; i--){
    html += '<div class="cal-cell other-month"><div class="cal-date">'+(prevLast - i)+'</div></div>';
  }

  // Current month days
  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = currentYear + '-' + String(currentMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isToday = dateStr === todayStr;
    const dayLocs = filtered.filter(loc => {
      const start = (loc.date_debut_location||'').slice(0,10);
      const end = (loc.date_fin_location||'').slice(0,10);
      return dateStr >= start && dateStr <= end;
    });

    html += '<div class="cal-cell'+(isToday?' today':'')+'" onclick="showDayDetail(\''+dateStr+'\')">';
    html += '<div class="cal-date">'+d+'</div>';
    dayLocs.slice(0,3).forEach(loc => {
      const cls = getEventClass(loc);
      html += '<div class="cal-event '+cls+'" onclick="event.stopPropagation();showLocDetail(\''+loc.id+'\')" title="'+esc(loc.produit?.nom||'')+'">';
      html += esc((loc.produit?.nom||'').slice(0,15));
      html += '</div>';
    });
    if(dayLocs.length > 3) html += '<div style="font-size:9px;color:var(--muted);">+' + (dayLocs.length-3) + ' autres</div>';
    html += '</div>';
  }

  // Next month days
  const totalCells = startDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for(let i = 1; i <= remaining; i++){
    html += '<div class="cal-cell other-month"><div class="cal-date">'+i+'</div></div>';
  }

  $('cal-grid').innerHTML = html;
}

function showLocDetail(id){
  const loc = locations.find(l => l.id === id);
  if(!loc) return;
  $('modal-content').innerHTML = `
    <h3>&#128197; Location #${esc(id.slice(0,8))}</h3>
    <div class="modal-row"><span class="label">Produit</span><span class="value">${esc(loc.produit?.nom||'')}</span></div>
    <div class="modal-row"><span class="label">Client</span><span class="value">${esc(loc.client_prenom||'')} ${esc(loc.client_nom||'')}</span></div>
    <div class="modal-row"><span class="label">T&eacute;l&eacute;phone</span><span class="value">${esc(loc.client_telephone||'\u2014')}</span></div>
    <div class="modal-row"><span class="label">P&eacute;riode</span><span class="value">${fmtDate(loc.date_debut_location)} &rarr; ${fmtDate(loc.date_fin_location)}</span></div>
    <div class="modal-row"><span class="label">Montant</span><span class="value" style="color:var(--accent);">${eur(loc.prix_total)}</span></div>
    <div class="modal-row"><span class="label">Caution</span><span class="value">${loc.caution_montant ? eur(loc.caution_montant) : '\u2014'}</span></div>
    <div class="modal-row"><span class="label">Statut</span><span class="value">${statutChip(loc.statut)}</span></div>
    <button class="modal-close" onclick="$('modal-overlay').classList.remove('show')">Fermer</button>
  `;
  $('modal-overlay').classList.add('show');
}

function showDayDetail(dateStr){
  const filterProduit = $('filter-produit').value;
  const filtered = filterProduit ? locations.filter(l => l.produit_id === filterProduit) : locations;
  const dayLocs = filtered.filter(loc => {
    const start = (loc.date_debut_location||'').slice(0,10);
    const end = (loc.date_fin_location||'').slice(0,10);
    return dateStr >= start && dateStr <= end;
  });
  if(!dayLocs.length) return;

  const d = new Date(dateStr);
  const dateLabel = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  $('modal-content').innerHTML = `
    <h3>&#128197; ${esc(dateLabel)}</h3>
    ${dayLocs.map(loc => `
      <div style="padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="showLocDetail('${loc.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-weight:700;font-size:13px;">${esc(loc.produit?.nom||'')}</div>
            <div style="font-size:12px;color:var(--muted);">${esc(loc.client_prenom||'')} ${esc(loc.client_nom||'')} &middot; ${fmtDate(loc.date_debut_location)} &rarr; ${fmtDate(loc.date_fin_location)}</div>
          </div>
          ${statutChip(loc.statut)}
        </div>
      </div>
    `).join('')}
    <button class="modal-close" onclick="$('modal-overlay').classList.remove('show')">Fermer</button>
  `;
  $('modal-overlay').classList.add('show');
}

function closeModal(e){
  if(e.target === $('modal-overlay')) $('modal-overlay').classList.remove('show');
}

async function loadPlanning(){
  societeId = new URLSearchParams(location.search).get('societe') || localStorage.getItem('jadomi_societe_id') || '';
  const{data:sd}=await db.auth.getSession();
  if(!sd?.session){location.href='/login.html';return;}
  token=sd.session.access_token;

  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();

  const r = await api('/api/showroom/commandes?type=location&limit=500');
  locations = r.commandes || [];

  // Stats
  const enCours = locations.filter(l => ['confirmee','en_cours','caution_encaissee'].includes(l.statut)).length;
  const retours = locations.filter(l => ['retour_initie'].includes(l.statut)).length;
  const moisActuel = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const revenusMois = locations.filter(l => (l.created_at||'').slice(0,7)===moisActuel && !['annulee'].includes(l.statut))
    .reduce((sum,l) => sum + (Number(l.prix_total)||0), 0);

  $('stat-en-cours').textContent = enCours;
  $('stat-revenus').textContent = eur(revenusMois);
  $('stat-retours').textContent = retours;

  // Product filter
  const produits = {};
  locations.forEach(l => { if(l.produit?.id && l.produit?.nom) produits[l.produit.id] = l.produit.nom; });
  const select = $('filter-produit');
  Object.entries(produits).forEach(([id,nom]) => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = nom;
    select.appendChild(opt);
  });

  renderCalendar();
}

loadPlanning();
</script>
</body>
</html>
