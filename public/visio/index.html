<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI — Visioconference</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;--surface:#1a1a2e;--surface2:#252540;
  --border:rgba(99,102,241,0.25);--text:#f1f5f9;--muted:#94a3b8;
  --accent:#6366f1;--accent-soft:rgba(99,102,241,0.15);
  --red:#ef4444;--green:#10b981;--orange:#f59e0b;
  --font:'Inter',system-ui,sans-serif;--display:'Syne',sans-serif;
  --trans:cubic-bezier(0.16,1,0.3,1);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--font);cursor:pointer;}

/* LAYOUT */
.visio-layout{display:flex;height:100vh;width:100vw;}
.visio-main{flex:1;display:flex;flex-direction:column;position:relative;}
.visio-sidebar{width:340px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.3s var(--trans);}
.visio-sidebar.collapsed{width:0;overflow:hidden;border:none;}

/* TOP BAR */
.visio-top{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(10,10,15,0.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);z-index:5;flex-shrink:0;}
.visio-logo{font-family:var(--display);font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.visio-info{display:flex;align-items:center;gap:16px;}
.timer{font-family:var(--display);font-size:16px;font-weight:700;color:var(--text);letter-spacing:1px;}
.timer-warning{color:var(--orange);animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.conn-status{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;}
.conn-status.connecting{background:rgba(245,158,11,0.15);color:var(--orange);}
.conn-status.connected{background:rgba(16,185,129,0.15);color:var(--green);}
.conn-status.disconnected{background:rgba(239,68,68,0.15);color:var(--red);}

/* VIDEO AREA */
.video-area{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;}
#remote-video{width:100%;height:100%;object-fit:contain;background:#111;}
#local-video{position:absolute;bottom:20px;right:20px;width:200px;height:150px;border-radius:12px;border:2px solid var(--border);object-fit:cover;background:#1a1a2e;z-index:3;cursor:move;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.no-video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:14px;gap:12px;z-index:1;}
.no-video-placeholder .icon{font-size:64px;opacity:0.3;}

/* CONTROLS */
.controls{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10;padding:14px 22px;background:rgba(10,10,15,0.85);backdrop-filter:blur(12px);border-radius:20px;border:1px solid var(--border);}
.ctrl-btn{width:52px;height:52px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:22px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;position:relative;}
.ctrl-btn:hover{border-color:var(--accent);background:var(--accent-soft);}
.ctrl-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.ctrl-btn.danger{background:var(--red);border-color:var(--red);color:#fff;}
.ctrl-btn.danger:hover{background:#dc2626;}
.ctrl-btn.muted-state{background:rgba(239,68,68,0.2);border-color:var(--red);color:var(--red);}
.ctrl-btn .label{position:absolute;bottom:-20px;font-size:9px;color:var(--muted);white-space:nowrap;font-weight:600;}

/* SIDEBAR TABS */
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);}
.sidebar-tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.15s;}
.sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.sidebar-tab:hover{color:var(--text);}

.sidebar-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.sidebar-panel.active{display:flex;}

/* CHAT */
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.4;word-break:break-word;}
.chat-msg.self{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.chat-msg.other{align-self:flex-start;background:var(--surface2);color:var(--text);border-bottom-left-radius:4px;}
.chat-msg .msg-time{font-size:9px;opacity:0.6;margin-top:4px;}
.chat-msg .msg-sender{font-size:10px;font-weight:700;margin-bottom:2px;opacity:0.7;}
.chat-input-wrap{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;}
.chat-input{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;resize:none;}
.chat-input:focus{border-color:var(--accent);}
.chat-send{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;transition:all 0.15s;}
.chat-send:hover{background:#4f46e5;}

/* DOCS */
.docs-area{flex:1;overflow-y:auto;padding:16px;}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;margin-bottom:8px;font-size:13px;cursor:pointer;transition:background 0.15s;}
.doc-item:hover{background:rgba(99,102,241,0.1);}
.doc-item .ico{font-size:20px;}
.doc-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.doc-upload{padding:12px;border-top:1px solid var(--border);}
.doc-upload-btn{width:100%;padding:12px;background:var(--surface2);border:2px dashed var(--border);border-radius:10px;color:var(--muted);font-size:13px;text-align:center;cursor:pointer;transition:all 0.15s;}
.doc-upload-btn:hover{border-color:var(--accent);color:var(--accent);}

/* PDF VIEWER */
.pdf-viewer{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:50;display:none;flex-direction:column;}
.pdf-viewer.show{display:flex;}
.pdf-viewer-header{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);}
.pdf-viewer iframe{flex:1;border:none;background:#fff;}

/* ALERT */
.time-alert{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(245,158,11,0.95);color:#000;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:20;box-shadow:0 8px 32px rgba(245,158,11,0.3);display:none;animation:fadeIn 0.3s ease;}
.time-alert.show{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--red);color:var(--red);}
.toast.ok{border-color:var(--green);color:var(--green);}

.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .visio-sidebar{width:100%;position:fixed;bottom:0;height:50vh;border-left:none;border-top:1px solid var(--border);z-index:15;transform:translateY(100%);}
  .visio-sidebar.mobile-open{transform:translateY(0);}
  .visio-sidebar.collapsed{transform:translateY(100%);}
  #local-video{width:120px;height:90px;bottom:100px;right:12px;}
  .controls{bottom:12px;gap:8px;padding:10px 16px;}
  .ctrl-btn{width:44px;height:44px;font-size:18px;}
  .ctrl-btn .label{display:none;}
}
</style>
</head>
<body>

<div class="visio-layout">
  <div class="visio-main">
    <!-- TOP BAR -->
    <div class="visio-top">
      <div class="visio-logo">JADOMI <span style="font-size:12px;color:var(--muted);font-weight:400;">Visioconference</span></div>
      <div class="visio-info">
        <span class="conn-status connecting" id="conn-status">Connexion...</span>
        <span class="timer" id="timer">00:00:00</span>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="video-area" id="video-area">
      <div class="no-video-placeholder" id="no-video">
        <div class="icon">&#128249;</div>
        <div>En attente de l'autre participant...</div>
        <div style="font-size:12px;">Assurez-vous d'autoriser l'acces a votre camera et microphone</div>
      </div>
      <video id="remote-video" autoplay playsinline style="display:none;"></video>
      <video id="local-video" autoplay playsinline muted></video>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button class="ctrl-btn active" id="btn-mic" onclick="toggleMic()" title="Microphone">
        &#127908;
        <span class="label">Micro</span>
      </button>
      <button class="ctrl-btn active" id="btn-cam" onclick="toggleCam()" title="Camera">
        &#127909;
        <span class="label">Camera</span>
      </button>
      <button class="ctrl-btn" id="btn-screen" onclick="toggleScreen()" title="Partager l'ecran">
        &#128187;
        <span class="label">Ecran</span>
      </button>
      <button class="ctrl-btn" id="btn-chat" onclick="toggleSidebar()" title="Chat">
        &#128172;
        <span class="label">Chat</span>
      </button>
      <button class="ctrl-btn danger" id="btn-end" onclick="endCall()" title="Raccrocher">
        &#128222;
        <span class="label">Raccrocher</span>
      </button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="visio-sidebar collapsed" id="visio-sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" onclick="switchSidebarTab(this,'chat')">&#128172; Chat</button>
      <button class="sidebar-tab" onclick="switchSidebarTab(this,'docs')">&#128196; Documents</button>
    </div>
    <div class="sidebar-panel active" id="panel-chat">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-wrap">
        <input class="chat-input" id="chat-input" placeholder="Votre message..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">&#10148;</button>
      </div>
    </div>
    <div class="sidebar-panel" id="panel-docs">
      <div class="docs-area" id="docs-area">
        <p style="color:var(--muted);font-size:13px;text-align:center;padding:20px;">Aucun document partage.</p>
      </div>
      <div class="doc-upload">
        <input type="file" id="doc-file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" style="display:none;" onchange="uploadDoc()">
        <button class="doc-upload-btn" onclick="document.getElementById('doc-file').click()">&#128206; Deposer un document</button>
      </div>
    </div>
  </div>
</div>

<!-- TIME ALERT -->
<div class="time-alert" id="time-alert">&#9888; Il reste moins de 5 minutes de consultation</div>

<!-- PDF VIEWER -->
<div class="pdf-viewer" id="pdf-viewer">
  <div class="pdf-viewer-header">
    <span style="font-weight:700;">Document</span>
    <button class="ctrl-btn" style="width:36px;height:36px;font-size:16px;" onclick="closePdfViewer()">&#10005;</button>
  </div>
  <iframe id="pdf-iframe"></iframe>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';

function $(id){return document.getElementById(id);}
function toast(msg,kind){const t=$('toast');t.textContent=msg;t.className='toast show '+(kind||'');setTimeout(()=>t.className='toast',3000);}

// Extract token from URL
const pathParts = window.location.pathname.split('/').filter(Boolean);
const visioToken = pathParts[pathParts.length - 1] === 'index.html' ? (new URLSearchParams(window.location.search).get('token') || '') : pathParts[pathParts.length - 1];

// State
let localStream = null;
let screenStream = null;
let peerConnection = null;
let micEnabled = true;
let camEnabled = true;
let isScreenSharing = false;
let timerInterval = null;
let startTime = null;
let scheduledDuration = 60; // minutes, updated from API
let alertShown = false;
let chatMessages = [];
let pollingInterval = null;
let roomData = null;

const ICE_SERVERS = [
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'}
];

// TIMER
function startTimer(){
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
}
function updateTimer(){
  if(!startTime) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const h = String(Math.floor(elapsed/3600)).padStart(2,'0');
  const m = String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
  const s = String(elapsed%60).padStart(2,'0');
  $('timer').textContent = h+':'+m+':'+s;

  // 5 minute warning
  const remainingMin = scheduledDuration - (elapsed / 60);
  if(remainingMin <= 5 && remainingMin > 0 && !alertShown){
    alertShown = true;
    $('time-alert').classList.add('show');
    $('timer').classList.add('timer-warning');
    setTimeout(() => $('time-alert').classList.remove('show'), 10000);
  }
}

// CONTROLS
function toggleMic(){
  micEnabled = !micEnabled;
  if(localStream){
    localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  }
  $('btn-mic').classList.toggle('active', micEnabled);
  $('btn-mic').classList.toggle('muted-state', !micEnabled);
}
function toggleCam(){
  camEnabled = !camEnabled;
  if(localStream){
    localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
  }
  $('btn-cam').classList.toggle('active', camEnabled);
  $('btn-cam').classList.toggle('muted-state', !camEnabled);
}
async function toggleScreen(){
  if(isScreenSharing){
    if(screenStream){
      screenStream.getTracks().forEach(t => t.stop());
      screenStream = null;
    }
    if(localStream && peerConnection){
      const videoTrack = localStream.getVideoTracks()[0];
      const sender = peerConnection.getSenders().find(s => s.track?.kind === 'video');
      if(sender && videoTrack) sender.replaceTrack(videoTrack);
    }
    isScreenSharing = false;
    $('btn-screen').classList.remove('active');
  } else {
    try{
      screenStream = await navigator.mediaDevices.getDisplayMedia({video:true});
      const screenTrack = screenStream.getVideoTracks()[0];
      if(peerConnection){
        const sender = peerConnection.getSenders().find(s => s.track?.kind === 'video');
        if(sender) sender.replaceTrack(screenTrack);
      }
      screenTrack.onended = () => toggleScreen();
      isScreenSharing = true;
      $('btn-screen').classList.add('active');
    }catch(e){
      toast('Impossible de partager l\'ecran','error');
    }
  }
}
function toggleSidebar(){
  $('visio-sidebar').classList.toggle('collapsed');
  $('visio-sidebar').classList.toggle('mobile-open');
  $('btn-chat').classList.toggle('active');
}
function switchSidebarTab(btn, panel){
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  $('panel-'+panel).classList.add('active');
}

// CHAT
function sendChat(){
  const input = $('chat-input');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';

  const chatMsg = {sender:'me', text:msg, time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})};
  chatMessages.push(chatMsg);
  renderChat();

  // Send via API
  fetch('/api/juridique/visio/signal/'+visioToken, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type:'chat', data:chatMsg})
  }).catch(_=>{});
}
function renderChat(){
  const container = $('chat-messages');
  container.innerHTML = chatMessages.map(m =>
    '<div class="chat-msg '+(m.sender==='me'?'self':'other')+'">'
    + (m.sender!=='me' ? '<div class="msg-sender">'+(m.senderName||'Participant')+'</div>' : '')
    + m.text
    + '<div class="msg-time">'+m.time+'</div>'
    + '</div>'
  ).join('');
  container.scrollTop = container.scrollHeight;
}

// WEBRTC
async function initMedia(){
  try{
    localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
    $('local-video').srcObject = localStream;
  }catch(e){
    toast('Impossible d\'acceder a la camera/micro','error');
    try{
      localStream = await navigator.mediaDevices.getUserMedia({audio:true});
    }catch(e2){
      toast('Aucun peripherique media disponible','error');
    }
  }
}

function createPeerConnection(){
  peerConnection = new RTCPeerConnection({iceServers:ICE_SERVERS});

  peerConnection.onicecandidate = (event) => {
    if(event.candidate){
      sendSignal({type:'ice-candidate', data:event.candidate});
    }
  };

  peerConnection.ontrack = (event) => {
    $('remote-video').srcObject = event.streams[0];
    $('remote-video').style.display = 'block';
    $('no-video').style.display = 'none';
  };

  peerConnection.onconnectionstatechange = () => {
    const state = peerConnection.connectionState;
    if(state === 'connected'){
      $('conn-status').className = 'conn-status connected';
      $('conn-status').textContent = 'Connecte';
      startTimer();
    } else if(state === 'disconnected' || state === 'failed'){
      $('conn-status').className = 'conn-status disconnected';
      $('conn-status').textContent = 'Deconnecte';
    }
  };

  if(localStream){
    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
  }
}

async function sendSignal(signal){
  try{
    await fetch('/api/juridique/visio/signal/'+visioToken, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(signal)
    });
  }catch(e){}
}

async function pollSignals(){
  try{
    const r = await fetch('/api/juridique/visio/signal/'+visioToken).then(r=>r.json());
    const signals = r.signals || [];
    for(const sig of signals){
      await handleSignal(sig);
    }
  }catch(_){}
}

async function handleSignal(sig){
  if(!peerConnection) createPeerConnection();

  if(sig.type === 'offer'){
    await peerConnection.setRemoteDescription(new RTCSessionDescription(sig.data));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    sendSignal({type:'answer', data:answer});
  } else if(sig.type === 'answer'){
    await peerConnection.setRemoteDescription(new RTCSessionDescription(sig.data));
  } else if(sig.type === 'ice-candidate'){
    try{
      await peerConnection.addIceCandidate(new RTCIceCandidate(sig.data));
    }catch(_){}
  } else if(sig.type === 'chat'){
    if(sig.data && sig.data.sender !== 'me'){
      sig.data.sender = 'other';
      chatMessages.push(sig.data);
      renderChat();
    }
  }
}

async function startCall(){
  createPeerConnection();
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  sendSignal({type:'offer', data:offer});
}

function endCall(){
  if(!confirm('Terminer la consultation ?')) return;
  if(peerConnection){ peerConnection.close(); peerConnection = null; }
  if(localStream){ localStream.getTracks().forEach(t => t.stop()); }
  if(screenStream){ screenStream.getTracks().forEach(t => t.stop()); }
  if(timerInterval) clearInterval(timerInterval);
  if(pollingInterval) clearInterval(pollingInterval);
  $('conn-status').className = 'conn-status disconnected';
  $('conn-status').textContent = 'Termine';
  $('remote-video').style.display = 'none';
  $('no-video').innerHTML = '<div class="icon">&#9989;</div><div>Consultation terminee</div><div style="font-size:12px;">Vous pouvez fermer cette fenetre.</div>';
  $('no-video').style.display = 'flex';
  document.querySelector('.controls').style.display = 'none';
}

// DOCUMENT SHARING
function uploadDoc(){
  const file = $('doc-file').files[0];
  if(!file) return;
  toast('Document en cours d\'envoi...','');
  const url = URL.createObjectURL(file);
  addDocToList(file.name, url);
  sendSignal({type:'document', data:{name:file.name}});
}
function addDocToList(name, url){
  const area = $('docs-area');
  if(area.querySelector('p')) area.innerHTML = '';
  const ext = name.split('.').pop().toLowerCase();
  const ico = ext === 'pdf' ? '&#128196;' : '&#128444;';
  area.innerHTML += '<div class="doc-item" onclick="openDocument(\''+url+'\')">'
    + '<span class="ico">'+ico+'</span>'
    + '<span class="name">'+name+'</span>'
    + '</div>';
}
function openDocument(url){
  $('pdf-iframe').src = url;
  $('pdf-viewer').classList.add('show');
}
function closePdfViewer(){
  $('pdf-viewer').classList.remove('show');
  $('pdf-iframe').src = '';
}

// INIT
(async function(){
  if(!visioToken || visioToken === 'visio'){
    $('no-video').innerHTML = '<div class="icon">&#128683;</div><div>Lien de visio invalide</div><div style="font-size:12px;">Verifiez votre lien de consultation.</div>';
    return;
  }

  // Validate room
  try{
    const r = await fetch('/api/juridique/visio/room/'+visioToken).then(r=>r.json());
    if(r.success === false){
      $('no-video').innerHTML = '<div class="icon">&#128683;</div><div>'+(r.error||'Session invalide')+'</div>';
      return;
    }
    roomData = r.room || r;
    scheduledDuration = roomData.duree || 60;
  }catch(e){
    $('no-video').innerHTML = '<div class="icon">&#128683;</div><div>Impossible de valider la session</div><div style="font-size:12px;">'+e.message+'</div>';
    return;
  }

  $('conn-status').textContent = 'Initialisation...';

  await initMedia();
  await startCall();

  // Poll for signals every 2 seconds
  pollingInterval = setInterval(pollSignals, 2000);

  $('conn-status').className = 'conn-status connecting';
  $('conn-status').textContent = 'En attente...';
})();

// Make local video draggable
(function(){
  const vid = $('local-video');
  let isDragging = false, startX, startY, origX, origY;
  vid.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX; startY = e.clientY;
    const rect = vid.getBoundingClientRect();
    origX = rect.left; origY = rect.top;
    vid.style.position = 'fixed';
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if(!isDragging) return;
    vid.style.left = (origX + e.clientX - startX)+'px';
    vid.style.top = (origY + e.clientY - startY)+'px';
    vid.style.right = 'auto'; vid.style.bottom = 'auto';
  });
  document.addEventListener('mouseup', () => isDragging = false);
})();
</script>
