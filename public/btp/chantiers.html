<style>
:root{--sidebar-w:220px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.08) 0%,transparent 55%);
  -webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--font);cursor:pointer;}

.nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,31,61,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;gap:16px;}
.nav-left{display:flex;align-items:center;gap:18px;min-width:0;}
.logo{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;flex-shrink:0;}
.crumb{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden;}
.crumb-ico{font-size:20px;}
.crumb-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.crumb-sep{color:var(--muted);font-size:12px;}
.crumb-module{font-size:13px;color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.nav-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;font-weight:600;transition:all 0.15s;text-decoration:none;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0a1628 0%,#121f3a 50%,#0a1628 100%);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;transition:all 0.15s;text-decoration:none;border-left:3px solid transparent;}
.sidebar-link:hover{background:rgba(99,102,241,0.1);color:var(--text);}
.sidebar-link.active{background:rgba(99,102,241,0.15);color:var(--accent);border-left-color:var(--accent);}
.sidebar-link .ico{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.sidebar-sep{height:1px;background:var(--border);margin:12px 16px;}

.content{flex:1;padding:28px 28px 100px;max-width:1200px;min-width:0;}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input[type="text"]{padding:9px 14px;background:rgba(20,40,80,0.6);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-weight:500;min-width:160px;}
.filter-bar input[type="text"]{min-width:220px;}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
.spacer{flex:1;}

/* CHANTIER CARDS */
.chantiers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.chantier-card{background:rgba(30,52,96,0.6);border:1px solid var(--border);border-radius:16px;padding:20px;backdrop-filter:blur(10px);transition:border-color 0.3s ease,box-shadow 0.3s ease;cursor:pointer;}
.chantier-card:hover{border-color:rgba(99,102,241,0.4);box-shadow:0 0 30px rgba(99,102,241,0.15);}
.chantier-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.chantier-ref{font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:-0.3px;}
.chantier-type{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent3);font-weight:600;}
.chantier-client{font-size:13px;font-weight:600;margin-bottom:4px;}
.chantier-address{font-size:12px;color:var(--muted);margin-bottom:10px;}
.chantier-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--text-secondary);margin-bottom:12px;}
.chantier-meta span{display:flex;align-items:center;gap:4px;}
.chantier-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border);}
.chantier-amount{font-family:var(--display);font-size:16px;font-weight:800;color:var(--success);}
.chantier-ouvriers{font-size:11px;color:var(--muted);}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
.badge.planifie{background:rgba(99,102,241,0.15);color:var(--accent);}
.badge.en_cours{background:rgba(245,158,11,0.15);color:var(--warning);}
.badge.termine{background:rgba(16,185,129,0.15);color:var(--success);}
.badge.annule{background:rgba(239,68,68,0.15);color:var(--danger);}
.badge.en_pause{background:rgba(148,163,184,0.15);color:var(--muted);}

/* STATUS SELECT INLINE */
.status-select{padding:3px 8px;font-size:11px;font-weight:700;border-radius:6px;background:rgba(20,40,80,0.6);border:1px solid var(--border);color:var(--text);cursor:pointer;}

/* EXPANDED DETAIL */
.chantier-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.chantier-detail.open{display:block;}
.detail-section{margin-bottom:14px;}
.detail-section h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;font-weight:700;}
.detail-notes{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap;}
.detail-actions .btn{padding:8px 14px;font-size:12px;}
.marge-box{display:flex;gap:16px;flex-wrap:wrap;}
.marge-item{display:flex;flex-direction:column;gap:2px;}
.marge-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;}
.marge-val{font-family:var(--display);font-size:18px;font-weight:800;}
.photos-grid{display:flex;gap:8px;flex-wrap:wrap;}
.photo-thumb{width:60px;height:60px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:rgba(25,45,85,0.95);border:1px solid rgba(99,102,241,0.25);border-radius:18px;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,0.35),0 0 30px rgba(99,102,241,0.15);padding:28px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;}
.modal h2{font-family:var(--display);font-size:18px;font-weight:800;margin-bottom:20px;letter-spacing:-0.5px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.full{grid-template-columns:1fr;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full-width{grid-column:1/-1;}
.form-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:700;}
.form-group input,.form-group select,.form-group textarea{padding:10px 14px;background:rgba(20,40,80,0.6);border:1px solid rgba(99,102,241,0.3);color:var(--text);border-radius:10px;font-size:13px;}
.form-group textarea{min-height:80px;resize:vertical;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;transition:all 0.2s var(--trans);white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.3);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border);border-radius:10px;}
.btn-ghost:hover{color:var(--text);border-color:var(--accent);}
.btn-success{background:var(--success);color:#fff;border:none;border-radius:10px;}
.btn-warning{background:var(--warning);color:#000;border:none;border-radius:10px;}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:14px;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(25,45,85,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s var(--trans);z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 30px rgba(99,102,241,0.15);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.ok{border-color:var(--success);color:var(--success);}

.animate-fade-in{animation:fadeInUp 0.4s var(--trans) both;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:768px){
  .sidebar{display:none;}
  .content{padding:18px 14px 80px;}
  .chantiers-grid{grid-template-columns:1fr;}
  .filter-bar{flex-direction:column;align-items:stretch;}
  .filter-bar select,.filter-bar input[type="text"]{min-width:100%;}
  .form-grid{grid-template-columns:1fr;}
  .mobile-menu-btn{display:block !important;}
}
.mobile-menu-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:30;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
.sidebar.mobile-open{display:flex !important;flex-direction:column;position:fixed;top:57px;left:0;bottom:0;z-index:25;width:var(--sidebar-w);}
</style>

<script>
const SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let token = null, societeId = null;
let allChantiers = [], allClients = [], allOuvriers = [];

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function eur(n){ return (Number(n)||0).toFixed(2).replace('.',',') + ' \u20ac'; }
function toast(msg, kind){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (kind||'');
  setTimeout(() => t.className = 'toast', 2800);
}

async function api(path, opts={}) {
  try {
    const { data: sd } = await db.auth.getSession();
    if (sd?.session) token = sd.session.access_token;
  } catch(_){}
  const r = await fetch(path, {
    ...opts,
    headers: {
      'Content-Type':'application/json',
      Authorization: 'Bearer ' + token,
      'X-Societe-Id': societeId,
      ...(opts.headers||{})
    }
  });
  if (r.status === 401) {
    try {
      const { data: ref } = await db.auth.refreshSession();
      if (ref?.session) {
        token = ref.session.access_token;
        return (await fetch(path, {
          ...opts,
          headers: {
            'Content-Type':'application/json',
            Authorization: 'Bearer ' + token,
            'X-Societe-Id': societeId,
            ...(opts.headers||{})
          }
        })).json();
      }
    } catch(_){}
    location.href = '/login.html';
    return { success: false };
  }
  return r.json();
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
}

const TYPE_ICONS = {
  plomberie: '\ud83d\udebf', electricite: '\u26a1', maconnerie: '\ud83e\uddf1', menuiserie: '\ud83e\ude9a',
  peinture: '\ud83c\udfa8', carrelage: '\u2b1b', couverture: '\ud83c\udfe0', climatisation: '\u2744\ufe0f',
  facade: '\ud83c\udfd7\ufe0f', renovation: '\ud83d\udd27', autre: '\ud83d\udee0\ufe0f'
};

const STATUT_LABELS = {
  planifie: 'Planifi\u00e9', en_cours: 'En cours', en_pause: 'En pause',
  termine: 'Termin\u00e9', annule: 'Annul\u00e9'
};

function statutBadge(s) {
  return '<span class="badge ' + esc(s) + '">' + (STATUT_LABELS[s] || esc(s)) + '</span>';
}

function renderChantiers(list) {
  const grid = $('chantiers-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty">Aucun chantier trouv\u00e9. Cliquez sur "+ Nouveau chantier" pour commencer.</div>';
    return;
  }
  grid.innerHTML = list.map((c, i) => {
    const ouvriersText = (c.ouvriers || []).map(o => esc(o.prenom + ' ' + o.nom)).join(', ') || 'Non assign\u00e9';
    const icon = TYPE_ICONS[c.type_travaux] || '\ud83d\udee0\ufe0f';
    return `
    <div class="chantier-card animate-fade-in" style="animation-delay:${i*0.04}s" onclick="toggleDetail(this)" data-id="${c.id}">
      <div class="chantier-header">
        <div>
          <div class="chantier-ref">${esc(c.reference || 'CH-'+c.id)}</div>
          <div class="chantier-type">${icon} ${esc(c.type_travaux || '')}</div>
        </div>
        <select class="status-select" onclick="event.stopPropagation()" onchange="changeStatus('${c.id}', this.value)">
          ${Object.entries(STATUT_LABELS).map(([k,v]) => `<option value="${k}" ${k===c.statut?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="chantier-client">\ud83d\udc64 ${esc(c.client_nom || c.client?.nom || 'Client inconnu')}</div>
      <div class="chantier-address">\ud83d\udccd ${esc(c.adresse || 'Adresse non renseign\u00e9e')}</div>
      <div class="chantier-meta">
        <span>\ud83d\udcc5 ${formatDate(c.date_debut)} \u2192 ${formatDate(c.date_fin)}</span>
        <span>\ud83d\udc77 ${ouvriersText}</span>
      </div>
      <div class="chantier-footer">
        <div class="chantier-amount">${c.montant_devis ? eur(c.montant_devis) : '\u2014'}</div>
        <div class="chantier-ouvriers">${(c.ouvriers||[]).length} ouvrier(s)</div>
      </div>
      <div class="chantier-detail" id="detail-${c.id}">
        <div class="detail-section">
          <h4>Marge du chantier</h4>
          <div class="marge-box">
            <div class="marge-item"><span class="marge-label">Devis HT</span><span class="marge-val" style="color:var(--accent)">${eur(c.montant_devis||0)}</span></div>
            <div class="marge-item"><span class="marge-label">Co\u00fbts</span><span class="marge-val" style="color:var(--danger)">${eur(c.couts||0)}</span></div>
            <div class="marge-item"><span class="marge-label">Marge</span><span class="marge-val" style="color:var(--success)">${eur((c.montant_devis||0)-(c.couts||0))}</span></div>
          </div>
        </div>
        <div class="detail-section">
          <h4>Notes</h4>
          <div class="detail-notes">${esc(c.description || 'Aucune note')}</div>
        </div>
        <div class="detail-section">
          <h4>Photos avant/apr\u00e8s</h4>
          <div class="photos-grid">
            ${(c.photos||[]).length ? (c.photos||[]).map(p => `<img src="${esc(p)}" class="photo-thumb" style="object-fit:cover;">`).join('') : '<div class="photo-thumb">Aucune</div>'}
          </div>
        </div>
        <div class="detail-actions">
          <button class="btn btn-primary" onclick="event.stopPropagation();creerDevis('${c.id}')">&#128203; Cr\u00e9er devis</button>
          <button class="btn btn-ghost" onclick="event.stopPropagation();voirRapport('${c.id}')">&#128196; Voir rapport</button>
          <button class="btn btn-ghost" onclick="event.stopPropagation();editChantier('${c.id}')">&#9998; Modifier</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(el) {
  const detail = el.querySelector('.chantier-detail');
  if (detail) detail.classList.toggle('open');
}

function filterChantiers() {
  const statut = $('filter-statut').value;
  const type = $('filter-type').value;
  const search = $('filter-search').value.toLowerCase();
  const filtered = allChantiers.filter(c => {
    if (statut && c.statut !== statut) return false;
    if (type && c.type_travaux !== type) return false;
    if (search) {
      const haystack = [c.reference, c.client_nom, c.adresse, c.description].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
  renderChantiers(filtered);
}

async function changeStatus(id, newStatus) {
  const res = await api('/api/btp/chantiers', {
    method: 'PATCH',
    body: JSON.stringify({ id, statut: newStatus })
  });
  if (res.success !== false) {
    const c = allChantiers.find(x => x.id == id);
    if (c) c.statut = newStatus;
    toast('Statut mis \u00e0 jour', 'ok');
  } else {
    toast('Erreur de mise \u00e0 jour', 'error');
  }
}

function openModal(chantier) {
  $('modal-bg').classList.add('open');
  if (chantier) {
    $('modal-title').innerHTML = '&#9998; Modifier le chantier';
    $('chantier-id').value = chantier.id;
    $('f-client').value = chantier.client_id || '';
    $('f-type').value = chantier.type_travaux || '';
    $('f-adresse').value = chantier.adresse || '';
    $('f-logement').value = chantier.type_logement || '';
    $('f-statut').value = chantier.statut || '';
    $('f-date-debut').value = chantier.date_debut || '';
    $('f-date-fin').value = chantier.date_fin || '';
    $('f-description').value = chantier.description || '';
    // Set multi-select ouvriers
    const sel = $('f-ouvriers');
    const ouvrierIds = (chantier.ouvriers || []).map(o => String(o.id));
    Array.from(sel.options).forEach(opt => { opt.selected = ouvrierIds.includes(opt.value); });
  } else {
    $('modal-title').innerHTML = '&#128679; Nouveau chantier';
    $('chantier-id').value = '';
    $('f-client').value = '';
    $('f-type').value = 'plomberie';
    $('f-adresse').value = '';
    $('f-logement').value = 'appartement';
    $('f-statut').value = 'planifie';
    $('f-date-debut').value = '';
    $('f-date-fin').value = '';
    $('f-description').value = '';
  }
}

function closeModal() {
  $('modal-bg').classList.remove('open');
}

function editChantier(id) {
  const c = allChantiers.find(x => x.id == id);
  if (c) openModal(c);
}

async function saveChantier() {
  const id = $('chantier-id').value;
  const selectedOuvriers = Array.from($('f-ouvriers').selectedOptions).map(o => o.value);
  const body = {
    client_id: $('f-client').value,
    type_travaux: $('f-type').value,
    adresse: $('f-adresse').value,
    type_logement: $('f-logement').value,
    statut: $('f-statut').value,
    date_debut: $('f-date-debut').value,
    date_fin: $('f-date-fin').value,
    description: $('f-description').value,
    ouvrier_ids: selectedOuvriers
  };
  if (id) body.id = id;

  const res = await api('/api/btp/chantiers', {
    method: id ? 'PATCH' : 'POST',
    body: JSON.stringify(body)
  });

  if (res.success !== false) {
    toast(id ? 'Chantier modifi\u00e9' : 'Chantier cr\u00e9\u00e9', 'ok');
    closeModal();
    loadChantiers();
  } else {
    toast(res.error || 'Erreur', 'error');
  }
}

function creerDevis(chantierId) {
  window.location.href = 'devis.html?chantier_id=' + chantierId;
}
function voirRapport(chantierId) {
  toast('Ouverture du rapport...', '');
}

async function loadClients() {
  const res = await api('/api/btp/clients');
  allClients = res.clients || res.data || [];
  const sel = $('f-client');
  sel.innerHTML = '<option value="">-- S\u00e9lectionner un client --</option>' +
    allClients.map(c => `<option value="${c.id}">${esc(c.nom)} ${esc(c.prenom||'')}</option>`).join('');
}

async function loadOuvriers() {
  const res = await api('/api/btp/ouvriers');
  allOuvriers = res.ouvriers || res.data || [];
  const sel = $('f-ouvriers');
  sel.innerHTML = allOuvriers.map(o => `<option value="${o.id}">${esc(o.prenom)} ${esc(o.nom)} - ${esc(o.metier||'')}</option>`).join('');
}

async function loadChantiers() {
  const res = await api('/api/btp/chantiers');
  allChantiers = res.chantiers || res.data || [];
  filterChantiers();
}

// Event listeners
$('filter-statut').addEventListener('change', filterChantiers);
$('filter-type').addEventListener('change', filterChantiers);
$('filter-search').addEventListener('input', filterChantiers);
$('modal-bg').addEventListener('click', e => { if (e.target === $('modal-bg')) closeModal(); });

// Init
(async () => {
  const { data } = await db.auth.getSession();
  if (!data?.session) { location.href = '/login.html'; return; }
  token = data.session.access_token;
  societeId = data.session.user?.user_metadata?.societe_id;
  await Promise.all([loadChantiers(), loadClients(), loadOuvriers()]);
})();
</script>
</body>
</html>
