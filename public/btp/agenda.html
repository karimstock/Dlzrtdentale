<style>
:root{
  --sidebar-w:260px;
  --hour-h:60px;
  --c-plomberie:#3b82f6;
  --c-electricite:#eab308;
  --c-maconnerie:#ef4444;
  --c-peinture:#22c55e;
  --c-menuiserie:#a855f7;
  --c-paysage:#14b8a6;
  --c-couverture:#f97316;
  --c-other:#6b7280;
}

/* NAV */
.nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,31,61,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;gap:16px;}
.nav-left{display:flex;align-items:center;gap:18px;min-width:0;}
.logo{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;flex-shrink:0;}
.crumb{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden;}
.crumb-ico{font-size:20px;}
.crumb-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.crumb-sep{color:var(--muted);font-size:12px;}
.crumb-module{font-size:13px;color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.nav-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;font-weight:600;transition:all 0.15s;text-decoration:none;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0a1628 0%,#121f3a 50%,#0a1628 100%);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;transition:all 0.15s;text-decoration:none;border-left:3px solid transparent;}
.sidebar-link:hover{background:rgba(99,102,241,0.1);color:var(--text);}
.sidebar-link.active{background:rgba(99,102,241,0.15);color:var(--accent);border-left-color:var(--accent);}
.sidebar-link .ico{font-size:18px;width:24px;text-align:center;}
.sidebar-sep{height:1px;background:var(--border);margin:12px 16px;}

.content{flex:1;padding:28px 28px 100px;overflow-x:hidden;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.toolbar-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.toolbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.page-title{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}

/* BUTTONS */
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;transition:all 0.2s var(--trans);white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.3);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--text);}
.btn-sm{padding:6px 11px;font-size:11px;}
.btn-success{background:var(--success);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-warning{background:var(--warning);color:#000;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:3px;}
.view-toggle button{padding:8px 16px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;transition:all 0.15s;font-family:var(--font);}
.view-toggle button.active{background:var(--accent);color:#fff;}

/* CAL NAV */
.cal-nav{display:flex;align-items:center;gap:8px;}
.cal-nav button{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;cursor:pointer;font-family:var(--font);transition:border-color 0.15s;}
.cal-nav button:hover{border-color:var(--accent);}
.cal-nav .today-btn{font-size:11px;font-weight:600;padding:6px 14px;}
.cal-title{font-family:var(--display);font-size:16px;font-weight:700;min-width:180px;text-align:center;}

/* FILTER SELECT */
.filter-select{padding:7px 12px;background:rgba(20,40,80,0.6);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;cursor:pointer;min-width:140px;}
.filter-select:focus{border-color:var(--accent);}

/* ═══════════════════════════════════════
   MONTH VIEW
   ═══════════════════════════════════════ */
.cal-month{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-month .day-header{padding:10px 8px;text-align:center;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.cal-month .day-cell{min-height:110px;background:rgba(30,52,96,0.4);border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;transition:border-color 0.15s;}
.cal-month .day-cell:hover{border-color:var(--accent);}
.cal-month .day-cell.today{border-color:var(--accent);background:var(--accent-soft);}
.cal-month .day-cell.other{opacity:0.3;}
.cal-month .day-num{font-size:12px;font-weight:700;margin-bottom:4px;}
.cal-month .day-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.cal-month .day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cal-month .day-count{font-size:10px;color:var(--muted);margin-top:2px;}

/* ═══════════════════════════════════════
   WEEK VIEW
   ═══════════════════════════════════════ */
.cal-week{display:grid;grid-template-columns:56px repeat(7,1fr);border:1px solid var(--border);border-radius:12px;overflow:hidden;background:rgba(30,52,96,0.3);}
.cal-week .corner{background:var(--surface2);border-bottom:1px solid var(--border);border-right:1px solid rgba(99,102,241,0.1);}
.cal-week .week-header{padding:10px 4px;text-align:center;font-size:11px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);background:var(--surface2);}
.cal-week .week-header.today-h{color:var(--accent);background:var(--accent-soft);}
.cal-week .week-header .hd-num{font-size:18px;font-weight:800;font-family:var(--display);display:block;margin-top:2px;}
.cal-week .time-label{font-size:10px;color:var(--text3);text-align:right;padding:0 6px;border-right:1px solid rgba(99,102,241,0.1);height:var(--hour-h);display:flex;align-items:flex-start;justify-content:flex-end;padding-top:2px;}
.cal-week .day-col{border-left:1px solid rgba(99,102,241,0.08);position:relative;height:var(--hour-h);border-bottom:1px solid rgba(99,102,241,0.06);}
.cal-week .day-col:hover{background:rgba(99,102,241,0.04);}
.cal-week .week-event{position:absolute;left:2px;right:2px;border-radius:5px;padding:3px 5px;font-size:10px;overflow:hidden;cursor:pointer;z-index:2;line-height:1.3;transition:transform 0.1s;color:#fff;}
.cal-week .week-event:hover{transform:scale(1.02);z-index:3;}

/* ═══════════════════════════════════════
   DAY VIEW
   ═══════════════════════════════════════ */
.cal-day{display:grid;grid-template-columns:56px 1fr;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:rgba(30,52,96,0.3);}
.cal-day .time-label{font-size:11px;color:var(--text3);text-align:right;padding:0 8px;border-right:1px solid rgba(99,102,241,0.1);height:var(--hour-h);display:flex;align-items:flex-start;justify-content:flex-end;padding-top:4px;}
.cal-day .hour-row{position:relative;height:var(--hour-h);border-bottom:1px solid rgba(99,102,241,0.06);}
.cal-day .hour-row:hover{background:rgba(99,102,241,0.04);}
.cal-day .day-event{position:absolute;left:4px;right:4px;border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;z-index:2;overflow:hidden;transition:transform 0.1s;color:#fff;}
.cal-day .day-event:hover{transform:scale(1.01);z-index:3;}
.cal-day .day-event .ev-ref{font-weight:700;font-size:13px;display:flex;align-items:center;gap:4px;}
.cal-day .day-event .ev-client{font-size:12px;margin-top:1px;}
.cal-day .day-event .ev-meta{font-size:11px;opacity:0.85;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

/* ═══════════════════════════════════════
   MODAL
   ═══════════════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:rgba(25,45,85,0.95);border:1px solid rgba(99,102,241,0.25);border-radius:18px;padding:28px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;backdrop-filter:blur(12px);box-shadow:var(--shadow),var(--glow2);animation:fadeInUp 0.25s var(--trans);position:relative;}
.modal-title{font-family:var(--display);font-size:18px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}
.modal-close:hover{color:var(--text);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.full{grid-column:1/-1;}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;background:rgba(20,40,80,0.6);border:1px solid rgba(99,102,241,0.3);border-radius:9px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color 0.2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
.field textarea{resize:vertical;min-height:80px;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;flex-wrap:wrap;}

/* DETAIL GRID */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.detail-item{font-size:13px;}
.detail-item .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:3px;}
.detail-item .val{font-weight:600;}

/* STATUS CHIP */
.status-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
.status-chip.planifie{background:rgba(59,130,246,0.15);color:#60a5fa;}
.status-chip.en_cours{background:rgba(245,158,11,0.15);color:#fbbf24;}
.status-chip.termine{background:rgba(16,185,129,0.15);color:#34d399;}
.status-chip.annule{background:rgba(239,68,68,0.15);color:#f87171;}
.status-chip.en_attente{background:rgba(139,92,246,0.15);color:#c084fc;}

/* OUVRIER CHECKBOXES */
.ouvrier-checks{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;padding:4px 0;}
.ouvrier-check{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;}
.ouvrier-check input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(25,45,85,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s var(--trans);z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.ok{border-color:var(--success);color:var(--success);}

.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}

/* MOBILE */
.mobile-menu-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:30;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;box-shadow:var(--glow);}

@media(max-width:768px){
  .sidebar{display:none;}
  .sidebar.mobile-open{display:flex;flex-direction:column;position:fixed;top:57px;left:0;z-index:25;height:calc(100vh - 57px);width:260px;box-shadow:8px 0 24px rgba(0,0,0,0.5);}
  .content{padding:14px 10px 80px;}
  .toolbar{flex-direction:column;align-items:stretch;gap:10px;}
  .toolbar-left,.toolbar-right{justify-content:center;}
  .view-toggle{display:none !important;}
  .cal-month,.cal-week{display:none !important;}
  .mobile-menu-btn{display:block !important;}
  .form-grid{grid-template-columns:1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .cal-title{font-size:14px;min-width:auto;}
  .page-title{font-size:18px;}
}

@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

function closeModal(id){ $(id).classList.remove('show'); }

function pad2(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function fmtTime(d){ return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function fmtDateFR(d){ return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtMoney(n){ return Number(n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' \u20ac'; }

/* ── API with token refresh ── */
async function api(path, opts={}){
  try {
    const { data: sd } = await db.auth.getSession();
    if(sd?.session) token = sd.session.access_token;
  } catch(_){}
  const headers = {
    'Content-Type':'application/json',
    Authorization:'Bearer '+token,
    'X-Societe-Id': societeId,
    ...(opts.headers||{})
  };
  const r = await fetch(path, { ...opts, headers });
  if(r.status === 401){
    try {
      const { data: ref } = await db.auth.refreshSession();
      if(ref?.session){
        token = ref.session.access_token;
        return (await fetch(path, { ...opts, headers: { ...headers, Authorization:'Bearer '+token } })).json();
      }
    } catch(_){}
    location.href = '/login.html';
    return { success: false };
  }
  return r.json();
}

/* ═══════════════════════════════════════
   LOAD CALENDAR DATA
   ═══════════════════════════════════════ */
async function loadCalendar(){
  let start, end;
  if(currentView === 'month'){
    start = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
    const dow = start.getDay(); const offset = dow === 0 ? 6 : dow - 1;
    start.setDate(start.getDate() - offset);
    end = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
    const endDow = end.getDay(); const endOffset = endDow === 0 ? 0 : 7 - endDow;
    end.setDate(end.getDate() + endOffset);
    $('cal-title').textContent = MOIS[currentDate.getMonth()] + ' ' + currentDate.getFullYear();
  } else if(currentView === 'week'){
    const d = new Date(currentDate);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    start = new Date(d); start.setDate(diff);
    end = new Date(start); end.setDate(end.getDate() + 6);
    $('cal-title').textContent = start.getDate() + ' - ' + end.getDate() + ' ' + MOIS[end.getMonth()] + ' ' + end.getFullYear();
  } else {
    start = new Date(currentDate); end = new Date(currentDate);
    const di = start.getDay() === 0 ? 6 : start.getDay() - 1;
    $('cal-title').textContent = JOURS_FULL[di] + ' ' + start.getDate() + ' ' + MOIS[start.getMonth()] + ' ' + start.getFullYear();
  }

  const sStr = fmtDate(start);
  const eStr = fmtDate(end);
  const ouvrierFilter = $('filter-ouvrier').value;

  let url = '/api/btp/chantiers/agenda?from='+sStr+'&to='+eStr;
  if(ouvrierFilter) url += '&ouvrier_id='+ouvrierFilter;

  try {
    const data = await api(url);
    chantiers = data.chantiers || data.data || [];
  } catch(e){
    chantiers = [];
  }

  if(currentView === 'month') renderMonth();
  else if(currentView === 'week') renderWeek();
  else renderDay();
}

/* ── Parse chantier date/time ── */
function chDate(ch){
  return new Date(ch.date_debut || ch.date || ch.created_at);
}
function chDateStr(ch){
  return (ch.date_debut || ch.date || ch.created_at || '').slice(0,10);
}
function chEndDate(ch){
  if(ch.date_fin) return new Date(ch.date_fin);
  const d = chDate(ch);
  const dur = ch.duree_estimee || ch.duree || 8;
  d.setHours(d.getHours() + dur);
  return d;
}
function chOuvrierNames(ch){
  if(ch.ouvriers_noms) return ch.ouvriers_noms;
  if(ch.ouvriers && Array.isArray(ch.ouvriers)){
    return ch.ouvriers.map(o => (o.prenom||'')+' '+(o.nom||'')).join(', ');
  }
  return '';
}
function chClientName(ch){
  return ch.client_nom || ((ch.client_prenom || '') + ' ' + (ch.client_nom_famille || '')).trim() || 'Client';
}

/* ═══════════════════════════════════════
   MONTH VIEW
   ═══════════════════════════════════════ */
function renderMonth(){
  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  let startDow = firstDay.getDay(); if(startDow === 0) startDow = 7;
  const today = fmtDate(new Date());

  let html = '<div class="cal-month">';
  JOURS.forEach(j => html += '<div class="day-header">'+j+'</div>');

  // Previous month fill
  for(let i = 1; i < startDow; i++){
    const d = new Date(year, month, 1 - (startDow - i));
    html += '<div class="day-cell other"><div class="day-num">'+d.getDate()+'</div></div>';
  }

  // Current month
  for(let d = 1; d <= lastDay.getDate(); d++){
    const ds = year + '-' + pad2(month+1) + '-' + pad2(d);
    const isToday = ds === today;
    const dayChantiers = chantiers.filter(c => chDateStr(c) === ds);

    html += '<div class="day-cell'+(isToday?' today':'')+'" onclick="goToDay(\''+ds+'\')">';
    html += '<div class="day-num">'+d+'</div>';

    if(dayChantiers.length > 0 && dayChantiers.length <= 3){
      html += '<div class="day-dots">';
      dayChantiers.forEach(c => {
        const col = typeColor(c.type_travaux);
        html += '<div class="day-dot" style="background:'+col+';" title="'+esc(typeLabel(c.type_travaux)+' - '+chClientName(c))+'"></div>';
      });
      html += '</div>';
    } else if(dayChantiers.length > 3){
      html += '<div class="day-dots">';
      dayChantiers.slice(0,3).forEach(c => {
        html += '<div class="day-dot" style="background:'+typeColor(c.type_travaux)+';"></div>';
      });
      html += '</div>';
      html += '<div class="day-count">+' + (dayChantiers.length - 3) + ' chantier'+(dayChantiers.length-3>1?'s':'')+'</div>';
    }

    html += '</div>';
  }

  // Next month fill
  const totalCells = startDow - 1 + lastDay.getDate();
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for(let i = 1; i <= remaining; i++){
    html += '<div class="day-cell other"><div class="day-num">'+i+'</div></div>';
  }

  html += '</div>';
  $('calendar-container').innerHTML = html;
}

/* ═══════════════════════════════════════
   WEEK VIEW
   ═══════════════════════════════════════ */
function renderWeek(){
  const d = new Date(currentDate);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const weekStart = new Date(d); weekStart.setDate(diff);
  const today = fmtDate(new Date());
  const START_HOUR = 6, END_HOUR = 20;

  let html = '<div class="cal-week">';
  // Header row
  html += '<div class="corner"></div>';
  const weekDates = [];
  for(let i = 0; i < 7; i++){
    const dd = new Date(weekStart); dd.setDate(dd.getDate() + i);
    const ds = fmtDate(dd);
    weekDates.push(ds);
    html += '<div class="week-header'+(ds===today?' today-h':'')+'">'
      + JOURS[i]
      + '<span class="hd-num">' + dd.getDate() + '</span>'
      + '</div>';
  }

  // Hour rows
  for(let h = START_HOUR; h < END_HOUR; h++){
    html += '<div class="time-label">' + pad2(h) + ':00</div>';
    for(let i = 0; i < 7; i++){
      const ds = weekDates[i];
      const slotChantiers = chantiers.filter(c => {
        const cd = chDate(c);
        return chDateStr(c) === ds && cd.getHours() === h;
      });
      html += '<div class="day-col">';
      slotChantiers.forEach(c => {
        const dur = c.duree_estimee || c.duree || 8;
        const cd = chDate(c);
        const minOffset = cd.getMinutes();
        const topPx = (minOffset / 60) * 60;
        const hPx = Math.max(22, Math.min((dur * 60) / 60, 4) * 60);
        const col = typeColor(c.type_travaux);
        html += '<div class="week-event" style="top:'+topPx+'px;height:'+hPx+'px;background:'+col+'88;border-left:3px solid '+col+';" onclick="event.stopPropagation();showChantier(\''+esc(c.id)+'\')">'
          + '<strong>' + typeIcon(c.type_travaux) + '</strong> '
          + esc(c.reference || '')
          + '<br>' + esc(chClientName(c))
          + '</div>';
      });
      html += '</div>';
    }
  }
  html += '</div>';
  $('calendar-container').innerHTML = html;
}

/* ═══════════════════════════════════════
   DAY VIEW
   ═══════════════════════════════════════ */
function renderDay(){
  const ds = fmtDate(currentDate);
  const START_HOUR = 6, END_HOUR = 20;

  let html = '<div class="cal-day">';
  for(let h = START_HOUR; h < END_HOUR; h++){
    html += '<div class="time-label">' + pad2(h) + ':00</div>';
    html += '<div class="hour-row">';

    const slotChantiers = chantiers.filter(c => {
      const cd = chDate(c);
      return chDateStr(c) === ds && cd.getHours() === h;
    });

    slotChantiers.forEach(c => {
      const dur = c.duree_estimee || c.duree || 8;
      const cd = chDate(c);
      const minOffset = cd.getMinutes();
      const topPx = (minOffset / 60) * 60;
      const hPx = Math.max(50, Math.min(dur, 4) * 60);
      const col = typeColor(c.type_travaux);
      const devisStr = c.devis_montant ? ' | ' + fmtMoney(c.devis_montant) : '';

      html += '<div class="day-event" style="top:'+topPx+'px;height:'+hPx+'px;background:'+col+'33;border-left:4px solid '+col+';" onclick="showChantier(\''+esc(c.id)+'\')">'
        + '<div class="ev-ref">' + typeIcon(c.type_travaux) + ' ' + esc(c.reference || 'Chantier') + '</div>'
        + '<div class="ev-client">' + esc(chClientName(c)) + '</div>'
        + '<div class="ev-meta">'
        + '<span>' + esc((c.adresse || '').substring(0,30)) + (c.adresse && c.adresse.length > 30 ? '...' : '') + '</span>'
        + '</div>'
        + '<div class="ev-meta">'
        + '<span>\uD83D\uDC77 ' + esc(chOuvrierNames(c) || 'Non assign\u00e9') + '</span>'
        + (devisStr ? '<span>' + devisStr + '</span>' : '')
        + '</div>'
        + '</div>';
    });

    html += '</div>';
  }
  html += '</div>';
  $('calendar-container').innerHTML = html;
}

      method: 'POST',
      body: JSON.stringify(body)
    });

      toast('Chantier cr\u00e9\u00e9 avec succ\u00e8s', 'ok');

(async function(){
  const { data } = await db.auth.getSession();
  if(!data?.session) return location.href = '/login.html';
  session = data.session;
  token = session.access_token;
  db.auth.onAuthStateChange((ev, s) => { if(s){ session = s; token = s.access_token; } });
  societeId = localStorage.getItem('societe_active_id');
  if(!societeId){ location.href = '/organisation.html'; return; }
  checkMobile();
  await Promise.all([loadOuvriers(), loadClients()]);
  loadCalendar();
})();
</script>
