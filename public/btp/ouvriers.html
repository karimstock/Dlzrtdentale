<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI — Artisan BTP — Ouvriers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="/public/js/jadomi-legal-widget.js" defer></script>
<style>
:root{--sidebar-w:220px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.08) 0%,transparent 55%);
  -webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--font);cursor:pointer;}

.nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,31,61,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;gap:16px;}
.nav-left{display:flex;align-items:center;gap:18px;min-width:0;}
.logo{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;flex-shrink:0;}
.crumb{display:flex;align-items:center;gap:10px;min-width:0;overflow:hidden;}
.crumb-ico{font-size:20px;}
.crumb-name{font-weight:700;font-size:14px;white-space:nowrap;}
.crumb-sep{color:var(--muted);font-size:12px;}
.crumb-module{font-size:13px;color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.nav-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:12px;font-weight:600;transition:all 0.15s;text-decoration:none;}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}

.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0a1628 0%,#121f3a 50%,#0a1628 100%);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 10px;}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;transition:all 0.15s;text-decoration:none;border-left:3px solid transparent;}
.sidebar-link:hover{background:rgba(99,102,241,0.1);color:var(--text);}
.sidebar-link.active{background:rgba(99,102,241,0.15);color:var(--accent);border-left-color:var(--accent);}
.sidebar-link .ico{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
.sidebar-sep{height:1px;background:var(--border);margin:12px 16px;}

.content{flex:1;padding:28px 28px 100px;max-width:1200px;min-width:0;}

.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.top-bar h1{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:-0.5px;}

/* OUVRIER CARDS GRID */
.ouvriers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.ouvrier-card{background:rgba(30,52,96,0.6);border:1px solid var(--border);border-radius:16px;padding:22px;backdrop-filter:blur(10px);transition:border-color 0.3s ease,box-shadow 0.3s ease;cursor:pointer;}
.ouvrier-card:hover{border-color:rgba(99,102,241,0.4);box-shadow:0 0 30px rgba(99,102,241,0.15);}
.ouvrier-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.avatar{width:50px;height:50px;border-radius:50%;background:var(--accent-soft);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:18px;font-weight:800;color:var(--accent);flex-shrink:0;}
.ouvrier-info{flex:1;min-width:0;}
.ouvrier-name{font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:-0.3px;}
.ouvrier-metier{font-size:12px;color:var(--accent3);font-weight:600;}
.ouvrier-details{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--text-secondary);margin-bottom:12px;}
.ouvrier-details span{display:flex;align-items:center;gap:4px;}
.ouvrier-status{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.ouvrier-status.actif{background:rgba(16,185,129,0.15);color:var(--success);}
.ouvrier-status.inactif{background:rgba(239,68,68,0.15);color:var(--danger);}
.ouvrier-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border);}
.ouvrier-actions{display:flex;gap:8px;}
.btn-sm{padding:6px 12px;font-size:11px;font-weight:700;border-radius:8px;border:none;transition:all 0.15s;}
.btn-edit{background:rgba(99,102,241,0.15);color:var(--accent);}
.btn-edit:hover{background:rgba(99,102,241,0.25);}
.btn-deactivate{background:rgba(239,68,68,0.15);color:var(--danger);}
.btn-deactivate:hover{background:rgba(239,68,68,0.25);}

/* DETAIL PANEL */
.ouvrier-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.ouvrier-detail.open{display:block;}
.detail-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;}
.detail-stat{text-align:center;padding:12px;background:rgba(15,31,61,0.6);border-radius:10px;border:1px solid rgba(99,102,241,0.15);}
.detail-stat-val{font-family:var(--display);font-size:20px;font-weight:800;color:var(--accent);}
.detail-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-top:4px;}
.recent-chantiers{font-size:12px;}
.recent-chantier{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(99,102,241,0.1);}
.recent-chantier:last-child{border-bottom:none;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:rgba(25,45,85,0.95);border:1px solid rgba(99,102,241,0.25);border-radius:18px;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,0.35),0 0 30px rgba(99,102,241,0.15);padding:28px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;}
.modal h2{font-family:var(--display);font-size:18px;font-weight:800;margin-bottom:20px;letter-spacing:-0.5px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full-width{grid-column:1/-1;}
.form-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:700;}
.form-group input,.form-group select{padding:10px 14px;background:rgba(20,40,80,0.6);border:1px solid rgba(99,102,241,0.3);color:var(--text);border-radius:10px;font-size:13px;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;transition:all 0.2s var(--trans);white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,0.3);}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1px solid var(--border);border-radius:10px;}
.btn-ghost:hover{color:var(--text);border-color:var(--accent);}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:14px;}
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:rgba(25,45,85,0.95);border:1px solid var(--border);border-radius:12px;padding:12px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all 0.3s var(--trans);z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 30px rgba(99,102,241,0.15);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}
.toast.ok{border-color:var(--success);color:var(--success);}

.animate-fade-in{animation:fadeInUp 0.4s var(--trans) both;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:768px){
  .sidebar{display:none;}
  .content{padding:18px 14px 80px;}
  .ouvriers-grid{grid-template-columns:1fr;}
  .detail-stats{grid-template-columns:1fr;}
  .form-grid{grid-template-columns:1fr;}
  .mobile-menu-btn{display:block !important;}
}
.mobile-menu-btn{display:none;position:fixed;bottom:20px;right:20px;z-index:30;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
.sidebar.mobile-open{display:flex !important;flex-direction:column;position:fixed;top:57px;left:0;bottom:0;z-index:25;width:var(--sidebar-w);}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="logo">JADOMI</div>
    <div class="crumb">
      <span class="crumb-ico">&#128119;</span>
      <span class="crumb-name">Artisan BTP</span>

      <span class="crumb-module">Ouvriers</span>

<div class="layout">

    <nav class="sidebar-nav">

<!-- MODAL AJOUT/EDIT OUVRIER -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2 id="modal-title">&#128119; Ajouter un ouvrier</h2>
    <input type="hidden" id="ouvrier-id">
    <div class="form-grid">
      <div class="form-group">
        <label>Pr&eacute;nom</label>
        <input type="text" id="f-prenom" placeholder="Jean">
      </div>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="f-nom" placeholder="Dupont">
      </div>
      <div class="form-group">
        <label>M&eacute;tier</label>
        <select id="f-metier">
          <option value="plombier">Plombier</option>
          <option value="electricien">&Eacute;lectricien</option>
          <option value="macon">Ma&ccedil;on</option>
          <option value="menuisier">Menuisier</option>
          <option value="peintre">Peintre</option>
          <option value="carreleur">Carreleur</option>
          <option value="couvreur">Couvreur</option>
          <option value="serrurier">Serrurier</option>
          <option value="climaticien">Climaticien</option>
          <option value="manoeuvre">Manoeuvre</option>
          <option value="autre">Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Taux horaire (&euro;)</label>
        <input type="number" id="f-taux" min="0" step="0.5" placeholder="25">
      </div>
      <div class="form-group">
        <label>T&eacute;l&eacute;phone</label>
        <input type="tel" id="f-tel" placeholder="06 12 34 56 78">

        <label>Email</label>
        <input type="email" id="f-email" placeholder="jean@email.com">
      </div>
      <div class="form-group">
        <label>Statut</label>
        <select id="f-statut">
          <option value="actif">Actif</option>

      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveOuvrier()">Enregistrer</button>

</div>

<button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">&#9776;</button>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let token = null, societeId = null;
let allOuvriers = [];

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function eur(n){ return (Number(n)||0).toFixed(2).replace('.',',') + ' \u20ac'; }
function toast(msg, kind){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (kind||'');
  setTimeout(() => t.className = 'toast', 2800);
}

async function api(path, opts={}) {
  try {
    const { data: sd } = await db.auth.getSession();
    if (sd?.session) token = sd.session.access_token;
  } catch(_){}
  const r = await fetch(path, {
    ...opts,
    headers: {
      'Content-Type':'application/json',
      Authorization: 'Bearer ' + token,
      'X-Societe-Id': societeId,
      ...(opts.headers||{})
    }
  });
  if (r.status === 401) {
    try {
      const { data: ref } = await db.auth.refreshSession();
      if (ref?.session) {
        token = ref.session.access_token;
        return (await fetch(path, {
          ...opts,
          headers: {
            'Content-Type':'application/json',
            Authorization: 'Bearer ' + token,
            'X-Societe-Id': societeId,
            ...(opts.headers||{})
          }
        })).json();
      }
    } catch(_){}
    location.href = '/login.html';
    return { success: false };
  }
  return r.json();
}

function initials(prenom, nom) {
  return ((prenom||'')[0]||'') + ((nom||'')[0]||'');
}

function renderOuvriers(list) {
  const grid = $('ouvriers-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty">Aucun ouvrier enregistr\u00e9. Ajoutez votre premier membre d\'\u00e9quipe.</div>';
    return;
  }
  grid.innerHTML = list.map((o, i) => `
    <div class="ouvrier-card animate-fade-in" style="animation-delay:${i*0.04}s" onclick="toggleDetail('${o.id}')">
      <div class="ouvrier-top">
        <div class="avatar">${esc(initials(o.prenom, o.nom)).toUpperCase()}</div>
        <div class="ouvrier-info">
          <div class="ouvrier-name">${esc(o.prenom)} ${esc(o.nom)}</div>
          <div class="ouvrier-metier">${esc(o.metier || 'Non d\u00e9fini')}</div>
        </div>
        <span class="ouvrier-status ${o.statut==='actif'?'actif':'inactif'}">${o.statut==='actif'?'Actif':'Inactif'}</span>
      </div>
      <div class="ouvrier-details">
        <span>\ud83d\udcb0 ${eur(o.taux_horaire||0)}/h</span>
        <span>\ud83d\udcf1 ${esc(o.telephone || '\u2014')}</span>
        ${o.email ? '<span>\u2709\ufe0f '+esc(o.email)+'</span>' : ''}
      </div>
      <div class="ouvrier-footer">
        <div class="ouvrier-actions" onclick="event.stopPropagation()">
          <button class="btn-sm btn-edit" onclick="editOuvrier('${o.id}')">\u270e Modifier</button>
          <button class="btn-sm btn-deactivate" onclick="toggleActive('${o.id}','${o.statut}')">${o.statut==='actif'?'\u23f8 D\u00e9sactiver':'\u25b6 Activer'}</button>
        </div>
      </div>
      <div class="ouvrier-detail" id="detail-${o.id}">
        <div class="detail-stats">
          <div class="detail-stat">
            <div class="detail-stat-val" id="stat-chantiers-${o.id}">--</div>
            <div class="detail-stat-label">Chantiers</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val" id="stat-heures-${o.id}">--</div>
            <div class="detail-stat-label">Heures / mois</div>
          </div>
          <div class="detail-stat">
            <div class="detail-stat-val" id="stat-ca-${o.id}">--</div>
            <div class="detail-stat-label">CA g&eacute;n&eacute;r&eacute;</div>
          </div>
        </div>
        <h4 style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:700;margin-bottom:8px;">Chantiers r&eacute;cents</h4>
        <div class="recent-chantiers" id="chantiers-${o.id}">
          <div style="color:var(--muted);font-size:12px;">Cliquer pour charger...</div>
        </div>
      </div>
    </div>
  `).join('');
}

async function toggleDetail(id) {
  const detail = $('detail-' + id);
  if (detail.classList.contains('open')) {
    detail.classList.remove('open');
    return;
  }
  detail.classList.add('open');
  // Load ouvrier stats
  const res = await api('/api/btp/chantiers?ouvrier_id=' + id);
  const chantiers = res.chantiers || res.data || [];
  const stats = res.stats || {};

  $('stat-chantiers-' + id).textContent = stats.nb_chantiers || chantiers.length;
  $('stat-heures-' + id).textContent = (stats.heures_mois || 0) + 'h';
  $('stat-ca-' + id).textContent = eur(stats.ca_genere || 0);

  const listEl = $('chantiers-' + id);
  if (!chantiers.length) {
    listEl.innerHTML = '<div style="color:var(--muted);font-size:12px;">Aucun chantier assign\u00e9</div>';
    return;
  }
  listEl.innerHTML = chantiers.slice(0, 5).map(c => `
    <div class="recent-chantier">
      <span style="font-weight:600;">${esc(c.reference||'CH-'+c.id)}</span>
      <span style="color:var(--muted)">${esc(c.type_travaux||'')} | ${esc(c.adresse||'')}</span>
      <span class="ouvrier-status ${c.statut==='termine'?'actif':'inactif'}" style="font-size:9px;">${esc(c.statut||'')}</span>
    </div>
  `).join('');
}

function openModal(ouvrier) {
  $('modal-bg').classList.add('open');
  if (ouvrier) {
    $('modal-title').innerHTML = '&#9998; Modifier l\'ouvrier';
    $('ouvrier-id').value = ouvrier.id;
    $('f-prenom').value = ouvrier.prenom || '';
    $('f-nom').value = ouvrier.nom || '';
    $('f-metier').value = ouvrier.metier || '';
    $('f-taux').value = ouvrier.taux_horaire || '';
    $('f-tel').value = ouvrier.telephone || '';
    $('f-email').value = ouvrier.email || '';
    $('f-statut').value = ouvrier.statut || 'actif';
  } else {
    $('modal-title').innerHTML = '&#128119; Ajouter un ouvrier';
    $('ouvrier-id').value = '';
    $('f-prenom').value = '';
    $('f-nom').value = '';
    $('f-metier').value = 'plombier';
    $('f-taux').value = '';
    $('f-tel').value = '';
    $('f-email').value = '';
    $('f-statut').value = 'actif';
  }
}

function closeModal() {
  $('modal-bg').classList.remove('open');
}

function editOuvrier(id) {
  const o = allOuvriers.find(x => x.id == id);
  if (o) openModal(o);
}

async function toggleActive(id, currentStatus) {
  const newStatus = currentStatus === 'actif' ? 'inactif' : 'actif';
  const res = await api('/api/btp/ouvriers', {
    method: 'PATCH',
    body: JSON.stringify({ id, statut: newStatus })
  });
  if (res.success !== false) {
    toast('Statut mis \u00e0 jour', 'ok');
    loadOuvriers();
  } else {
    toast('Erreur', 'error');
  }
}

async function saveOuvrier() {
  const id = $('ouvrier-id').value;
  const body = {
    prenom: $('f-prenom').value,
    nom: $('f-nom').value,
    metier: $('f-metier').value,
    taux_horaire: parseFloat($('f-taux').value) || 0,
    telephone: $('f-tel').value,
    email: $('f-email').value,
    statut: $('f-statut').value
  };
  if (id) body.id = id;

  const res = await api('/api/btp/ouvriers', {
    method: id ? 'PATCH' : 'POST',
    body: JSON.stringify(body)
  });

  if (res.success !== false) {
    toast(id ? 'Ouvrier modifi\u00e9' : 'Ouvrier ajout\u00e9', 'ok');
    closeModal();
    loadOuvriers();
  } else {
    toast(res.error || 'Erreur', 'error');
  }
}

async function loadOuvriers() {
  const res = await api('/api/btp/ouvriers');
  allOuvriers = res.ouvriers || res.data || [];
  renderOuvriers(allOuvriers);
}

$('modal-bg').addEventListener('click', e => { if (e.target === $('modal-bg')) closeModal(); });

(async () => {
  const { data } = await db.auth.getSession();
  if (!data?.session) { location.href = '/login.html'; return; }
  token = data.session.access_token;
  societeId = data.session.user?.user_metadata?.societe_id;
  await loadOuvriers();
})();
</script>
