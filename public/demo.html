<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JADOMI — Demo interactive</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border-hover:rgba(201,169,97,0.3);
  --text:#f0ede8;--muted:#8a8a9a;--accent:#c9a961;--accent-dark:#a88940;--accent-glow:rgba(201,169,97,0.15);
  --red:#f05050;--green:#60d090;--blue:#5b9bf5;--orange:#f0a050;--yellow:#e0c050;
  --font:'DM Sans','Inter',sans-serif;--display:'Syne',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --sidebar-w:220px;--header-h:64px;
}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;}

/* ===== HEADER ===== */
.demo-header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;z-index:100;
  background:rgba(10,10,15,0.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.header-left{display:flex;align-items:center;gap:16px;}
.logo{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;cursor:default;}
.demo-badge{
  padding:4px 12px;border-radius:50px;font-size:11px;font-weight:700;letter-spacing:0.8px;
  background:var(--accent-glow);color:var(--accent);border:1px solid rgba(201,169,97,0.25);
  text-transform:uppercase;
}
.header-center{display:flex;gap:6px;align-items:center;}
.prof-pill{
  padding:8px 18px;border-radius:50px;font-size:13px;font-weight:600;
  background:transparent;color:var(--muted);border:1px solid var(--border);
  cursor:pointer;transition:all 0.4s var(--ease);letter-spacing:0.2px;
  font-family:var(--font);
}
.prof-pill:hover{color:var(--text);border-color:var(--border-hover);background:var(--surface);}
.prof-pill.active{
  background:var(--accent);color:#0a0a0f;border-color:var(--accent);
  box-shadow:0 4px 20px rgba(201,169,97,0.25);
}
.header-right{display:flex;align-items:center;}
.cta-btn{
  padding:10px 22px;border-radius:10px;font-size:13px;font-weight:700;
  background:var(--accent);color:#0a0a0f;border:none;cursor:pointer;
  font-family:var(--font);transition:all 0.3s var(--ease);letter-spacing:-0.2px;
  display:flex;align-items:center;gap:6px;
}
.cta-btn:hover{background:var(--accent-dark);transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,169,97,0.2);}

/* ===== LAYOUT ===== */
.demo-layout{
  display:flex;margin-top:var(--header-h);min-height:calc(100vh - var(--header-h));
}

/* ===== SIDEBAR ===== */
.demo-sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:rgba(255,255,255,0.02);border-right:1px solid var(--border);
  padding:20px 12px;display:flex;flex-direction:column;gap:4px;
  transition:all 0.4s var(--ease);
}
.sidebar-item{
  padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;
  color:var(--muted);cursor:pointer;transition:all 0.3s var(--ease);
  display:flex;align-items:center;gap:10px;position:relative;
}
.sidebar-item:hover{color:var(--text);background:var(--surface);}
.sidebar-item.active{
  color:var(--accent);background:var(--accent-glow);font-weight:600;
}
.sidebar-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--accent);
}
.sidebar-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.sidebar-label{display:block;font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;padding:16px 14px 8px;opacity:0.6;}

/* ===== MAIN ===== */
.demo-main{
  flex:1;padding:28px 32px 100px;overflow-y:auto;position:relative;
}
.panel{
  display:none;opacity:0;transform:translateY(12px);
  transition:opacity 0.5s var(--ease),transform 0.5s var(--ease);
}
.panel.active{display:block;opacity:1;transform:translateY(0);}
.panel-title{
  font-family:var(--display);font-size:22px;font-weight:700;
  letter-spacing:-0.8px;margin-bottom:6px;
}
.panel-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}

/* ===== GLASS CARDS ===== */
.glass-card{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:14px;padding:20px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:all 0.4s var(--ease);
}
.glass-card:hover{
  border-color:var(--border-hover);transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,0.3);
}

/* ===== GRIDS ===== */
.card-grid{display:grid;gap:16px;}
.card-grid.cols-2{grid-template-columns:repeat(2,1fr);}
.card-grid.cols-3{grid-template-columns:repeat(3,1fr);}
@media(max-width:900px){.card-grid.cols-2,.card-grid.cols-3{grid-template-columns:1fr;}}

/* ===== STATUS BADGES ===== */
.badge{
  display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
  border-radius:50px;font-size:11px;font-weight:600;letter-spacing:0.3px;
}
.badge.en_cours{background:rgba(91,155,245,0.12);color:var(--blue);}
.badge.en_attente{background:rgba(240,160,80,0.12);color:var(--orange);}
.badge.clos{background:rgba(96,208,144,0.12);color:var(--green);}
.badge.critique{background:rgba(240,80,80,0.12);color:var(--red);}
.badge.faible{background:rgba(224,192,80,0.12);color:var(--yellow);}
.badge.ok{background:rgba(96,208,144,0.12);color:var(--green);}
.badge.livre{background:rgba(96,208,144,0.12);color:var(--green);}
.badge.en_preparation{background:rgba(91,155,245,0.12);color:var(--blue);}
.badge.confirmee{background:rgba(96,208,144,0.12);color:var(--green);}
.badge.en_attente_badge{background:rgba(240,160,80,0.12);color:var(--orange);}

/* ===== TABLE ===== */
.demo-table{width:100%;border-collapse:separate;border-spacing:0;}
.demo-table th{
  text-align:left;font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.8px;padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.demo-table td{
  padding:14px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);
  transition:background 0.2s;
}
.demo-table tr:hover td{background:rgba(255,255,255,0.02);}
.demo-table .qty-cell{font-weight:700;font-variant-numeric:tabular-nums;}

/* ===== PROGRESS ===== */
.progress-bar{
  width:100%;height:8px;background:rgba(255,255,255,0.06);border-radius:50px;
  overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:50px;background:linear-gradient(90deg,var(--accent),#e0c060);
  transition:width 1.2s var(--ease);width:0;
}

/* ===== CALENDAR ===== */
.calendar-slot{
  display:flex;align-items:center;gap:16px;padding:14px 16px;
  border-left:3px solid var(--accent);margin-bottom:12px;
  background:var(--surface);border-radius:0 10px 10px 0;
  transition:all 0.3s var(--ease);
}
.calendar-slot:hover{background:var(--surface2);transform:translateX(4px);}
.cal-time{font-size:14px;font-weight:700;color:var(--accent);min-width:55px;font-variant-numeric:tabular-nums;}
.cal-info{flex:1;}
.cal-client{font-size:14px;font-weight:600;}
.cal-type{font-size:12px;color:var(--muted);}
.cal-duration{font-size:12px;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:50px;font-weight:600;}

/* ===== WEBSITE PREVIEW ===== */
.site-preview{
  background:linear-gradient(135deg,rgba(201,169,97,0.08),rgba(201,169,97,0.02));
  border:1px solid rgba(201,169,97,0.15);border-radius:14px;overflow:hidden;
}
.site-preview-header{
  padding:12px 16px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.site-dots{display:flex;gap:6px;}
.site-dot{width:10px;height:10px;border-radius:50%;}
.site-dot.r{background:#f05050;}.site-dot.y{background:#e0c050;}.site-dot.g{background:#60d090;}
.site-preview-body{padding:28px;text-align:center;}
.site-preview-body h3{font-family:var(--display);font-size:20px;font-weight:700;margin-bottom:8px;}
.site-preview-body p{font-size:12px;color:var(--muted);margin-bottom:16px;}
.site-theme-row{display:flex;gap:8px;justify-content:center;}
.site-theme{
  width:36px;height:36px;border-radius:8px;border:2px solid transparent;
  cursor:pointer;transition:all 0.3s;
}
.site-theme:hover,.site-theme.active{border-color:var(--accent);transform:scale(1.1);}
.site-nav-mock{display:flex;gap:16px;justify-content:center;margin-top:16px;}
.site-nav-mock span{font-size:11px;color:var(--muted);padding:4px 10px;border-radius:6px;background:var(--surface);}

/* ===== APPOINTMENT LIST ===== */
.appt-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.04);
  transition:all 0.3s var(--ease);
}
.appt-item:last-child{border-bottom:none;}
.appt-item:hover{background:var(--surface);}
.appt-left{display:flex;align-items:center;gap:14px;}
.appt-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent-glow),var(--surface2));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:var(--accent);
}
.appt-name{font-size:14px;font-weight:600;}
.appt-service{font-size:12px;color:var(--muted);}
.appt-time{font-size:13px;font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;}

/* ===== CHANTIER CARDS ===== */
.chantier-progress{margin-top:12px;}
.chantier-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;}

/* ===== DEVIS TABLE ===== */
.devis-amount{font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent);}

/* ===== BOTTOM BANNER ===== */
.demo-banner{
  position:fixed;bottom:0;left:0;right:0;
  padding:14px 28px;text-align:center;
  background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);font-size:13px;color:var(--muted);
  z-index:100;
}
.demo-banner strong{color:var(--accent);}
.demo-banner a{color:var(--accent);font-weight:600;text-decoration:underline;text-underline-offset:3px;margin-left:8px;}
.demo-banner a:hover{color:var(--accent-dark);}

/* ===== MOBILE ===== */
.mobile-sidebar-toggle{
  display:none;position:fixed;bottom:72px;right:16px;z-index:200;
  width:48px;height:48px;border-radius:50%;background:var(--accent);
  color:#0a0a0f;border:none;font-size:20px;cursor:pointer;
  box-shadow:0 4px 20px rgba(201,169,97,0.3);
  transition:all 0.3s var(--ease);
}
.mobile-sidebar-toggle:hover{transform:scale(1.05);}

@media(max-width:768px){
  .header-center{display:none;}
  .demo-sidebar{
    position:fixed;left:-260px;top:var(--header-h);bottom:0;
    z-index:90;width:260px;min-width:260px;
    background:rgba(10,10,15,0.96);backdrop-filter:blur(24px);
    transition:left 0.4s var(--ease);
  }
  .demo-sidebar.open{left:0;}
  .mobile-sidebar-toggle{display:flex;align-items:center;justify-content:center;}
  .demo-main{padding:20px 16px 120px;}
  .card-grid.cols-3{grid-template-columns:1fr;}
  .card-grid.cols-2{grid-template-columns:1fr;}
  /* mobile profession selector */
  .mobile-prof-bar{
    display:flex;gap:6px;padding:12px 16px;overflow-x:auto;
    border-bottom:1px solid var(--border);background:rgba(10,10,15,0.6);
  }
  .mobile-prof-bar .prof-pill{white-space:nowrap;font-size:12px;padding:6px 14px;}
}
@media(min-width:769px){
  .mobile-prof-bar{display:none !important;}
}

/* ===== ANIMATIONS ===== */
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
.anim-in{animation:fadeInUp 0.5s var(--ease) both;}
.anim-delay-1{animation-delay:0.05s;}
.anim-delay-2{animation-delay:0.1s;}
.anim-delay-3{animation-delay:0.15s;}
.anim-delay-4{animation-delay:0.2s;}
.anim-delay-5{animation-delay:0.25s;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.18);}
</style>
</head>

/* ============================================================
   STATE + RENDERING
   ============================================================ */
let currentProf = 'avocat';
let currentPanel = null;

function buildSidebar(prof) {
  const sidebar = document.getElementById('sidebar');
  const items = SIDEBARS[prof];
  sidebar.innerHTML = `<div class="sidebar-label">${prof.charAt(0).toUpperCase() + prof.slice(1)}</div>` +
    items.map((item, i) => `
      <div class="sidebar-item anim-in anim-delay-${Math.min(i+1,5)}" data-panel="${item.id}">
        <span class="sidebar-icon">${item.icon}</span>
        ${item.label}
      </div>
    `).join('');

  // Bind clicks
  sidebar.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => {
      selectPanel(el.dataset.panel);
      // close mobile sidebar
      sidebar.classList.remove('open');
    });
  });

  // Select first by default
  selectPanel(items[0].id);
}

function selectPanel(panelId) {
  currentPanel = panelId;
  // Update sidebar active
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.panel === panelId);
  });
  // Render panel with animation
  const main = document.getElementById('mainContent');
  main.style.opacity = '0';
  main.style.transform = 'translateY(12px)';
  setTimeout(() => {
    main.innerHTML = `<div class="panel active">${renderPanel(currentProf, panelId)}</div>`;
    // Animate in
    requestAnimationFrame(() => {
      main.style.transition = 'opacity 0.45s cubic-bezier(.16,1,.3,1), transform 0.45s cubic-bezier(.16,1,.3,1)';
      main.style.opacity = '1';
      main.style.transform = 'translateY(0)';
      // Animate progress bars
      setTimeout(animateProgressBars, 100);
    });
  }, 180);
}

function animateProgressBars() {
  document.querySelectorAll('.progress-fill[data-width]').forEach(bar => {
    requestAnimationFrame(() => {
      bar.style.width = bar.dataset.width + '%';
    });
  });
}

function selectProfession(prof) {
  if (prof === currentProf) return;
  currentProf = prof;
  // Update all pill sets
  document.querySelectorAll('.prof-pill').forEach(el => {
    el.classList.toggle('active', el.dataset.prof === prof);
  });
  buildSidebar(prof);
}

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  // Profession tabs (header + mobile)
  document.querySelectorAll('.prof-pill').forEach(pill => {
    pill.addEventListener('click', () => selectProfession(pill.dataset.prof));
  });

  // Mobile sidebar toggle
  const toggle = document.getElementById('sidebarToggle');
  const sidebar = document.getElementById('sidebar');
  toggle.addEventListener('click', () => sidebar.classList.toggle('open'));

  // Close sidebar on outside click (mobile)
  document.addEventListener('click', (e) => {
    if (window.innerWidth <= 768 &&
        sidebar.classList.contains('open') &&
        !sidebar.contains(e.target) &&
        e.target !== toggle) {
      sidebar.classList.remove('open');
    }
  });

  // Build initial state
  buildSidebar('avocat');
});
</script>
</body>
</html>
