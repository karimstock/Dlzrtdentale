<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deals & Offres | JADOMI</title>
  <meta name="description" content="Découvrez les offres exclusives des professionnels JADOMI. Réductions, promotions et deals réservés aux membres.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
      --text: #f0f0f0; --muted: #888; --accent: #f59e0b; --accent2: #2563eb; --danger: #ef4444; --success: #22c55e;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* Header */
    .deals-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .deals-header .logo { font-size: 22px; font-weight: 700; color: var(--accent); }
    .deals-header nav a { margin-left: 24px; font-size: 14px; color: var(--muted); font-weight: 500; }
    .deals-header nav a:hover { color: var(--text); }

    /* Hero */
    .deals-hero { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 48px 24px; text-align: center; border-bottom: 1px solid var(--border); }
    .deals-hero h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .deals-hero h1 span { color: var(--accent); }
    .deals-hero p { color: var(--muted); font-size: 16px; }

    /* Auth gate */
    .auth-gate { text-align: center; padding: 80px 24px; }
    .auth-gate .ico { font-size: 56px; margin-bottom: 16px; }
    .auth-gate h2 { font-size: 22px; margin-bottom: 8px; }
    .auth-gate p { color: var(--muted); margin-bottom: 24px; }
    .auth-gate a { display: inline-block; padding: 12px 32px; background: var(--accent); color: #000; font-weight: 600; border-radius: 10px; font-size: 14px; }
    .auth-gate a:hover { background: #d97706; }

    /* Filters */
    .filters { display: flex; gap: 10px; justify-content: center; padding: 20px 24px; flex-wrap: wrap; }
    .cat-chip { padding: 8px 18px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s; }
    .cat-chip:hover, .cat-chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* Grid */
    .deals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 24px; }

    /* Deal Card */
    .deal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: transform .2s, box-shadow .2s; }
    .deal-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,.4); }
    .deal-photo { width: 100%; height: 180px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 48px; color: var(--muted); position: relative; }
    .deal-photo img { width: 100%; height: 100%; object-fit: cover; }
    .deal-remise { position: absolute; top: 12px; right: 12px; background: var(--danger); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 700; }
    .deal-body { padding: 18px; }
    .deal-titre { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .deal-desc { font-size: 13px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
    .deal-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 14px; flex-wrap: wrap; }
    .deal-meta .cat { background: var(--surface2); padding: 3px 10px; border-radius: 6px; font-weight: 500; }
    .deal-expiry { color: var(--accent); font-weight: 500; }
    .deal-btn { display: block; width: 100%; text-align: center; padding: 12px; background: var(--accent2); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
    .deal-btn:hover { background: #1d4ed8; }

    .empty { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty .ico { font-size: 48px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 60px; color: var(--muted); }

    @media (max-width: 768px) {
      .deals-hero h1 { font-size: 24px; }
      .deals-grid { grid-template-columns: 1fr; padding: 16px; }
    }
  </style>
</head>
<body>

<header class="deals-header">
  <a href="/" class="logo">JADOMI</a>
  <nav>
    <a href="/annuaire">Annuaire</a>
    <a href="/deals">Deals</a>
    <a href="/societes">Mon espace</a>
  </nav>
</header>

<section class="deals-hero">
  <h1>🔥 <span>Deals</span> exclusifs</h1>
  <p>Offres spéciales réservées aux membres JADOMI</p>
</section>

<!-- Auth gate (shown if not logged in) -->
<div id="authGate" class="auth-gate" style="display:none;">
  <div class="ico">🔒</div>
  <h2>Accès réservé aux membres</h2>
  <p>Connectez-vous à votre compte JADOMI pour découvrir les deals exclusifs.</p>
  <a href="/societes">Se connecter</a>
</div>

<!-- Main content (shown if logged in) -->
<div id="mainContent" style="display:none;">
  <div class="filters" id="catFilters"></div>
  <div id="dealsGrid" class="deals-grid">
    <div class="loading">Chargement des deals...</div>
  </div>
</div>

<script>
const API = '/api/network/deals';
const SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let token = null;
let currentCat = '';

async function init() {
  // Check auth
  token = localStorage.getItem('sb-access-token') || sessionStorage.getItem('sb-access-token');
  if (!token) {
    // Try Supabase session
    try {
      const session = JSON.parse(localStorage.getItem('sb-' + new URL(SUPABASE_URL).hostname.split('.')[0] + '-auth-token') || '{}');
      token = session?.access_token || null;
    } catch(e) {}
  }

  if (!token) {
    document.getElementById('authGate').style.display = '';
    return;
  }

  document.getElementById('mainContent').style.display = '';
  loadDeals();
}

async function loadDeals(categorie) {
  const grid = document.getElementById('dealsGrid');
  grid.innerHTML = '<div class="loading">Chargement...</div>';

  try {
    const params = new URLSearchParams();
    if (categorie) params.set('categorie', categorie);

    const resp = await fetch(API + '/public?' + params.toString());
    const json = await resp.json();
    if (!json.ok) throw new Error(json.error || 'Erreur');

    // Build category filters
    const cats = [...new Set((json.deals || []).map(d => d.categorie).filter(Boolean))];
    const filtersEl = document.getElementById('catFilters');
    filtersEl.innerHTML = '<span class="cat-chip ' + (!currentCat ? 'active' : '') + '" data-cat="">Tous</span>' +
      cats.map(c => '<span class="cat-chip ' + (currentCat === c ? 'active' : '') + '" data-cat="' + esc(c) + '">' + esc(c) + '</span>').join('');
    filtersEl.querySelectorAll('.cat-chip').forEach(ch => {
      ch.addEventListener('click', () => {
        currentCat = ch.dataset.cat;
        loadDeals(currentCat);
      });
    });

    const deals = json.deals || [];
    if (!deals.length) {
      grid.innerHTML = '<div class="empty"><div class="ico">🎁</div><p>Aucun deal disponible pour le moment.<br>Revenez bientôt !</p></div>';
      return;
    }

    grid.innerHTML = deals.map(d => {
      const photoHtml = d.photo
        ? `<div class="deal-photo"><img src="${esc(d.photo)}" alt="${esc(d.titre)}" loading="lazy">${d.remise_pct ? '<span class="deal-remise">-' + d.remise_pct + '%</span>' : ''}</div>`
        : `<div class="deal-photo">🎁${d.remise_pct ? '<span class="deal-remise">-' + d.remise_pct + '%</span>' : ''}</div>`;

      const expiry = d.date_fin ? new Date(d.date_fin).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }) : '';

      return `<div class="deal-card">
        ${photoHtml}
        <div class="deal-body">
          <div class="deal-titre">${esc(d.titre)}</div>
          <div class="deal-desc">${esc(d.description || '')}</div>
          <div class="deal-meta">
            ${d.categorie ? '<span class="cat">' + esc(d.categorie) + '</span>' : ''}
            ${expiry ? '<span class="deal-expiry">Jusqu\'au ' + expiry + '</span>' : ''}
            ${d.max_utilisations ? '<span>' + (d.max_utilisations - (d.nb_utilisations||0)) + ' restant(s)</span>' : ''}
          </div>
          ${d.conditions ? '<div class="deal-desc" style="font-style:italic;">Conditions : ' + esc(d.conditions) + '</div>' : ''}
          <button class="deal-btn" onclick="useDeal('${d.id}')">Réserver avec cette offre</button>
        </div>
      </div>`;
    }).join('');

  } catch (e) {
    grid.innerHTML = '<div class="empty"><div class="ico">⚠️</div><p>' + esc(e.message) + '</p></div>';
  }
}

async function useDeal(dealId) {
  if (!token) { alert('Connectez-vous pour utiliser un deal.'); return; }
  try {
    const resp = await fetch(API.replace('/deals', '/network/deals/') + dealId + '/utiliser', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }
    });
    const json = await resp.json();
    if (!json.ok) {
      const msgs = { deal_expired: 'Ce deal a expiré.', deal_max_reached: 'Ce deal n\'est plus disponible.', deal_already_used: 'Vous avez déjà utilisé ce deal.' };
      alert(msgs[json.error] || json.error || 'Erreur');
      return;
    }
    alert('Deal réservé avec succès ! Vous le retrouverez dans votre espace.');
    loadDeals(currentCat);
  } catch (e) {
    alert('Erreur : ' + e.message);
  }
}

init();
</script>
</body>
</html>
