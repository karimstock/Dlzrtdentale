<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI Studio — Mes sites</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* Passe 38 — Dashboard mes-sites avec interventions IA */
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f1f3d;--bg2:#1a2d50;--surface:#1e3460;--surface2:#243870;--border:rgba(99,102,241,0.15);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--accent:#6366f1;--accent2:#8b5cf6;--accent3:#06b6d4;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--gold:#d4a853;--radius:14px;--rs:10px;--ease:cubic-bezier(.16,1,.3,1);}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 15% 15%,rgba(99,102,241,0.07) 0%,transparent 50%);}
.container{max-width:1200px;margin:0 auto;padding:24px 28px 80px;position:relative;z-index:1;}
a{color:var(--accent3);text-decoration:none;}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--text),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.back{font-size:13px;color:var(--text2);}
.btn{padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:600;transition:all .2s var(--ease);}
.btn-p{background:var(--accent);color:#fff;}.btn-p:hover{background:#818cf8;transform:translateY(-1px);}
.btn-s{background:transparent;color:var(--text2);border:1px solid var(--border);}.btn-s:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);}.btn-danger:hover{background:rgba(239,68,68,.2);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .3s;}
.card:hover{border-color:rgba(99,102,241,.3);}
.ct{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px;}

/* Layout 2 colonnes */
.layout{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start;}

/* Preview */
.preview-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);height:240px;position:relative;}
.preview-wrap iframe{width:200%;height:480px;border:0;pointer-events:none;transform:scale(0.5);transform-origin:top left;}
.preview-overlay{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,.6));display:flex;gap:8px;justify-content:flex-end;}
.preview-overlay a{font-size:10px;background:rgba(255,255,255,.15);color:#fff;padding:4px 10px;border-radius:6px;backdrop-filter:blur(4px);}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;}
.tab{padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;}
.tab:hover{background:rgba(99,102,241,.06);color:var(--text);}
.tab.active{background:rgba(99,102,241,.1);color:var(--accent);font-weight:600;}
.tab-pane{display:none;}.tab-pane.active{display:block;}

/* Actions rapides */
.actions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px;}
.action-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:14px;text-align:center;cursor:pointer;transition:all .2s var(--ease);}
.action-btn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(99,102,241,.15);}
.action-btn .a-ico{font-size:22px;margin-bottom:6px;}
.action-btn .a-name{font-size:12px;font-weight:600;}
.action-btn .a-tag{font-size:9px;color:var(--text3);margin-top:3px;}

/* Status zone */
.status-zone{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;display:none;}
.status-step{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px;color:var(--text2);}
.status-step .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-step.done .dot{background:var(--success);}
.status-step.active .dot{background:var(--accent);animation:pulse 1s infinite;}
.status-step.pending .dot{background:var(--text3);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* History table */
.htable{width:100%;border-collapse:collapse;font-size:12px;}
.htable th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
.htable td{padding:8px 10px;border-bottom:1px solid rgba(99,102,241,.06);}
.htable tr:hover td{background:rgba(99,102,241,.03);}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.pill-ok{background:rgba(16,185,129,.15);color:#6ee7b7;}
.pill-progress{background:rgba(99,102,241,.15);color:#a5b4fc;}
.pill-fail{background:rgba(239,68,68,.15);color:#fca5a5;}
.pill-devis{background:rgba(245,158,11,.15);color:#fcd34d;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.field-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field-input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;}
.field-input:focus{outline:none;border-color:var(--accent);}
textarea.field-input{min-height:100px;resize:vertical;}

/* Sites grid */
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.site-card{cursor:pointer;}
.site-url{font-size:14px;font-weight:700;margin-bottom:4px;word-break:break-all;}
.site-meta{font-size:11px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;}
.empty{text-align:center;padding:48px;color:var(--text3);}
.footer{text-align:center;padding:24px 0;font-size:11px;color:var(--text3);}
@media(max-width:768px){.layout{grid-template-columns:1fr;}.actions-grid{grid-template-columns:1fr 1fr;}.container{padding:16px 14px 60px;}}
</style>
</head>
<body>
<div class="container" id="app">
  <div style="text-align:center;padding:60px;color:var(--text2);">Chargement...</div>
</div>

<!-- Modal action rapide -->
<div class="modal-overlay" id="modal-action">
  <div class="modal">
    <h3 id="modal-title">Action rapide</h3>
    <div id="modal-body"></div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-s" onclick="closeModal()">Annuler</button>
      <button class="btn btn-p" id="modal-confirm" onclick="confirmAction()">Lancer la modification</button>
    </div>
  </div>
</div>

<!-- Modal demande libre -->
<div class="modal-overlay" id="modal-libre">
  <div class="modal">
    <h3>Nouvelle demande a JADOMI IA</h3>
    <div class="field-label">Decrivez votre demande</div>
    <textarea class="field-input" id="libre-desc" placeholder="Ex: Ajoute une section temoignages, Change le slogan du hero, Deplace le telephone en haut a droite..."></textarea>
    <div style="font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5;">JADOMI IA analysera votre site et appliquera la modification automatiquement (1-5 min).<br>Les demandes complexes seront referees a nos experts.</div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-s" onclick="closeModalLibre()">Annuler</button>
      <button class="btn btn-p" onclick="submitLibre()">Envoyer la demande</button>
    </div>
  </div>
</div>

<script>
// =============================================
// JADOMI Studio — Dashboard mes-sites
// Passe 38 — 24 avril 2026
// =============================================
const SU='https://vsbomwjzehnfinfjvhqp.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzYm9td2p6ZWhuZmluZmp2aHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTE1ODksImV4cCI6MjA5MDcyNzU4OX0.RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF_W6H_T76tSjk';
let db, token, societeId, currentSiteId = null, currentActionCode = null, actionsRapides = [];

(async function(){
  db = supabase.createClient(SU, SK);
  const { data } = await db.auth.getSession();
  let s = data?.session;
  if (!s) { const r = localStorage.getItem('jadomi_session'); if (r) try { s = JSON.parse(r)?.session || JSON.parse(r); } catch {} }
  if (!s) { window.location.href = '/login.html?redirect=/studio/mes-sites/'; return; }
  token = s.access_token || s.token;
  societeId = localStorage.getItem('jadomi_selected_societe') || null;

  // Check URL for site_id
  const params = new URLSearchParams(window.location.search);
  const siteId = params.get('id');
  if (siteId) { currentSiteId = siteId; renderSiteDetail(); }
  else { renderSitesList(); }
})();

function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'X-Societe-Id': societeId || '' } };
  if (body && method !== 'GET') opts.body = JSON.stringify(body);
  return fetch(path, opts).then(async r => { const d = await r.json(); if (!r.ok) throw d; return d; });
}

// ============ SITES LIST ============
async function renderSitesList() {
  const app = document.getElementById('app');
  try {
    const sites = await api('GET', '/api/studio/sites-existants/mes-sites');
    app.innerHTML = `
      <div class="header"><div><a href="/organisation.html" class="back">&larr; Retour</a><h1>Mes sites</h1></div>
      <a href="/studio/onboarding/" class="btn btn-p" style="text-decoration:none;">Ajouter un site</a></div>
      ${sites.length ? '<div class="sites-grid">' + sites.map(s => `
        <div class="card site-card" onclick="window.location.href='?id=${s.id}'">
          <div class="site-url">${s.url.replace(/https?:\/\//, '')}</div>
          <div class="site-meta">
            <span>${s.hebergeur || '—'}</span>
            <span>${s.plateforme || '—'}</span>
            <span class="pill ${s.statut === 'connecte' ? 'pill-ok' : 'pill-devis'}">${s.statut === 'connecte' ? 'Connecte' : s.statut}</span>
          </div>
        </div>
      `).join('') + '</div>' : '<div class="empty">Aucun site connecte.<br><br><a href="/studio/onboarding/" class="btn btn-p" style="text-decoration:none;">Analyser un site</a></div>'}
      <div class="footer">Propulse par JADOMI IA</div>`;
  } catch (e) { app.innerHTML = '<div class="empty" style="color:var(--danger);">Erreur: ' + (e.error || e.message) + '</div>'; }
}

// ============ SITE DETAIL ============
async function renderSiteDetail() {
  const app = document.getElementById('app');
  try {
    const [siteData, actions] = await Promise.all([
      api('GET', '/api/studio/sites-existants/' + currentSiteId),
      api('GET', '/api/studio/interventions/actions-rapides')
    ]);
    actionsRapides = actions;
    const site = siteData.site;
    const creds = siteData.credentials || [];
    const hasAccess = creds.some(c => c.dernier_test_ok);

    app.innerHTML = `
      <div class="header"><div><a href="/studio/mes-sites/" class="back">&larr; Mes sites</a><h1>${site.url.replace(/https?:\/\//, '')}</h1></div></div>
      <div class="layout">
        <!-- COLONNE GAUCHE -->
        <div>
          <div class="preview-wrap">
            <iframe src="${site.url}" sandbox="allow-same-origin"></iframe>
            <div class="preview-overlay">
              <a href="${site.url}" target="_blank">Ouvrir le site</a>
            </div>
          </div>
          <div class="card" style="margin-top:14px;">
            <div class="ct">Informations</div>
            <div style="font-size:12px;color:var(--text2);line-height:1.8;">
              <div><strong>URL :</strong> ${site.url}</div>
              <div><strong>Hebergeur :</strong> ${site.hebergeur || '—'}</div>
              <div><strong>Plateforme :</strong> ${site.plateforme || '—'}</div>
              <div><strong>Statut :</strong> <span class="pill ${hasAccess ? 'pill-ok' : 'pill-devis'}">${hasAccess ? 'Connecte' : site.statut}</span></div>
            </div>
            <div style="display:flex;gap:8px;margin-top:12px;">
              <button class="btn btn-s" style="font-size:11px;padding:6px 12px;" onclick="testConnexion()">Tester connexion</button>
            </div>
          </div>
        </div>

        <!-- COLONNE DROITE -->
        <div>
          <div class="tabs">
            <div class="tab active" onclick="switchTab('modifier',this)">Modifier</div>
            <div class="tab" onclick="switchTab('historique',this)">Historique</div>
          </div>

          <!-- TAB MODIFIER -->
          <div class="tab-pane active" id="pane-modifier">
            ${hasAccess ? `
              <div class="ct">Actions rapides</div>
              <div class="actions-grid">
                ${actions.map(a => `
                  <div class="action-btn" onclick="openAction('${a.code}')">
                    <div class="a-ico">${actionIcon(a.code)}</div>
                    <div class="a-name">${a.nom}</div>
                    <div class="a-tag">${a.complexite}</div>
                  </div>
                `).join('')}
              </div>
              <div class="ct" style="margin-top:20px;">Ou demande libre</div>
              <div class="card" style="cursor:pointer;" onclick="openModalLibre()">
                <div style="font-size:13px;color:var(--text2);">Decrivez ce que vous voulez modifier...</div>
                <div style="font-size:11px;color:var(--text3);margin-top:6px;">JADOMI IA analyse et applique en 1-5 min</div>
              </div>
            ` : `
              <div class="card" style="text-align:center;padding:32px;">
                <div style="font-size:16px;font-weight:700;margin-bottom:8px;">Connexion requise</div>
                <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">Donnez acces a JADOMI pour modifier votre site automatiquement.</div>
                <a href="/studio/onboarding/" class="btn btn-p" style="text-decoration:none;">Configurer l'acces</a>
              </div>
            `}

            <!-- Zone status -->
            <div class="status-zone" id="status-zone">
              <div class="ct">JADOMI IA en action</div>
              <div id="status-steps"></div>
              <div id="status-result" style="margin-top:12px;display:none;"></div>
            </div>
          </div>

          <!-- TAB HISTORIQUE -->
          <div class="tab-pane" id="pane-historique">
            <div id="history-table">Chargement...</div>
          </div>
        </div>
      </div>
      <div class="footer">Propulse par JADOMI IA</div>`;

    loadHistory();
  } catch (e) { app.innerHTML = '<div class="empty" style="color:var(--danger);">Erreur: ' + (e.error || e.message) + '</div>'; }
}

function actionIcon(code) {
  const icons = { changer_telephone: '&#128222;', changer_horaires: '&#128339;', changer_adresse: '&#128205;', changer_email: '&#9993;', changer_couleur: '&#127912;', remplacer_photo: '&#128247;', modifier_texte_section: '&#128221;', optimiser_images: '&#9889;', ajouter_avis_google: '&#11088;', corriger_meta_seo: '&#128270;' };
  return icons[code] || '&#9998;';
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-' + tab).classList.add('active');
  if (tab === 'historique') loadHistory();
}

// ============ ACTIONS RAPIDES ============
function openAction(code) {
  currentActionCode = code;
  const action = actionsRapides.find(a => a.code === code);
  if (!action) return;
  document.getElementById('modal-title').textContent = action.nom;
  const fields = getFieldsForAction(code);
  document.getElementById('modal-body').innerHTML = `
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">${action.description}</div>
    ${fields}
    <div style="font-size:11px;color:var(--text3);margin-top:8px;">Temps estime : 1-2 minutes. Backup automatique avant modification.</div>
  `;
  document.getElementById('modal-action').classList.add('show');
}

function getFieldsForAction(code) {
  const map = {
    changer_telephone: '<div class="field-label">Nouveau numero</div><input class="field-input" id="param-value" placeholder="01 23 45 67 89">',
    changer_horaires: '<div class="field-label">Nouveaux horaires</div><textarea class="field-input" id="param-value" placeholder="Lundi-Vendredi : 9h-19h\nSamedi : 9h-12h\nDimanche : Ferme"></textarea>',
    changer_adresse: '<div class="field-label">Nouvelle adresse</div><input class="field-input" id="param-value" placeholder="12 rue de la Paix, 75002 Paris">',
    changer_email: '<div class="field-label">Nouvel email</div><input class="field-input" id="param-value" type="email" placeholder="contact@cabinet.fr">',
    changer_couleur: '<div class="field-label">Nouvelle couleur (hex)</div><div style="display:flex;gap:8px;align-items:center;"><input class="field-input" id="param-value" placeholder="#2D3A8C" style="width:200px;"><input type="color" id="param-color" value="#2D3A8C" onchange="document.getElementById(\'param-value\').value=this.value" style="width:44px;height:38px;border:none;cursor:pointer;"></div>',
    modifier_texte_section: '<div class="field-label">Texte actuel (a remplacer)</div><textarea class="field-input" id="param-old" placeholder="Le texte actuel sur votre site..."></textarea><div class="field-label" style="margin-top:10px;">Nouveau texte</div><textarea class="field-input" id="param-value" placeholder="Le nouveau texte souhaite..."></textarea>',
    remplacer_photo: '<div class="field-label">URL ou description de la photo a remplacer</div><input class="field-input" id="param-value" placeholder="La photo du hero / la photo de l\'equipe...">',
    optimiser_images: '<div style="font-size:13px;color:var(--text2);">Toutes les images JPG/PNG seront converties en WebP et compressees. Aucun parametre necessaire.</div><input type="hidden" id="param-value" value="toutes">',
    ajouter_avis_google: '<div class="field-label">Google Place ID</div><input class="field-input" id="param-value" placeholder="ChIJ... (trouvable sur Google Maps)">',
    corriger_meta_seo: '<div style="font-size:13px;color:var(--text2);">JADOMI IA analysera vos balises title, meta description et H1 pour les optimiser. Aucun parametre necessaire.</div><input type="hidden" id="param-value" value="auto">'
  };
  return map[code] || '<div class="field-label">Valeur</div><input class="field-input" id="param-value">';
}

async function confirmAction() {
  const value = document.getElementById('param-value')?.value;
  if (!value) return;
  closeModal();

  const parametres = { valeur: value };
  const oldEl = document.getElementById('param-old');
  if (oldEl) parametres.ancien_texte = oldEl.value;

  showStatus('Action en cours...');
  try {
    const result = await api('POST', '/api/studio/interventions/action-rapide', {
      site_id: currentSiteId, action_code: currentActionCode, parametres
    });
    pollStatus(result.intervention_id);
  } catch (e) {
    showStatusResult(false, e.error || e.message);
  }
}

function closeModal() { document.getElementById('modal-action').classList.remove('show'); }

// ============ DEMANDE LIBRE ============
function openModalLibre() { document.getElementById('modal-libre').classList.add('show'); }
function closeModalLibre() { document.getElementById('modal-libre').classList.remove('show'); }

async function submitLibre() {
  const desc = document.getElementById('libre-desc')?.value;
  if (!desc || desc.length < 5) return;
  closeModalLibre();
  showStatus('Analyse en cours...');
  try {
    const result = await api('POST', '/api/studio/interventions/demande-libre', {
      site_id: currentSiteId, demande: desc
    });
    pollStatus(result.intervention_id);
  } catch (e) {
    showStatusResult(false, e.error || e.message);
  }
}

// ============ STATUS POLLING ============
function showStatus(msg) {
  const zone = document.getElementById('status-zone');
  zone.style.display = 'block';
  document.getElementById('status-steps').innerHTML = `
    <div class="status-step active"><div class="dot"></div>${msg}</div>
  `;
  document.getElementById('status-result').style.display = 'none';
}

function showStatusResult(success, message) {
  const resultEl = document.getElementById('status-result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = success
    ? '<div style="color:var(--success);font-weight:600;">&#10003; ' + message + '</div><div style="margin-top:8px;"><a href="' + (document.querySelector('.preview-wrap iframe')?.src || '#') + '" target="_blank" class="btn btn-s" style="font-size:11px;">Voir le resultat</a></div>'
    : '<div style="color:var(--danger);font-weight:600;">&#10007; ' + message + '</div>';
}

let pollTimer = null;
function pollStatus(interventionId) {
  if (pollTimer) clearInterval(pollTimer);
  const steps = ['Analyse IA...', 'Backup fichiers...', 'Modification en cours...', 'Verification...'];
  let stepIdx = 0;

  pollTimer = setInterval(async () => {
    try {
      const status = await api('GET', '/api/studio/interventions/' + interventionId + '/status');
      if (status.statut === 'terminee') {
        clearInterval(pollTimer);
        document.getElementById('status-steps').innerHTML = steps.map(s => `<div class="status-step done"><div class="dot"></div>${s}</div>`).join('');
        const resume = status.analyse_ia?.resume_pour_client || 'Modification appliquee avec succes.';
        showStatusResult(true, resume);
        loadHistory();
      } else if (status.statut === 'echouee') {
        clearInterval(pollTimer);
        const reason = status.analyse_ia?.raison_si_non || 'Erreur lors de l\'execution.';
        showStatusResult(false, reason);
      } else {
        stepIdx = Math.min(stepIdx + 1, steps.length - 1);
        document.getElementById('status-steps').innerHTML = steps.map((s, i) =>
          `<div class="status-step ${i < stepIdx ? 'done' : i === stepIdx ? 'active' : 'pending'}"><div class="dot"></div>${s}</div>`
        ).join('');
      }
    } catch { /* continue polling */ }
  }, 3000);
}

// ============ HISTORIQUE ============
async function loadHistory() {
  if (!currentSiteId) return;
  const el = document.getElementById('history-table');
  if (!el) return;
  try {
    const data = await api('GET', '/api/studio/interventions/historique/' + currentSiteId);
    if (!data.length) { el.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text3);">Aucune intervention</div>'; return; }
    el.innerHTML = `<table class="htable"><thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Statut</th><th>Action</th></tr></thead><tbody>
      ${data.map(d => `<tr>
        <td>${new Date(d.executee_le).toLocaleString('fr-FR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
        <td>${(d.description || '').substring(0, 50)}${(d.description || '').length > 50 ? '...' : ''}</td>
        <td>${d.type_intervention === 'action_rapide' ? 'Action rapide' : 'Demande libre'}</td>
        <td><span class="pill ${d.statut === 'terminee' ? 'pill-ok' : d.statut === 'en_cours' ? 'pill-progress' : 'pill-fail'}">${d.statut}</span></td>
        <td>${d.statut === 'terminee' && !d.rollback_effectue ? '<button class="btn btn-s" style="font-size:10px;padding:3px 8px;" onclick="doRollback(\'' + d.id + '\')">Rollback</button>' : d.rollback_effectue ? '<span style="font-size:10px;color:var(--text3);">Restaure</span>' : ''}</td>
      </tr>`).join('')}
    </tbody></table>`;
  } catch { el.innerHTML = '<div style="color:var(--danger);">Erreur</div>'; }
}

async function doRollback(id) {
  if (!confirm('Restaurer les fichiers originaux ? Cette action est irreversible.')) return;
  try {
    const result = await api('POST', '/api/studio/interventions/' + id + '/rollback');
    alert(result.message || 'Rollback effectue');
    loadHistory();
  } catch (e) { alert('Erreur rollback: ' + (e.error || e.message)); }
}

async function testConnexion() {
  try {
    const result = await api('POST', '/api/studio/sites-existants/' + currentSiteId + '/test-connexion');
    alert(result.test_ok ? 'Connexion OK' : 'Echec: ' + result.test_message);
  } catch (e) { alert('Erreur: ' + (e.error || e.message)); }
}
</script>
