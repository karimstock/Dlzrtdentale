<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI Studio — CMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* =============================================
   JADOMI Studio CMS Dashboard
   Passe 36 — 24 avril 2026
   Style : meme design system que organisation.html
   ============================================= */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f1f3d;--bg2:#1a2d50;--surface:#1e3460;--surface2:#243870;--surface3:#2a4080;
  --border:rgba(99,102,241,0.15);--border2:rgba(99,102,241,0.08);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --accent:#6366f1;--accent2:#8b5cf6;--accent3:#06b6d4;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --gold:#d4a853;--gold2:#b8942d;
  --glow:0 0 20px rgba(99,102,241,0.3);--glow2:0 0 30px rgba(99,102,241,0.15);
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --radius:14px;--rs:10px;
}

html,body{height:100%;margin:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(circle at 15% 15%,rgba(99,102,241,0.07) 0%,transparent 50%),
             radial-gradient(circle at 85% 80%,rgba(139,92,246,0.05) 0%,transparent 50%);}
a{color:var(--accent3);text-decoration:none;}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}

/* Layout */
.container{max-width:1180px;margin:0 auto;padding:24px 28px 80px;position:relative;z-index:1;}

/* Header */
.cms-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.cms-header h1{font-size:24px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--text),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.cms-header .back-link{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;}
.cms-header .back-link:hover{color:var(--accent3);}

/* Bandeau forfait */
.forfait-banner{padding:16px 24px;border-radius:var(--radius);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.forfait-banner.pro{
  background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.08));
  border:1px solid rgba(99,102,241,.25);}
.forfait-banner.expert{
  background:linear-gradient(135deg,rgba(212,168,83,.12),rgba(184,148,45,.06));
  border:1px solid rgba(212,168,83,.3);}
.forfait-banner.classic{
  background:linear-gradient(135deg,rgba(148,163,184,.1),rgba(100,116,139,.06));
  border:1px solid rgba(148,163,184,.2);}
.forfait-name{font-size:14px;font-weight:700;}
.forfait-name .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;margin-left:8px;}
.forfait-banner.pro .badge{background:rgba(99,102,241,.2);color:#a5b4fc;}
.forfait-banner.expert .badge{background:rgba(212,168,83,.2);color:var(--gold);}
.forfait-banner.classic .badge{background:rgba(148,163,184,.2);color:#cbd5e1;}
.upgrade-btn{padding:8px 20px;border-radius:8px;font-size:12px;font-weight:600;transition:all .2s;}
.forfait-banner.pro .upgrade-btn{background:var(--gold);color:#1a1a2e;}
.forfait-banner.pro .upgrade-btn:hover{background:#e0b85c;transform:translateY(-1px);}
.forfait-banner.classic .upgrade-btn{background:var(--accent);color:#fff;}
.forfait-banner.classic .upgrade-btn:hover{background:#818cf8;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{padding:20px;border-radius:var(--radius);transition:all .3s;cursor:default;position:relative;overflow:hidden;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--glow);}
.stat-card.s1{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.08));border:1px solid rgba(99,102,241,.2);}
.stat-card.s2{background:linear-gradient(135deg,rgba(6,182,212,.15),rgba(59,130,246,.08));border:1px solid rgba(6,182,212,.2);}
.stat-card.s3{background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(20,184,166,.08));border:1px solid rgba(16,185,129,.2);}
.stat-card.s4{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(244,63,94,.08));border:1px solid rgba(245,158,11,.2);}
.stat-ico{font-size:24px;margin-bottom:6px;}
.stat-val{font-size:28px;font-weight:800;letter-spacing:-1px;}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .3s;}
.card:hover{border-color:rgba(99,102,241,.3);}
.card-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px;}

/* Actions grid */
.actions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:24px;}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all .3s;text-align:center;}
.action-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--glow);}
.action-card .a-ico{font-size:32px;margin-bottom:10px;}
.action-card .a-name{font-size:14px;font-weight:600;margin-bottom:4px;}
.action-card .a-desc{font-size:11px;color:var(--text2);}

/* Editor */
.editor-wrap{display:grid;grid-template-columns:240px 1fr;gap:20px;margin-bottom:24px;}
.editor-tabs{display:flex;flex-direction:column;gap:4px;}
.editor-tab{padding:10px 14px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;}
.editor-tab:hover{background:rgba(99,102,241,.06);color:var(--text);}
.editor-tab.active{background:rgba(99,102,241,.1);color:var(--accent);font-weight:600;}
.editor-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
.field-group{margin-bottom:18px;}
.field-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.field-input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;transition:border-color .2s;}
.field-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
textarea.field-input{min-height:100px;resize:vertical;}

/* Publish bar */
.publish-bar{position:sticky;bottom:0;left:0;right:0;padding:14px 24px;background:rgba(15,31,61,.95);
  backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:100;}
.btn-primary{padding:10px 24px;background:var(--accent);color:#fff;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s;}
.btn-primary:hover{background:#818cf8;transform:translateY(-1px);}
.btn-secondary{padding:10px 24px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:500;transition:all .2s;}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-gold{padding:10px 24px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1a2e;border-radius:8px;font-size:13px;font-weight:700;transition:all .2s;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,168,83,.3);}
.btn-danger{padding:10px 24px;background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:8px;font-size:13px;font-weight:600;transition:all .2s;}
.btn-danger:hover{background:rgba(239,68,68,.2);}

/* Photos grid */
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.photo-card{border-radius:var(--rs);overflow:hidden;position:relative;aspect-ratio:1;cursor:pointer;border:2px solid transparent;transition:all .2s;}
.photo-card:hover{border-color:var(--accent);transform:scale(1.02);}
.photo-card img{width:100%;height:100%;object-fit:cover;}
.photo-card .photo-overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.7));opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;padding:8px;}
.photo-card:hover .photo-overlay{opacity:1;}
.photo-card .photo-title{font-size:11px;color:#fff;font-weight:500;}

/* Upload area */
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:40px;text-align:center;cursor:pointer;transition:all .2s;}
.upload-area:hover{border-color:var(--accent);background:rgba(99,102,241,.03);}
.upload-area.dragover{border-color:var(--accent);background:rgba(99,102,241,.06);}
.upload-ico{font-size:36px;margin-bottom:8px;opacity:.5;}
.upload-text{font-size:13px;color:var(--text2);}
.upload-text strong{color:var(--accent);}

/* Quota bar */
.quota-bar{margin-bottom:16px;}
.quota-header{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:6px;}
.quota-track{height:6px;background:rgba(99,102,241,.1);border-radius:3px;overflow:hidden;}
.quota-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.quota-fill.ok{background:var(--accent);}
.quota-fill.warn{background:var(--warning);}
.quota-fill.full{background:var(--danger);}

/* History */
.history-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2);font-size:12px;}
.history-item:last-child{border-bottom:none;}
.history-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.history-time{font-size:10px;color:var(--text3);min-width:100px;}

/* Classic CTA */
.classic-hero{text-align:center;padding:60px 40px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px;}
.classic-hero h2{font-size:24px;font-weight:800;margin-bottom:12px;}
.classic-hero p{font-size:14px;color:var(--text2);max-width:500px;margin:0 auto 24px;line-height:1.6;}
.classic-demo{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:30px;margin-bottom:24px;text-align:center;}
.classic-demo h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.demo-preview{max-width:500px;margin:0 auto 20px;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);}
.demo-preview img{width:100%;display:block;}
.value-prop{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);padding:4px 0;}
.value-prop .check{color:var(--success);font-weight:700;}

/* Sections pane */
.section-view{display:none;}.section-view.active{display:block;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:1000;
  transform:translateY(100px);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:var(--success);color:#fff;}
.toast.error{background:var(--danger);color:#fff;}

/* Footer */
.cms-footer{text-align:center;padding:30px 0;font-size:11px;color:var(--text3);}

/* Expert gold theme enhancements */
.expert-theme .forfait-banner{border-color:rgba(212,168,83,.4);}
.expert-theme .cms-header h1{background:linear-gradient(135deg,var(--gold),#e8c96a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.expert-theme .action-card:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(212,168,83,.2);}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;font-size:14px;color:var(--text2);}
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Responsive */
@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .actions-grid{grid-template-columns:1fr 1fr;}
  .editor-wrap{grid-template-columns:1fr;}
  .container{padding:16px 14px 60px;}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr;}
  .actions-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Chargement du CMS...
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// JADOMI Studio CMS — Frontend
// Passe 36 — 24 avril 2026
// =============================================

const SU='https://vsbomwjzehnfinfjvhqp.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzYm9td2p6ZWhuZmluZmp2aHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTE1ODksImV4cCI6MjA5MDcyNzU4OX0.RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF_W6H_T76tSjk';
let db, session, token, forfaitData, societeId;

async function init() {
  try {
    db = supabase.createClient(SU, SK);
    const { data } = await db.auth.getSession();
    session = data?.session;
    if (!session) {
      // Tenter recovery depuis localStorage
      const raw = localStorage.getItem('jadomi_session');
      if (raw) {
        try { session = JSON.parse(raw)?.session || JSON.parse(raw); } catch {}
      }
    }
    if (!session) {
      window.location.href = '/login.html?redirect=/studio/cms/';
      return;
    }
    token = session.access_token || session.token;

    // Recuperer societe_id
    societeId = localStorage.getItem('jadomi_selected_societe') || null;
    if (!societeId) {
      const { data: roles } = await db.from('user_societe_roles')
        .select('societe_id').eq('user_id', session.user.id).limit(1);
      if (roles && roles.length) societeId = roles[0].societe_id;
    }

    // Charger le forfait
    await loadForfait();
  } catch (e) {
    console.error('[CMS init]', e);
    showError('Erreur d\'initialisation');
  }
}

async function apiCall(method, path, body) {
  const opts = {
    method,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'X-Societe-Id': societeId || ''
    }
  };
  if (body && method !== 'GET') opts.body = JSON.stringify(body);
  const res = await fetch('/api/studio/cms' + path, opts);
  const data = await res.json();
  if (!res.ok) throw { status: res.status, ...data };
  return data;
}

async function loadForfait() {
  try {
    forfaitData = await apiCall('GET', '/mon-forfait');
    renderDashboard();
  } catch (e) {
    if (e.error === 'no_subscription') {
      renderNoSubscription();
    } else if (e.status === 401) {
      window.location.href = '/login.html?redirect=/studio/cms/';
    } else {
      // Tables pas encore creees — afficher un message
      renderNoSubscription();
    }
  }
}

function renderDashboard() {
  const code = forfaitData.forfait.code;
  const isExpert = code === 'expert';
  const isClassic = code === 'classic';
  const isPro = code === 'pro';

  if (isClassic) {
    renderClassic();
    return;
  }

  document.body.className = isExpert ? 'expert-theme' : '';

  const app = document.getElementById('app');
  app.innerHTML = `
    <!-- Header -->
    <div class="cms-header">
      <div>
        <a href="/organisation.html" class="back-link">&larr; Retour au dashboard</a>
        <h1>JADOMI Studio — Mon site</h1>
      </div>
      <a href="javascript:void(0)" onclick="window.open('/site/' + getSiteSlug(), '_blank')" class="btn-primary" style="text-decoration:none;">
        Voir mon site
      </a>
    </div>

    <!-- Bandeau forfait -->
    <div class="forfait-banner ${code}">
      <div>
        <div class="forfait-name">
          ${forfaitData.forfait.nom}
          <span class="badge">${code.toUpperCase()}</span>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:4px;">
          ${forfaitData.forfait.prix_mensuel_eur}&euro;/mois &middot; Abonnement ${forfaitData.abonnement.statut}
        </div>
      </div>
      ${isPro ? '<button class="upgrade-btn" onclick="showUpgrade()">Decouvrir Expert</button>' : ''}
      ${isExpert ? '<div style="font-size:11px;color:var(--gold);">Excellence absolue</div>' : ''}
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card s1">
        <div class="stat-ico">&#128196;</div>
        <div class="stat-val" id="stat-contenus">${forfaitData.utilisation.contenus}</div>
        <div class="stat-lbl">Contenus</div>
      </div>
      <div class="stat-card s2">
        <div class="stat-ico">&#128247;</div>
        <div class="stat-val" id="stat-photos">${forfaitData.utilisation.photos}</div>
        <div class="stat-lbl">Photos</div>
      </div>
      <div class="stat-card s3">
        <div class="stat-ico">&#9998;</div>
        <div class="stat-val" id="stat-modifs">0</div>
        <div class="stat-lbl">Modifications ce mois</div>
      </div>
      <div class="stat-card s4">
        <div class="stat-ico">&#128200;</div>
        <div class="stat-val">-</div>
        <div class="stat-lbl">Visites ce mois</div>
      </div>
    </div>

    <!-- Actions rapides -->
    <div class="card-title" style="font-size:15px;font-weight:700;margin-bottom:16px;">Actions rapides</div>
    <div class="actions-grid" id="actions-grid">
      <div class="action-card" onclick="showSection('editor')">
        <div class="a-ico">&#9997;</div>
        <div class="a-name">Modifier textes</div>
        <div class="a-desc">Hero, services, horaires, contact</div>
      </div>
      <div class="action-card" onclick="showSection('photos')">
        <div class="a-ico">&#128247;</div>
        <div class="a-name">Gerer photos</div>
        <div class="a-desc">Galerie du cabinet</div>
      </div>
      <div class="action-card" onclick="showSection('horaires')">
        <div class="a-ico">&#128339;</div>
        <div class="a-name">Horaires d'ouverture</div>
        <div class="a-desc">Jours et heures</div>
      </div>
      <div class="action-card" onclick="showSection('contact')">
        <div class="a-ico">&#128222;</div>
        <div class="a-name">Informations de contact</div>
        <div class="a-desc">Telephone, email, adresse</div>
      </div>
      ${isExpert ? `
      <div class="action-card" onclick="showSection('blog')">
        <div class="a-ico">&#128221;</div>
        <div class="a-name">Articles de blog</div>
        <div class="a-desc">Publier des articles</div>
      </div>
      <div class="action-card" style="border-color:rgba(212,168,83,.2);" onclick="showSection('expert')">
        <div class="a-ico">&#9733;</div>
        <div class="a-name">Options Expert</div>
        <div class="a-desc">Multi-langue, A/B testing, analytics</div>
      </div>` : ''}
    </div>

    <!-- Sections dynamiques -->
    <div id="section-container">
      <!-- Editor section -->
      <div class="section-view" id="sec-editor">
        <div class="card-title" style="font-size:15px;font-weight:700;margin-bottom:16px;">
          <span>&#9997;</span> Editeur de contenus
          <button class="btn-secondary" style="margin-left:auto;font-size:11px;padding:6px 12px;" onclick="showSection('dashboard')">Retour</button>
        </div>
        <div class="editor-wrap">
          <div class="editor-tabs card" id="editor-tabs">
            <div class="editor-tab active" onclick="loadSection('hero', this)">&#127968; Hero</div>
            <div class="editor-tab" onclick="loadSection('services', this)">&#128188; Services</div>
            <div class="editor-tab" onclick="loadSection('horaires', this)">&#128339; Horaires</div>
            <div class="editor-tab" onclick="loadSection('contact', this)">&#128222; Contact</div>
            <div class="editor-tab" onclick="loadSection('about', this)">&#128100; A propos</div>
            <div class="editor-tab" onclick="loadSection('equipe', this)">&#128101; Equipe</div>
          </div>
          <div class="editor-content" id="editor-content">
            <div class="loading">
              <div class="spinner"></div>Chargement...
            </div>
          </div>
        </div>
      </div>

      <!-- Photos section -->
      <div class="section-view" id="sec-photos">
        <div class="card-title" style="font-size:15px;font-weight:700;margin-bottom:16px;">
          <span>&#128247;</span> Gestion des photos
          <button class="btn-secondary" style="margin-left:auto;font-size:11px;padding:6px 12px;" onclick="showSection('dashboard')">Retour</button>
        </div>
        <div class="quota-bar" id="photos-quota"></div>
        <div class="upload-area" id="upload-area" onclick="document.getElementById('photo-input').click()">
          <div class="upload-ico">&#128228;</div>
          <div class="upload-text">Glissez vos photos ici ou <strong>cliquez pour parcourir</strong></div>
          <div style="font-size:10px;color:var(--text3);margin-top:6px;">JPG, PNG, WebP &middot; 10 Mo max</div>
        </div>

function formatFeature(key) {

    cms: 'Dashboard CMS', editeur_visuel: 'Editeur visuel', preview_live: 'Preview live',

    effet_hollywood: 'Effet Hollywood', modifications: 'Modifications via support',
    delai_modif_h: 'Delai 48h', via_support: 'Via support'
  };
  return map[key] || key.replace(/_/g, ' ');

// ================================================
// Sections navigation
// ================================================
function showSection(section) {
  document.querySelectorAll('.section-view').forEach(s => s.classList.remove('active'));
  const secEl = document.getElementById('sec-' + section);
  if (secEl) secEl.classList.add('active');

  const dashboard = document.getElementById('sec-dashboard');
  const actionsGrid = document.getElementById('actions-grid');

  if (section === 'dashboard' || section === 'editor' || section === 'photos' || section === 'history') {
    if (dashboard) dashboard.style.display = section === 'dashboard' ? 'block' : 'none';
    if (actionsGrid) actionsGrid.parentElement.style.display = section === 'dashboard' ? 'grid' : 'none';
  }

  if (section === 'editor') {
    loadSection('hero');
  } else if (section === 'photos') {
    loadPhotos();
  }
}

// ================================================
// Editor
// ================================================
let currentSection = 'hero';

async function loadSection(section, tabEl) {
  currentSection = section;
  document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
  if (tabEl) tabEl.classList.add('active');

  const content = document.getElementById('editor-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Chargement...</div>';

  try {
    const data = await apiCall('GET', '/contenus/' + section);
    if (!data || !data.length) {
      content.innerHTML = `
        <div style="text-align:center;padding:30px;color:var(--text2);">
          <p>Aucun contenu dans cette section.</p>
          <button class="btn-primary" style="margin-top:12px;" onclick="addContent('${section}')">Ajouter du contenu</button>
        </div>`;
      return;
    }

    content.innerHTML = data.map(item => `
      <div class="field-group" data-id="${item.id}">
        <div class="field-label">${item.cle.replace(/_/g, ' ')}</div>
        ${item.type === 'texte' || item.type === 'html' ?
          `<textarea class="field-input" onchange="markDirty('${item.id}')" data-original="${encodeURIComponent(item.valeur || '')}">${item.valeur || ''}</textarea>` :
          `<input class="field-input" type="text" value="${item.valeur || ''}" onchange="markDirty('${item.id}')" data-original="${encodeURIComponent(item.valeur || '')}">`
        }
        <div style="display:flex;gap:8px;margin-top:6px;">
          <span style="font-size:10px;color:var(--text3);">v${item.version}</span>
          <a href="javascript:void(0)" style="font-size:10px;" onclick="showHistory('${item.id}')">Historique</a>
        </div>
      </div>
    `).join('') + `
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn-primary" onclick="saveSection('${section}')">Publier les modifications</button>
        <button class="btn-secondary" onclick="loadSection('${section}')">Annuler</button>
      </div>
    `;
  } catch (e) {
    content.innerHTML = '<div style="padding:20px;color:var(--danger);">Erreur : ' + (e.message || e.error || 'inconnue') + '</div>';
  }
}

function markDirty(id) {
  const group = document.querySelector(`[data-id="${id}"]`);
  if (group) group.style.borderLeft = '3px solid var(--warning)';
}

async function saveSection(section) {
  const fields = document.querySelectorAll(`#editor-content .field-group[data-id]`);
  let saved = 0;
  for (const field of fields) {
    const id = field.dataset.id;
    const input = field.querySelector('.field-input');
    const original = decodeURIComponent(input.dataset.original || '');
    const current = input.value;
    if (current !== original) {
      try {
        await apiCall('PUT', '/contenus/' + id, { valeur: current });
        saved++;
      } catch (e) {
        showToast('Erreur sur ' + id, 'error');
      }
    }
  }
  if (saved > 0) {
    showToast(saved + ' modification(s) publiee(s)', 'success');
    loadSection(section);
  } else {
    showToast('Aucune modification detectee', 'error');
  }
}

async function addContent(section) {
  const cle = prompt('Nom du champ (ex: titre, sous_titre, description) :');
  if (!cle) return;
  try {
    await apiCall('POST', '/contenus', { section, cle, valeur: '', type: 'texte' });
    showToast('Champ ajoute', 'success');
    loadSection(section);
  } catch (e) {
    showToast('Erreur : ' + (e.message || e.error), 'error');
  }
}

async function showHistory(contenuId) {
  showSection('history');
  const list = document.getElementById('history-list');
  list.innerHTML = '<div class="loading"><div class="spinner"></div>Chargement...</div>';
  try {
    const data = await apiCall('GET', '/historique/' + contenuId);
    if (!data.length) {
      list.innerHTML = '<div style="padding:12px;color:var(--text3);font-size:12px;">Aucun historique</div>';
      return;
    }
    list.innerHTML = data.map(h => `
      <div class="history-item">
        <div class="history-dot"></div>
        <div class="history-time">${new Date(h.modifie_le).toLocaleString('fr-FR')}</div>
        <div style="flex:1;">
          <div style="font-size:11px;color:var(--text3);">Avant : <em>${(h.valeur_avant || '').substring(0, 60)}...</em></div>
          <div style="font-size:11px;color:var(--text);">Apres : ${(h.valeur_apres || '').substring(0, 60)}...</div>
        </div>
        <button class="btn-secondary" style="font-size:10px;padding:4px 10px;" onclick="rollback('${contenuId}')">Restaurer</button>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '<div style="padding:12px;color:var(--danger);">Erreur chargement historique</div>';
  }
}

async function rollback(contenuId) {
  if (!confirm('Restaurer la version precedente ?')) return;
  try {
    await apiCall('POST', '/rollback/' + contenuId, {});
    showToast('Version restauree', 'success');
    loadSection(currentSection);
  } catch (e) {
    showToast('Erreur rollback', 'error');
  }
}

// ================================================
// Photos
// ================================================
async function loadPhotos() {
  const grid = document.getElementById('photos-grid');
  const quotaEl = document.getElementById('photos-quota');
  if (!grid) return;

  try {
    const photos = await apiCall('GET', '/photos');
    const maxPhotos = forfaitData?.quotas?.photos || 100;
    const currentPhotos = photos.length;
    const pct = maxPhotos === 'illimite' ? 30 : Math.round((currentPhotos / parseInt(maxPhotos)) * 100);
    const fillClass = pct > 90 ? 'full' : pct > 70 ? 'warn' : 'ok';

    if (quotaEl) {
      quotaEl.innerHTML = `
        <div class="quota-header">
          <span>Photos utilisees</span>
          <span>${currentPhotos}/${maxPhotos === 'illimite' ? '∞' : maxPhotos}</span>
        </div>
        <div class="quota-track">
          <div class="quota-fill ${fillClass}" style="width:${Math.min(pct, 100)}%"></div>
        </div>`;
    }

    grid.innerHTML = photos.map(p => `
      <div class="photo-card" data-id="${p.id}">
        <img src="${p.url}" alt="${p.titre || ''}" loading="lazy">
        <div class="photo-overlay">
          <div class="photo-title">${p.titre || 'Sans titre'}</div>
        </div>
      </div>
    `).join('') || '<div style="padding:20px;color:var(--text3);font-size:12px;">Aucune photo</div>';
  } catch (e) {
    grid.innerHTML = '<div style="padding:20px;color:var(--danger);">Erreur chargement photos</div>';
  }
}

function initDragDrop() {
  const area = document.getElementById('upload-area');
  if (!area) return;
  ['dragenter','dragover'].forEach(ev => area.addEventListener(ev, e => { e.preventDefault(); area.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev => area.addEventListener(ev, e => { e.preventDefault(); area.classList.remove('dragover'); }));
  area.addEventListener('drop', e => { if (e.dataTransfer.files.length) uploadPhotos(e.dataTransfer.files); });
}

async function uploadPhotos(files) {
  for (const file of files) {
    const formData = new FormData();
    formData.append('photo', file);
    formData.append('section', 'general');
    formData.append('titre', file.name);

    try {
      const res = await fetch('/api/studio/cms/photos/upload', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'X-Societe-Id': societeId || ''
        },
        body: formData
      });
      const data = await res.json();
      if (!res.ok) throw data;
      showToast('Photo uploadee', 'success');
    } catch (e) {
      showToast('Erreur upload : ' + (e.message || e.error), 'error');
    }
  }
  loadPhotos();
}

// ================================================
// Modifications ponctuelles (Classic — 49 EUR/unite)
// ================================================
async function submitModifPonctuelle() {
  const desc = document.getElementById('modif-ponctuelle-desc')?.value;
  if (!desc || desc.length < 10) {
    showToast('Description trop courte (10 caracteres minimum)', 'error');
    return;
  }
  try {
    const result = await apiCall('POST', '/modification-ponctuelle', { description: desc });
    showToast('Modification creee — ' + result.montant_eur + ' EUR', 'success');
    document.getElementById('modif-ponctuelle-desc').value = '';
    loadModifPonctuelles();
    // TODO Passe 38 : rediriger vers Stripe checkout
    // if (result.stripe_checkout_url) window.location.href = result.stripe_checkout_url;
  } catch (e) {
    showToast('Erreur : ' + (e.message || e.error), 'error');
  }
}

async function loadModifPonctuelles() {
  const list = document.getElementById('modif-ponctuelle-list');
  if (!list) return;
  try {
    const data = await apiCall('GET', '/modification-ponctuelle/mes-demandes');
    if (!data || !data.length) {
      list.innerHTML = '<div style="padding:8px 0;">Aucune modification demandee</div>';
      return;
    }
    const paiementColors = { en_attente: 'po', paye: 'pe', echoue: 'pr', rembourse: 'pg' };
    const paiementLabels = { en_attente: 'A payer', paye: 'Paye', echoue: 'Echoue', rembourse: 'Rembourse' };
    const execColors = { en_attente: 'po', en_cours: 'pi', terminee: 'pe', refusee: 'pr' };
    const execLabels = { en_attente: 'En attente', en_cours: 'En cours', terminee: 'Terminee', refusee: 'Refusee' };
    list.innerHTML = data.map(d => `
      <div class="history-item">
        <div class="history-dot" style="background:${d.statut_execution === 'terminee' ? 'var(--success)' : d.statut_paiement === 'paye' ? 'var(--accent)' : 'var(--warning)'};"></div>
        <div class="history-time">${new Date(d.demandee_le).toLocaleDateString('fr-FR')}</div>
        <div style="flex:1;font-size:12px;">${d.description.substring(0, 60)}${d.description.length > 60 ? '...' : ''}</div>
        <span style="font-size:11px;font-weight:600;margin-right:6px;">${d.montant_eur}&euro;</span>
        <span class="pill ${paiementColors[d.statut_paiement] || 'pg'}">${paiementLabels[d.statut_paiement] || d.statut_paiement}</span>
        <span class="pill ${execColors[d.statut_execution] || 'pg'}" style="margin-left:4px;">${execLabels[d.statut_execution] || d.statut_execution}</span>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '<div style="padding:8px 0;color:var(--danger);">Erreur chargement</div>';
  }
}

function showToast(msg, type) {

  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showError(msg) {
  const app = document.getElementById('app');
  app.innerHTML = `<div style="text-align:center;padding:60px;"><h2 style="color:var(--danger);">Erreur</h2><p style="color:var(--text2);margin-top:8px;">${msg}</p></div>`;
}
