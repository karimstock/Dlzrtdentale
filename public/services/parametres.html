<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JADOMI Services — Param&egrave;tres</title>
<link rel="stylesheet" href="/css/jadomi-theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;overflow:hidden}
.layout{display:flex;height:100vh}
.sidebar{width:260px;min-height:100vh;display:flex;flex-direction:column;padding:20px 0;position:fixed;left:0;top:0;z-index:10}
.sidebar .logo{padding:16px 24px;font-family:var(--display);font-size:22px;font-weight:700}
.sidebar .logo span{color:var(--accent3)}
.sidebar nav{flex:1;padding:12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;transition:all .2s;border-left:3px solid transparent;font-size:14px;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(99,102,241,.15);color:var(--text)}
.nav-item.active{color:var(--accent);background:rgba(99,102,241,.18);border-left-color:var(--accent)}
.nav-item .ico{font-size:18px;width:24px;text-align:center}
.main{margin-left:260px;flex:1;overflow-y:auto;padding:28px 36px;height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.topbar h1{font-family:var(--display);font-size:24px;font-weight:700}
.sections{display:flex;flex-direction:column;gap:24px}
.section{background:rgba(30,52,96,.4);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.section h2{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;font-size:14px}
.field textarea{min-height:60px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.slug-preview{font-size:12px;color:var(--accent3);margin-top:4px}
.btn-save{padding:12px 28px;font-size:14px}
/* Praticiens */
.prat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.prat-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border2)}
.prat-color{width:24px;height:24px;border-radius:50%;flex-shrink:0}
.prat-info{flex:1}
.prat-info strong{font-size:14px}
.prat-info small{color:var(--text-secondary);display:block;font-size:12px}
.prat-actions{display:flex;gap:6px}
.prat-actions button{padding:4px 10px;font-size:11px;border-radius:6px}
/* Horaires */
.horaire-row{display:grid;grid-template-columns:100px 1fr 1fr auto auto 1fr 1fr;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px}
.horaire-row label{font-weight:600}
.horaire-row input[type="time"]{padding:6px 8px;font-size:12px}
.horaire-row input[type="checkbox"]{width:18px;height:18px}
.horaire-row .pause-label{font-size:11px;color:var(--text-secondary)}
.toast{position:fixed;bottom:20px;right:20px;padding:14px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;z-index:200;animation:fadeInUp .3s var(--trans)}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:12px}.row,.row3{grid-template-columns:1fr}.horaire-row{grid-template-columns:80px 1fr 1fr}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">JADOMI<span>.services</span></div>
    <nav>
      <a class="nav-item" href="/services/dashboard.html"><span class="ico">&#x1F4CA;</span> Vue d'ensemble</a>
      <a class="nav-item" href="/services/agenda.html"><span class="ico">&#x1F4C5;</span> Agenda</a>
      <a class="nav-item" href="/services/prestations.html"><span class="ico">&#x1F6CD;&#xFE0F;</span> Prestations</a>
      <a class="nav-item" href="/services/clients.html"><span class="ico">&#x1F465;</span> Clients</a>
      <a class="nav-item" href="/services/comptabilite.html"><span class="ico">&#x1F4B0;</span> Comptabilit&eacute;</a>
      <a class="nav-item" href="/services/marketplace.html"><span class="ico">&#x1F3EA;</span> Marketplace</a>
      <a class="nav-item active" href="/services/parametres.html"><span class="ico">&#x2699;&#xFE0F;</span> Param&egrave;tres</a>
    </nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1>Param&egrave;tres</h1>
      <button class="btn-primary btn-save" onclick="saveProfil()">Enregistrer</button>
    </div>
    <div class="sections">
      <!-- Profil -->
      <div class="section">
        <h2>Profil de l'&eacute;tablissement</h2>
        <div class="row">
          <div class="field"><label>Nom de l'&eacute;tablissement</label><input type="text" id="pNom" oninput="updateSlug()"></div>
          <div class="field"><label>Cat&eacute;gorie</label><select id="pCategorie"><option value="coiffure">Coiffure</option><option value="esthetique">Esth&eacute;tique</option><option value="massage">Massage / Bien-&ecirc;tre</option><option value="onglerie">Onglerie</option><option value="barbier">Barbier</option><option value="tatouage">Tatouage / Piercing</option><option value="conseil">Conseil</option><option value="formation">Formation</option><option value="autre">Autre</option></select></div>
        </div>
        <div class="field"><label>Description</label><textarea id="pDescription"></textarea></div>
        <div class="row">
          <div class="field"><label>Adresse</label><input type="text" id="pAdresse"></div>
          <div class="field"><label>Ville</label><input type="text" id="pVille" oninput="updateSlug()"></div>
        </div>
        <div class="row3">
          <div class="field"><label>Code postal</label><input type="text" id="pCp"></div>
          <div class="field"><label>T&eacute;l&eacute;phone</label><input type="tel" id="pTel"></div>
          <div class="field"><label>Email</label><input type="email" id="pEmail"></div>
        </div>
        <div class="field"><label>Site web</label><input type="url" id="pSite" placeholder="https://..."></div>
        <div class="field">
          <label>Slug (URL publique)</label>
          <div id="slugPreview" class="slug-preview"></div>
        </div>
        <div class="row">
          <div class="field"><label>Acompte par d&eacute;faut (%)</label><input type="number" id="pAcompte" value="30" min="0" max="100"></div>
          <div class="field"><label>&nbsp;</label><span style="font-size:12px;color:var(--text-secondary)">Pourcentage demand&eacute; lors de la r&eacute;servation en ligne</span></div>
        </div>
      </div>
      <!-- Praticiens -->
      <div class="section">
        <h2>Praticiens</h2>
        <div class="prat-list" id="pratList"></div>
        <div class="row" style="margin-top:12px">
          <div class="field"><label>Nouveau praticien</label><input type="text" id="newPratNom" placeholder="Nom"></div>
          <div class="field"><label>Pr&eacute;nom</label><input type="text" id="newPratPrenom" placeholder="Pr&eacute;nom"></div>
        </div>
        <div class="row">
          <div class="field"><label>Sp&eacute;cialit&eacute;</label><input type="text" id="newPratSpec" placeholder="Sp&eacute;cialit&eacute;"></div>
          <div class="field"><label>Couleur</label><input type="color" id="newPratColor" value="#6366f1" style="height:42px"></div>
        </div>
        <button class="btn-primary" onclick="addPraticien()" style="padding:8px 20px;font-size:13px">Ajouter</button>
      </div>
      <!-- Disponibilités -->
      <div class="section">
        <h2>Horaires & Disponibilit&eacute;s</h2>
        <div id="horairesContainer"></div>
        <button class="btn-primary" onclick="saveHoraires()" style="padding:10px 20px;font-size:13px;margin-top:12px">Enregistrer les horaires</button>
      </div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/ms-switcher.js" defer></script>
<script src="/js/jadomi-legal-widget.js" defer></script>
<script>
const SUPABASE_URL='https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY='sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let TOKEN='',profil=null,praticiens=[],dispos=[];
const JOURS=['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
async function refreshToken(){const{data}=await sb.auth.getSession();if(!data?.session){location.href='/pro/login.html';return}TOKEN=data.session.access_token}
async function api(url,opts={}){
  if(!TOKEN)await refreshToken();
  const h={'Content-Type':'application/json','Authorization':'Bearer '+TOKEN,...(opts.headers||{})};
  if(localStorage.getItem('societe_id'))h['X-Societe-Id']=localStorage.getItem('societe_id');
  let r=await fetch(url,{...opts,headers:h});
  if(r.status===401){await refreshToken();h['Authorization']='Bearer '+TOKEN;r=await fetch(url,{...opts,headers:h})}
  return r.json();
}
function slugify(n,v){return`${n||''}-${v||''}`.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function updateSlug(){
  const s=slugify(document.getElementById('pNom').value,document.getElementById('pVille').value);
  document.getElementById('slugPreview').textContent=s?`URL: ${location.origin}/booking/${s}`:'';
}
function toast(msg,type='ok'){
  const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}
async function loadProfil(){
  const r=await api('/api/services/profil');
  profil=r.profil;
  if(profil){
    document.getElementById('pNom').value=profil.nom||'';
    document.getElementById('pCategorie').value=profil.categorie||'autre';
    document.getElementById('pDescription').value=profil.description||'';
    document.getElementById('pAdresse').value=profil.adresse||'';
    document.getElementById('pVille').value=profil.ville||'';
    document.getElementById('pCp').value=profil.code_postal||'';
    document.getElementById('pTel').value=profil.telephone||'';
    document.getElementById('pEmail').value=profil.email||'';
    document.getElementById('pSite').value=profil.site_web||'';
    document.getElementById('pAcompte').value=profil.acompte_pct||30;
    updateSlug();
  }
}
async function saveProfil(){
  const body={
    nom:document.getElementById('pNom').value,
    categorie:document.getElementById('pCategorie').value,
    description:document.getElementById('pDescription').value,
    adresse:document.getElementById('pAdresse').value,
    ville:document.getElementById('pVille').value,
    code_postal:document.getElementById('pCp').value,
    telephone:document.getElementById('pTel').value,
    email:document.getElementById('pEmail').value,
    site_web:document.getElementById('pSite').value,
    acompte_pct:parseInt(document.getElementById('pAcompte').value)||30
  };
  if(profil){await api('/api/services/profil',{method:'PATCH',body:JSON.stringify(body)})}
  else{await api('/api/services/profil',{method:'POST',body:JSON.stringify(body)})}
  toast('Profil enregistr&eacute;');
  loadProfil();
}
async function loadPraticiens(){
  const r=await api('/api/services/praticiens');
  praticiens=r.praticiens||[];
  document.getElementById('pratList').innerHTML=praticiens.map(p=>`<div class="prat-item">
    <div class="prat-color" style="background:${p.couleur||'#6366f1'}"></div>
    <div class="prat-info"><strong>${p.prenom||''} ${p.nom}</strong><small>${p.specialite||''}</small></div>
    <div class="prat-actions">
      <button class="btn-danger" onclick="deletePrat('${p.id}')">Supprimer</button>
    </div>
  </div>`).join('')||'<p style="color:var(--text-secondary);font-size:13px">Aucun praticien ajout&eacute;</p>';
}
async function addPraticien(){
  const nom=document.getElementById('newPratNom').value;
  if(!nom){alert('Nom requis');return}
  await api('/api/services/praticiens',{method:'POST',body:JSON.stringify({
    nom,prenom:document.getElementById('newPratPrenom').value,
    specialite:document.getElementById('newPratSpec').value,
    couleur:document.getElementById('newPratColor').value
  })});
  document.getElementById('newPratNom').value='';document.getElementById('newPratPrenom').value='';document.getElementById('newPratSpec').value='';
  loadPraticiens();
}
async function deletePrat(id){
  if(!confirm('Supprimer ce praticien ?'))return;
  await api('/api/services/praticiens/'+id,{method:'DELETE'});
  loadPraticiens();
}
async function loadDispos(){
  const r=await api('/api/services/disponibilites');
  dispos=r.disponibilites||[];
  renderHoraires();
}
function renderHoraires(){
  const container=document.getElementById('horairesContainer');
  container.innerHTML=JOURS.map(jour=>{
    const d=dispos.find(x=>x.jour_semaine===jour)||{};
    const actif=d.id?d.actif!==false:['lundi','mardi','mercredi','jeudi','vendredi'].includes(jour);
    return`<div class="horaire-row" data-jour="${jour}" data-id="${d.id||''}">
      <label><input type="checkbox" class="h-actif" ${actif?'checked':''} style="margin-right:6px">${jour.charAt(0).toUpperCase()+jour.slice(1)}</label>
      <input type="time" class="h-debut" value="${d.heure_debut||'09:00'}">
      <input type="time" class="h-fin" value="${d.heure_fin||'18:00'}">
      <span class="pause-label">Pause:</span>
      <input type="time" class="h-pause-deb" value="${d.pause_debut||'12:00'}">
      <input type="time" class="h-pause-fin" value="${d.pause_fin||'14:00'}">
    </div>`}).join('');
}
async function saveHoraires(){
  const rows=document.querySelectorAll('.horaire-row');
  for(const row of rows){
    const jour=row.dataset.jour;
    const id=row.dataset.id;
    const actif=row.querySelector('.h-actif').checked;
    const body={
      jour_semaine:jour,
      heure_debut:row.querySelector('.h-debut').value,
      heure_fin:row.querySelector('.h-fin').value,
      pause_debut:row.querySelector('.h-pause-deb').value||null,
      pause_fin:row.querySelector('.h-pause-fin').value||null,
      actif
    };
    if(id){await api('/api/services/disponibilites/'+id,{method:'PATCH',body:JSON.stringify(body)})}
    else{await api('/api/services/disponibilites',{method:'POST',body:JSON.stringify(body)})}
  }
  toast('Horaires enregistr&eacute;s');
  loadDispos();
}
async function init(){await refreshToken();loadProfil();loadPraticiens();loadDispos()}
init();
</script>
</body>
</html>
