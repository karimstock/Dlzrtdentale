<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JADOMI Services — Clients</title>
<link rel="stylesheet" href="/css/jadomi-theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;overflow:hidden}
.layout{display:flex;height:100vh}
.sidebar{width:260px;min-height:100vh;display:flex;flex-direction:column;padding:20px 0;position:fixed;left:0;top:0;z-index:10}
.sidebar .logo{padding:16px 24px;font-family:var(--display);font-size:22px;font-weight:700}
.sidebar .logo span{color:var(--accent3)}
.sidebar nav{flex:1;padding:12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;transition:all .2s;border-left:3px solid transparent;font-size:14px;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(99,102,241,.15);color:var(--text)}
.nav-item.active{color:var(--accent);background:rgba(99,102,241,.18);border-left-color:var(--accent)}
.nav-item .ico{font-size:18px;width:24px;text-align:center}
.main{margin-left:260px;flex:1;overflow-y:auto;padding:28px 36px;height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.topbar h1{font-family:var(--display);font-size:24px;font-weight:700}
.search-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search-row input{flex:1;min-width:200px;padding:10px 16px;border-radius:var(--radius-sm);font-size:14px}
.search-row select{padding:10px 12px;border-radius:var(--radius-sm);font-size:13px}
table{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{padding:12px 14px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.tbl td{padding:12px 14px}
.tbl tr{cursor:pointer;transition:background .2s}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.client-cell{display:flex;align-items:center;gap:12px}
.client-cell .name{font-weight:600}
.client-cell .email{font-size:12px;color:var(--text-secondary)}
.points-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(245,158,11,.15);color:var(--warning)}
.segment-tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;background:rgba(99,102,241,.15);color:var(--accent);margin:1px}
.modal-bg{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{padding:28px;max-width:600px;width:95%;max-height:85vh;overflow-y:auto}
.modal h2{font-family:var(--display);font-size:20px;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;font-size:14px}
.field textarea{min-height:60px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.modal-actions button{padding:10px 20px;border-radius:var(--radius-sm);font-weight:600;font-size:14px}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tab-btn{padding:8px 16px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:13px;font-weight:600;border-radius:8px 8px 0 0;transition:all .2s}
.tab-btn.active{color:var(--accent);background:rgba(99,102,241,.1)}
.tab-content{display:none}.tab-content.active{display:block}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border2);font-size:13px}
.hist-item .hist-date{color:var(--text-secondary);font-size:12px}
.pagination{display:flex;gap:8px;justify-content:center;margin-top:20px}
.pagination button{padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;background:var(--surface);border:1px solid var(--border);color:var(--text)}
.pagination button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.empty{padding:40px;text-align:center;color:var(--text-secondary);border:1px dashed var(--border);border-radius:var(--radius)}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:12px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">JADOMI<span>.services</span></div>
    <nav>
      <a class="nav-item" href="/services/dashboard.html"><span class="ico">&#x1F4CA;</span> Vue d'ensemble</a>
      <a class="nav-item" href="/services/agenda.html"><span class="ico">&#x1F4C5;</span> Agenda</a>
      <a class="nav-item" href="/services/prestations.html"><span class="ico">&#x1F6CD;&#xFE0F;</span> Prestations</a>
      <a class="nav-item active" href="/services/clients.html"><span class="ico">&#x1F465;</span> Clients</a>
      <a class="nav-item" href="/services/comptabilite.html"><span class="ico">&#x1F4B0;</span> Comptabilit&eacute;</a>
      <a class="nav-item" href="/services/marketplace.html"><span class="ico">&#x1F3EA;</span> Marketplace</a>
      <a class="nav-item" href="/services/parametres.html"><span class="ico">&#x2699;&#xFE0F;</span> Param&egrave;tres</a>
    </nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1>Clients</h1>
      <button class="btn-primary" onclick="openModal()" style="padding:10px 20px;font-size:14px">+ Nouveau client</button>
    </div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Rechercher par nom, email, t&eacute;l&eacute;phone..." oninput="loadClients()">
      <select id="filterSegment" onchange="loadClients()"><option value="">Tous les segments</option></select>
    </div>
    <table class="tbl">
      <thead><tr><th>Client</th><th>T&eacute;l&eacute;phone</th><th>Visites</th><th>Fid&eacute;lit&eacute;</th><th>Segments</th><th>Derni&egrave;re visite</th></tr></thead>
      <tbody id="clientsList"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </main>
</div>
<!-- Modal -->
<div class="modal-bg" id="modalClient">
  <div class="modal">
    <h2 id="modalTitle">Nouveau client</h2>
    <input type="hidden" id="clientId">
    <div class="tabs" id="modalTabs">
      <button class="tab-btn active" onclick="showTab('infos')">Informations</button>
      <button class="tab-btn" onclick="showTab('historique')" id="tabHist" style="display:none">Historique</button>
      <button class="tab-btn" onclick="showTab('fidelite')" id="tabFid" style="display:none">Fid&eacute;lit&eacute;</button>
    </div>
    <div class="tab-content active" id="tab-infos">
      <div class="row">
        <div class="field"><label>Nom</label><input type="text" id="fNom"></div>
        <div class="field"><label>Pr&eacute;nom</label><input type="text" id="fPrenom"></div>
      </div>
      <div class="row">
        <div class="field"><label>Email</label><input type="email" id="fEmail"></div>
        <div class="field"><label>T&eacute;l&eacute;phone</label><input type="tel" id="fTel"></div>
      </div>
      <div class="row">
        <div class="field"><label>Date de naissance</label><input type="date" id="fDdn"></div>
        <div class="field"><label>Ville</label><input type="text" id="fVille"></div>
      </div>
      <div class="field"><label>Adresse</label><input type="text" id="fAdresse"></div>
      <div class="field"><label>Notes</label><textarea id="fNotes" placeholder="Notes internes..."></textarea></div>
      <div class="field"><label>Allergies / Contre-indications</label><textarea id="fAllergies" placeholder="Allergies, pr&eacute;cautions..."></textarea></div>
      <div class="field"><label>Segments (s&eacute;par&eacute;s par des virgules)</label><input type="text" id="fSegments" placeholder="vip, nouveau, fidele"></div>
    </div>
    <div class="tab-content" id="tab-historique">
      <div id="historiqueList"></div>
    </div>
    <div class="tab-content" id="tab-fidelite">
      <div style="text-align:center;padding:20px">
        <div style="font-size:48px;font-weight:700;color:var(--warning)" id="fPoints">0</div>
        <div style="color:var(--text-secondary);margin-bottom:20px">points de fid&eacute;lit&eacute;</div>
        <div class="row">
          <div class="field"><label>Ajouter/Retirer points</label><input type="number" id="fAddPoints" value="0"></div>
          <div class="field"><label>Motif</label><input type="text" id="fPointsMotif" placeholder="Visite, bonus..."></div>
        </div>
        <button class="btn-primary" onclick="addPoints()" style="padding:8px 20px;font-size:13px">Modifier les points</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Fermer</button>
      <button class="btn-danger" id="btnDelete" onclick="deleteClient()" style="display:none">Supprimer</button>
      <button class="btn-primary" onclick="saveClient()">Enregistrer</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/ms-switcher.js" defer></script>
<script src="/js/jadomi-legal-widget.js" defer></script>
<script>
const SUPABASE_URL='https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY='sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let TOKEN='',currentPage=1,totalClients=0;
async function refreshToken(){const{data}=await sb.auth.getSession();if(!data?.session){location.href='/pro/login.html';return}TOKEN=data.session.access_token}
async function api(url,opts={}){
  if(!TOKEN)await refreshToken();
  const h={'Content-Type':'application/json','Authorization':'Bearer '+TOKEN,...(opts.headers||{})};
  if(localStorage.getItem('societe_id'))h['X-Societe-Id']=localStorage.getItem('societe_id');
  let r=await fetch(url,{...opts,headers:h});
  if(r.status===401){await refreshToken();h['Authorization']='Bearer '+TOKEN;r=await fetch(url,{...opts,headers:h})}
  return r.json();
}
async function loadSegments(){
  const r=await api('/api/services/clients/segments/list');
  const sel=document.getElementById('filterSegment');
  sel.innerHTML='<option value="">Tous les segments</option>'+(r.segments||[]).map(s=>`<option value="${s}">${s}</option>`).join('');
}
async function loadClients(){
  const search=document.getElementById('searchInput').value;
  const segment=document.getElementById('filterSegment').value;
  let url=`/api/services/clients?page=${currentPage}&limit=30`;
  if(search)url+=`&search=${encodeURIComponent(search)}`;
  if(segment)url+=`&segment=${encodeURIComponent(segment)}`;
  const r=await api(url);
  const clients=r.clients||[];totalClients=r.total||0;
  const tbody=document.getElementById('clientsList');
  if(!clients.length){tbody.innerHTML='<tr><td colspan="6"><div class="empty">Aucun client trouv&eacute;</div></td></tr>';return}
  tbody.innerHTML=clients.map(c=>{
    const initials=((c.prenom||'')[0]||'')+((c.nom||'')[0]||'');
    return`<tr onclick="editClient('${c.id}')">
      <td><div class="client-cell"><div class="avatar">${initials.toUpperCase()}</div><div><div class="name">${c.prenom||''} ${c.nom||''}</div><div class="email">${c.email||''}</div></div></div></td>
      <td>${c.telephone||'—'}</td>
      <td>${c.nb_visites||0}</td>
      <td><span class="points-badge">${c.points_fidelite||0} pts</span></td>
      <td>${(c.segments||[]).map(s=>`<span class="segment-tag">${s}</span>`).join('')||'—'}</td>
      <td>${c.derniere_visite?new Date(c.derniere_visite).toLocaleDateString('fr-FR'):'—'}</td>
    </tr>`}).join('');
  renderPagination();
}
function renderPagination(){
  const pages=Math.ceil(totalClients/30);
  if(pages<=1){document.getElementById('pagination').innerHTML='';return}
  let html='';
  for(let i=1;i<=pages;i++)html+=`<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  document.getElementById('pagination').innerHTML=html;
}
function goPage(p){currentPage=p;loadClients()}
function showTab(name){
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick*="${name}"]`).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}
function openModal(c){
  document.getElementById('modalTitle').textContent=c?'Modifier le client':'Nouveau client';
  document.getElementById('clientId').value=c?c.id:'';
  document.getElementById('fNom').value=c?c.nom||'':'';
  document.getElementById('fPrenom').value=c?c.prenom||'':'';
  document.getElementById('fEmail').value=c?c.email||'':'';
  document.getElementById('fTel').value=c?c.telephone||'':'';
  document.getElementById('fDdn').value=c?c.date_naissance||'':'';
  document.getElementById('fVille').value=c?c.ville||'':'';
  document.getElementById('fAdresse').value=c?c.adresse||'':'';
  document.getElementById('fNotes').value=c?c.notes||'':'';
  document.getElementById('fAllergies').value=c?c.allergies||'':'';
  document.getElementById('fSegments').value=c?(c.segments||[]).join(', '):'';
  document.getElementById('btnDelete').style.display=c?'':'none';
  document.getElementById('tabHist').style.display=c?'':'none';
  document.getElementById('tabFid').style.display=c?'':'none';
  showTab('infos');
  document.getElementById('modalClient').classList.add('open');
}
function closeModal(){document.getElementById('modalClient').classList.remove('open')}
async function editClient(id){
  const r=await api('/api/services/clients/'+id);
  if(!r.client)return;
  openModal(r.client);
  // Load history
  document.getElementById('fPoints').textContent=r.client.points_fidelite||0;
  const hist=r.historique||[];
  document.getElementById('historiqueList').innerHTML=hist.length?hist.map(h=>`<div class="hist-item"><div><strong>${h.prestation?.nom||'RDV'}</strong> — ${h.statut}</div><div><span class="hist-date">${new Date(h.date_heure).toLocaleDateString('fr-FR')}</span> <strong>${h.prestation?.prix||0}&euro;</strong></div></div>`).join(''):'<div class="empty">Aucun historique</div>';
}
async function saveClient(){
  const id=document.getElementById('clientId').value;
  const segments=document.getElementById('fSegments').value.split(',').map(s=>s.trim()).filter(Boolean);
  const body={
    nom:document.getElementById('fNom').value,
    prenom:document.getElementById('fPrenom').value,
    email:document.getElementById('fEmail').value,
    telephone:document.getElementById('fTel').value,
    date_naissance:document.getElementById('fDdn').value||null,
    ville:document.getElementById('fVille').value,
    adresse:document.getElementById('fAdresse').value,
    notes:document.getElementById('fNotes').value,
    allergies:document.getElementById('fAllergies').value,
    segments
  };
  if(id){await api('/api/services/clients/'+id,{method:'PATCH',body:JSON.stringify(body)})}
  else{await api('/api/services/clients',{method:'POST',body:JSON.stringify(body)})}
  closeModal();loadClients();loadSegments();
}
async function deleteClient(){
  const id=document.getElementById('clientId').value;
  if(!id||!confirm('Supprimer ce client ?'))return;
  await api('/api/services/clients/'+id,{method:'DELETE'});
  closeModal();loadClients();
}
async function addPoints(){
  const id=document.getElementById('clientId').value;
  if(!id)return;
  const points=parseInt(document.getElementById('fAddPoints').value)||0;
  const motif=document.getElementById('fPointsMotif').value;
  const r=await api('/api/services/clients/'+id+'/points',{method:'POST',body:JSON.stringify({points,motif})});
  if(r.client)document.getElementById('fPoints').textContent=r.client.points_fidelite||0;
  document.getElementById('fAddPoints').value=0;
  document.getElementById('fPointsMotif').value='';
}
document.getElementById('modalClient').addEventListener('click',e=>{if(e.target.classList.contains('modal-bg'))closeModal()});
async function init(){await refreshToken();await loadSegments();loadClients()}
init();
</script>
</body>
</html>
