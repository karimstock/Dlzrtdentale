<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JADOMI Services — Prestations</title>
<link rel="stylesheet" href="/css/jadomi-theme.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;overflow:hidden}
.layout{display:flex;height:100vh}
.sidebar{width:260px;min-height:100vh;display:flex;flex-direction:column;padding:20px 0;position:fixed;left:0;top:0;z-index:10}
.sidebar .logo{padding:16px 24px;font-family:var(--display);font-size:22px;font-weight:700}
.sidebar .logo span{color:var(--accent3)}
.sidebar nav{flex:1;padding:12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;transition:all .2s;border-left:3px solid transparent;font-size:14px;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(99,102,241,.15);color:var(--text)}
.nav-item.active{color:var(--accent);background:rgba(99,102,241,.18);border-left-color:var(--accent)}
.nav-item .ico{font-size:18px;width:24px;text-align:center}
.main{margin-left:260px;flex:1;overflow-y:auto;padding:28px 36px;height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.topbar h1{font-family:var(--display);font-size:24px;font-weight:700}
.search-bar{display:flex;gap:12px;margin-bottom:20px}
.search-bar input{flex:1;padding:10px 16px;border-radius:var(--radius-sm);font-size:14px}
.catalogue{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.presta-card{border-radius:var(--radius);padding:20px;background:rgba(30,52,96,.5);border:1px solid var(--border);transition:all .3s;cursor:pointer;position:relative}
.presta-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--glow2)}
.presta-cat{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.presta-nom{font-size:16px;font-weight:700;margin-bottom:6px}
.presta-desc{font-size:13px;color:var(--text-secondary);margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.presta-meta{display:flex;gap:16px;font-size:13px;color:var(--text-secondary)}
.presta-meta strong{color:var(--text)}
.presta-prix{position:absolute;top:20px;right:20px;font-size:20px;font-weight:700;color:var(--accent)}
.presta-badge{position:absolute;top:20px;left:20px;width:6px;height:40px;border-radius:3px}
.modal-bg{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{padding:28px;max-width:560px;width:95%;max-height:85vh;overflow-y:auto}
.modal h2{font-family:var(--display);font-size:20px;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;font-size:14px}
.field textarea{min-height:80px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.modal-actions button{padding:10px 20px;border-radius:var(--radius-sm);font-weight:600;font-size:14px}
.btn-ia{background:linear-gradient(135deg,var(--accent),var(--accent2))!important;color:#fff!important;display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;cursor:pointer;border:none;margin-top:6px;transition:all .2s}
.btn-ia:hover{transform:translateY(-1px);box-shadow:var(--glow)}
.btn-ia.loading{opacity:.6;pointer-events:none}
.ia-badge{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.keywords{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.keyword{padding:3px 10px;border-radius:20px;font-size:11px;background:rgba(99,102,241,.15);color:var(--accent)}
.empty{padding:60px;text-align:center;border-radius:var(--radius)}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0;padding:12px}.catalogue{grid-template-columns:1fr}.row,.row3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">JADOMI<span>.services</span></div>
    <nav>
      <a class="nav-item" href="/services/dashboard.html"><span class="ico">&#x1F4CA;</span> Vue d'ensemble</a>
      <a class="nav-item" href="/services/agenda.html"><span class="ico">&#x1F4C5;</span> Agenda</a>
      <a class="nav-item active" href="/services/prestations.html"><span class="ico">&#x1F6CD;&#xFE0F;</span> Prestations</a>
      <a class="nav-item" href="/services/clients.html"><span class="ico">&#x1F465;</span> Clients</a>
      <a class="nav-item" href="/services/comptabilite.html"><span class="ico">&#x1F4B0;</span> Comptabilit&eacute;</a>
      <a class="nav-item" href="/services/marketplace.html"><span class="ico">&#x1F3EA;</span> Marketplace</a>
      <a class="nav-item" href="/services/parametres.html"><span class="ico">&#x2699;&#xFE0F;</span> Param&egrave;tres</a>
    </nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1>Prestations</h1>
      <button class="btn-primary" onclick="openModal()" style="padding:10px 20px;font-size:14px">+ Nouvelle prestation</button>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Rechercher une prestation..." oninput="filterList()">
    </div>
    <div class="catalogue" id="catalogue"></div>
  </main>
</div>
<!-- Modal -->
<div class="modal-bg" id="modalPresta">
  <div class="modal">
    <h2 id="modalTitle">Nouvelle prestation</h2>
    <input type="hidden" id="prestaId">
    <div class="field"><label>Nom</label><input type="text" id="fNom" placeholder="Ex: Coupe femme"></div>
    <div class="row">
      <div class="field"><label>Cat&eacute;gorie</label><input type="text" id="fCategorie" placeholder="Ex: Coiffure"></div>
      <div class="field"><label>Couleur</label><input type="color" id="fCouleur" value="#6366f1" style="height:42px"></div>
    </div>
    <div class="row3">
      <div class="field"><label>Dur&eacute;e (min)</label><input type="number" id="fDuree" value="30" min="5" step="5"></div>
      <div class="field"><label>Prix (&euro;)</label><input type="number" id="fPrix" value="0" min="0" step="0.5"></div>
      <div class="field"><label>Acompte (%)</label><input type="number" id="fAcompte" value="30" min="0" max="100"></div>
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="fDescription" placeholder="Décrivez votre prestation..."></textarea>
      <button class="btn-ia" id="btnIA" onclick="generateIA()"><span class="ia-badge">JADOMI IA</span> G&eacute;n&eacute;rer description</button>
    </div>
    <div class="field"><label>Mots-cl&eacute;s SEO</label><div class="keywords" id="fKeywords"></div></div>
    <input type="hidden" id="fSeoKeywords" value="[]">
    <div class="field">
      <label>Praticiens</label>
      <div id="fPraticiens"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn-danger" id="btnDelete" onclick="deletePresta()" style="display:none">Supprimer</button>
      <button class="btn-primary" onclick="savePresta()">Enregistrer</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/ms-switcher.js" defer></script>
<script src="/js/jadomi-legal-widget.js" defer></script>
<script>
const SUPABASE_URL='https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY='sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let TOKEN='',allPrestas=[],allPraticiens=[];
async function refreshToken(){const{data}=await sb.auth.getSession();if(!data?.session){location.href='/pro/login.html';return}TOKEN=data.session.access_token}
async function api(url,opts={}){
  if(!TOKEN)await refreshToken();
  const h={'Content-Type':'application/json','Authorization':'Bearer '+TOKEN,...(opts.headers||{})};
  if(localStorage.getItem('societe_id'))h['X-Societe-Id']=localStorage.getItem('societe_id');
  let r=await fetch(url,{...opts,headers:h});
  if(r.status===401){await refreshToken();h['Authorization']='Bearer '+TOKEN;r=await fetch(url,{...opts,headers:h})}
  return r.json();
}
async function loadPraticiens(){const r=await api('/api/services/praticiens');allPraticiens=r.praticiens||[]}
async function loadPrestas(){
  const r=await api('/api/services/prestations');
  allPrestas=r.prestations||[];
  renderList();
}
function renderList(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const filtered=q?allPrestas.filter(p=>(p.nom||'').toLowerCase().includes(q)||(p.categorie||'').toLowerCase().includes(q)):allPrestas;
  const container=document.getElementById('catalogue');
  if(!filtered.length){container.innerHTML='<div class="empty">Aucune prestation. Cr&eacute;ez votre premi&egrave;re prestation !</div>';return}
  const cats=[...new Set(filtered.map(p=>p.categorie||'Autre'))];
  const catColors={'Coiffure':'#6366f1','Esthetique':'#8b5cf6','Massage':'#06b6d4','Onglerie':'#f59e0b','Autre':'#64748b'};
  container.innerHTML=filtered.map(p=>{
    const col=p.couleur||catColors[p.categorie]||'#6366f1';
    return`<div class="presta-card" onclick="editPresta('${p.id}')">
      <div class="presta-badge" style="background:${col}"></div>
      <div class="presta-cat" style="background:${col}22;color:${col}">${p.categorie||'Autre'}</div>
      <div class="presta-prix">${p.prix}&euro;</div>
      <div class="presta-nom">${p.nom}</div>
      <div class="presta-desc">${p.description||''}</div>
      <div class="presta-meta"><span>${p.duree||30} min</span><span>Acompte: ${p.acompte_pct||30}%</span>${!p.actif?'<span style="color:var(--danger)">Inactif</span>':''}</div>
    </div>`}).join('');
}
function filterList(){renderList()}
function openModal(p){
  document.getElementById('modalTitle').textContent=p?'Modifier la prestation':'Nouvelle prestation';
  document.getElementById('prestaId').value=p?p.id:'';
  document.getElementById('fNom').value=p?p.nom:'';
  document.getElementById('fCategorie').value=p?p.categorie||'':'';
  document.getElementById('fCouleur').value=p?p.couleur||'#6366f1':'#6366f1';
  document.getElementById('fDuree').value=p?p.duree||30:30;
  document.getElementById('fPrix').value=p?p.prix||0:0;
  document.getElementById('fAcompte').value=p?p.acompte_pct||30:30;
  document.getElementById('fDescription').value=p?p.description||'':'';
  document.getElementById('fSeoKeywords').value=JSON.stringify(p?.seo_keywords||[]);
  renderKeywords(p?.seo_keywords||[]);
  document.getElementById('btnDelete').style.display=p?'':'none';
  // Praticiens checkboxes
  const selPrats=p?.praticiens||[];
  document.getElementById('fPraticiens').innerHTML=allPraticiens.map(pr=>`<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:var(--text-secondary);cursor:pointer"><input type="checkbox" value="${pr.id}" ${selPrats.includes(pr.id)?'checked':''}> ${pr.prenom||''} ${pr.nom}</label>`).join('')||'<p style="font-size:12px;color:var(--text3)">Aucun praticien configur&eacute;</p>';
  document.getElementById('modalPresta').classList.add('open');
}
function closeModal(){document.getElementById('modalPresta').classList.remove('open')}
function editPresta(id){const p=allPrestas.find(x=>x.id===id);if(p)openModal(p)}
function renderKeywords(kws){
  document.getElementById('fKeywords').innerHTML=(kws||[]).map(k=>`<span class="keyword">${k}</span>`).join('')||'<span style="font-size:12px;color:var(--text3)">Aucun</span>';
}
async function generateIA(){
  const btn=document.getElementById('btnIA');
  btn.classList.add('loading');btn.innerHTML='<span class="ia-badge">JADOMI IA</span> G&eacute;n&eacute;ration en cours...';
  try{
    const r=await api('/api/services/prestations/ia-description',{method:'POST',body:JSON.stringify({
      nom:document.getElementById('fNom').value,
      categorie:document.getElementById('fCategorie').value,
      duree:document.getElementById('fDuree').value,
      prix:document.getElementById('fPrix').value
    })});
    if(r.description)document.getElementById('fDescription').value=r.description;
    if(r.seo_keywords){document.getElementById('fSeoKeywords').value=JSON.stringify(r.seo_keywords);renderKeywords(r.seo_keywords)}
  }catch(e){alert('Erreur JADOMI IA')}
  btn.classList.remove('loading');btn.innerHTML='<span class="ia-badge">JADOMI IA</span> G&eacute;n&eacute;rer description';
}
async function savePresta(){
  const id=document.getElementById('prestaId').value;
  const praticiens=[...document.querySelectorAll('#fPraticiens input:checked')].map(c=>c.value);
  const body={
    nom:document.getElementById('fNom').value,
    categorie:document.getElementById('fCategorie').value,
    couleur:document.getElementById('fCouleur').value,
    duree:parseInt(document.getElementById('fDuree').value),
    prix:parseFloat(document.getElementById('fPrix').value),
    acompte_pct:parseInt(document.getElementById('fAcompte').value),
    description:document.getElementById('fDescription').value,
    seo_keywords:JSON.parse(document.getElementById('fSeoKeywords').value||'[]'),
    praticiens
  };
  if(id){await api('/api/services/prestations/'+id,{method:'PATCH',body:JSON.stringify(body)})}
  else{await api('/api/services/prestations',{method:'POST',body:JSON.stringify(body)})}
  closeModal();loadPrestas();
}
async function deletePresta(){
  const id=document.getElementById('prestaId').value;
  if(!id||!confirm('Supprimer cette prestation ?'))return;
  await api('/api/services/prestations/'+id,{method:'DELETE'});
  closeModal();loadPrestas();
}
document.getElementById('modalPresta').addEventListener('click',e=>{if(e.target.classList.contains('modal-bg'))closeModal()});
async function init(){await refreshToken();await loadPraticiens();loadPrestas()}
init();
</script>
</body>
</html>
