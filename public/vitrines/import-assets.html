<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI — Rapport d'analyse de votre site</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--creme:#FAF5EB;--or:#C9A961;--or-dim:rgba(201,169,97,.12);--nuit:#0A1628;--blanc:#FFFFFF;--ink:#1a1814;--ink-soft:#5C5C70;--ink-dim:#8E8E9E;--line:rgba(26,24,20,.08);--success:#16A34A;--warning:#F59E0B;--danger:#EF4444;--radius:12px;--ease:cubic-bezier(.16,1,.3,1);}
body{font-family:'Inter',sans-serif;background:var(--creme);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;}
a{color:var(--or);text-decoration:none;}
.container{max-width:1100px;margin:0 auto;padding:0 28px;}

/* Header */
.header{padding:20px 0;border-bottom:1px solid var(--line);margin-bottom:32px;}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.header h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:24px;font-weight:400;}
.back{font-size:13px;color:var(--ink-soft);}

/* Score cards */
.scores{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
.score-card{background:var(--blanc);border:1px solid var(--line);border-radius:var(--radius);padding:20px;text-align:center;transition:border-color .2s;}
.score-card:hover{border-color:var(--or);}
.score-value{font-family:'Syne',sans-serif;font-size:36px;font-weight:700;margin-bottom:4px;}
.score-value.good{color:var(--success);}.score-value.ok{color:var(--warning);}.score-value.bad{color:var(--danger);}.score-value.na{color:var(--ink-dim);}
.score-grade{font-size:11px;font-weight:600;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.5px;}
.score-label{font-size:13px;font-weight:600;margin-top:8px;}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px;}
.info-card{background:var(--blanc);border:1px solid var(--line);border-radius:var(--radius);padding:20px;}
.info-card h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--line);}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--ink-soft);}
.info-val{font-weight:600;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.badge-green{background:rgba(22,163,74,.1);color:var(--success);}
.badge-yellow{background:rgba(245,158,11,.1);color:var(--warning);}
.badge-red{background:rgba(239,68,68,.1);color:var(--danger);}

/* Plugins list */
.plugins{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.plugin-tag{padding:4px 10px;background:var(--or-dim);border-radius:20px;font-size:11px;font-weight:500;color:var(--ink);}

/* Images grid */
.images-section{margin-bottom:32px;}
.images-section h3{font-size:16px;font-weight:700;margin-bottom:12px;}
.images-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;max-height:300px;overflow-y:auto;padding:4px;}
.img-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:pointer;transition:border-color .2s;}
.img-thumb:hover{border-color:var(--or);}

/* Dual CTA */
.dual-cta{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:40px 0;}
.cta-card{background:var(--blanc);border:1px solid var(--line);border-radius:var(--radius);padding:32px;text-align:center;transition:all .3s var(--ease);cursor:pointer;}
.cta-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(201,169,97,.15);border-color:var(--or);}
.cta-card h3{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;margin-bottom:8px;}
.cta-card p{font-size:13px;color:var(--ink-soft);margin-bottom:16px;line-height:1.6;}
.cta-card .price{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--or);margin-bottom:16px;}
.btn{padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s var(--ease);font-family:'Inter',sans-serif;}
.btn-primary{background:var(--or);color:var(--blanc);}.btn-primary:hover{box-shadow:0 4px 16px rgba(201,169,97,.3);}
.btn-secondary{background:transparent;border:1px solid var(--or);color:var(--or);}.btn-secondary:hover{background:var(--or-dim);}

/* Wizard credentials */
.wizard{display:none;margin:32px 0;}
.wizard.active{display:block;}
.wizard-step{display:none;}.wizard-step.active{display:block;}
.wizard-card{background:var(--blanc);border:1px solid var(--line);border-radius:var(--radius);padding:32px;max-width:560px;margin:0 auto;}
.wizard-card h3{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;margin-bottom:16px;}
.hebergeur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.heb-card{background:var(--creme);border:1px solid var(--line);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;font-size:13px;font-weight:600;}
.heb-card:hover{border-color:var(--or);}
.heb-card.selected{border:2px solid var(--or);background:var(--or-dim);}
.heb-card.recommended::after{content:'Detecte';display:block;font-size:9px;color:var(--success);font-weight:700;margin-top:4px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.field input{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;color:var(--ink);}
.field input:focus{outline:none;border-color:var(--or);}
.wizard-btns{display:flex;gap:10px;margin-top:20px;}
.test-result{margin-top:16px;padding:14px;border-radius:8px;font-size:13px;display:none;}
.test-result.success{display:block;background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);color:var(--success);}
.test-result.error{display:block;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--danger);}
.security-note{font-size:11px;color:var(--ink-dim);margin-top:12px;display:flex;align-items:center;gap:6px;}

.footer{text-align:center;padding:32px 0;font-size:11px;color:var(--ink-dim);}

@media(max-width:768px){
  .scores{grid-template-columns:1fr 1fr;}
  .info-grid,.dual-cta{grid-template-columns:1fr;}
  .hebergeur-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="container">
  <div class="header"><div class="header-inner">
    <div><a href="/public/vitrines/import-site.html" class="back">&larr; Retour</a><h1 id="page-title">Analyse de votre site</h1></div>
  </div></div>

  <div id="app"><div style="text-align:center;padding:40px;color:var(--ink-dim);">Chargement du rapport...</div></div>
</div>

<div class="footer">Propulse par JADOMI IA &middot; &copy; 2026</div>

<script>
const SU='https://vsbomwjzehnfinfjvhqp.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzYm9td2p6ZWhuZmluZmp2aHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTE1ODksImV4cCI6MjA5MDcyNzU4OX0.RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF_W6H_T76tSjk';
let db,token,scanResult=null,siteExistantId=null;

(async function(){
  db=supabase.createClient(SU,SK);
  const{data}=await db.auth.getSession();
  const s=data?.session;
  if(!s){window.location.href='/login.html';return;}
  token=s.access_token;

  // Charger resultats depuis sessionStorage (scanner P36) ou DB
  const stored=sessionStorage.getItem('jadomi_scan_result');
  if(stored){
    scanResult=JSON.parse(stored);
    renderReport();
  }else{
    // Fallback : charger depuis DB via analysis_id
    const id=new URLSearchParams(location.search).get('analysis_id');
    if(id){
      const res=await fetch('/api/studio/analyse/'+id,{headers:{'Authorization':'Bearer '+token}});
      scanResult=await res.json();
      renderReport();
    }else{
      document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px;color:var(--ink-dim);">Aucune analyse trouvee. <a href="/public/vitrines/import-site.html">Analyser un site</a></div>';
    }
  }
})();

function api(method,path,body){
  const opts={method,headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json','X-Societe-Id':localStorage.getItem('societe_active_id')||''}};
  if(body)opts.body=JSON.stringify(body);
  return fetch(path,opts).then(r=>r.json());
}

function scoreClass(s){return s>=70?'good':s>=40?'ok':s>0?'bad':'na';}
function gradeFromScore(s){if(!s&&s!==0)return'—';if(s>=90)return'A';if(s>=70)return'B';if(s>=50)return'C';if(s>=30)return'D';return'F';}

function renderReport(){
  const r=scanResult;
  const url=r.url_analysee||sessionStorage.getItem('jadomi_scan_url')||'';
  document.getElementById('page-title').textContent='Rapport : '+url.replace(/https?:\/\/(www\.)?/,'');

  const perf=r.score_performance||0;
  const seo=r.score_seo||0;
  const complexite=r.score_complexite||0;
  const design=r.rapport_complet?.design?.score||Math.max(30,100-complexite);
  const securite=r.rapport_complet?.security?.score||(r.details?.status_code===200?80:40);

  document.getElementById('app').innerHTML=`
    <!-- SCORES -->
    <div class="scores">
      <div class="score-card"><div class="score-value ${scoreClass(design)}">${design||'—'}</div><div class="score-grade">${gradeFromScore(design)}</div><div class="score-label">Design</div></div>
      <div class="score-card"><div class="score-value ${scoreClass(securite)}">${securite||'—'}</div><div class="score-grade">${gradeFromScore(securite)}</div><div class="score-label">Securite</div></div>
      <div class="score-card"><div class="score-value ${scoreClass(seo)}">${seo||'—'}</div><div class="score-grade">${gradeFromScore(seo)}</div><div class="score-label">SEO</div></div>
      <div class="score-card"><div class="score-value ${scoreClass(perf)}">${perf||'—'}</div><div class="score-grade">${gradeFromScore(perf)}</div><div class="score-label">Performance</div></div>
    </div>

    <!-- INFOS -->
    <div class="info-grid">
      <div class="info-card">
        <h3>Plateforme</h3>
        <div class="info-row"><span class="info-key">CMS</span><span class="info-val">${r.plateforme_detectee||'Non detecte'} <span class="badge badge-green">${r.plateforme_detectee?'Detecte':''}</span></span></div>
        <div class="info-row"><span class="info-key">Theme</span><span class="info-val">${r.theme_detecte||'—'}</span></div>
        <div class="info-row"><span class="info-key">E-commerce</span><span class="info-val">${r.has_ecommerce?'Oui (WooCommerce)':'Non'}</span></div>
        <div class="info-row"><span class="info-key">Stripe</span><span class="info-val">${r.has_stripe?'Oui':'Non'}</span></div>
        <div class="info-row"><span class="info-key">Pages estimees</span><span class="info-val">${r.nb_pages||'—'}</span></div>
        <div class="info-row"><span class="info-key">Produits</span><span class="info-val">${r.nb_produits||'—'}</span></div>
        <div class="info-row"><span class="info-key">Hebergeur</span><span class="info-val">${r.hebergeur_detecte||'Non detecte'}</span></div>
        ${r.plugins_detectes?.length?'<div style="margin-top:8px;"><span class="info-key">Plugins ('+r.plugins_detectes.length+')</span><div class="plugins">'+r.plugins_detectes.map(p=>'<span class="plugin-tag">'+p+'</span>').join('')+'</div></div>':''}
      </div>
      <div class="info-card">
        <h3>Performance</h3>
        <div class="info-row"><span class="info-key">Temps chargement</span><span class="info-val">${r.details?.load_time_ms?r.details.load_time_ms+'ms':'—'}</span></div>
        <div class="info-row"><span class="info-key">Taille page</span><span class="info-val">${r.details?.page_size_kb?r.details.page_size_kb+'KB':'—'}</span></div>
        <div class="info-row"><span class="info-key">Images</span><span class="info-val">${r.images?.length||0}</span></div>
        <div class="info-row"><span class="info-key">Complexite</span><span class="info-val"><span class="badge ${complexite>70?'badge-red':complexite>30?'badge-yellow':'badge-green'}">${complexite}/100</span></span></div>
        <div class="info-row"><span class="info-key">Recommandation</span><span class="info-val" style="font-weight:700;color:${r.recommandation==='reconstruire'?'var(--success)':r.recommandation==='refuser'?'var(--danger)':'var(--warning)'};">${r.recommandation||'—'}</span></div>
        ${r.details?.seo?'<div class="info-row"><span class="info-key">Title SEO</span><span class="info-val">'+(r.details.seo.title||'Absent').substring(0,40)+'</span></div>':''}
      </div>
    </div>

    <!-- MEDIAS (images + videos + PDFs) -->
    <div class="images-section">
      <h3>${(r.images?.length||0)+(r.videos?.length||0)+(r.documents?.length||0)} medias detectes</h3>
      ${r.videos?.length?'<div style="margin-bottom:12px;"><strong style="font-size:13px;">'+r.videos.length+' video(s)</strong><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">'+r.videos.map(v=>'<div style="width:120px;height:68px;border-radius:6px;background:#1a1814;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:1px solid var(--line);">'+(v.thumbnail?'<img src="'+v.thumbnail+'" style="width:100%;height:100%;object-fit:cover;opacity:.7;">':'')+'<span style="position:absolute;font-size:20px;">&#9654;</span><span style="position:absolute;bottom:2px;right:4px;font-size:9px;color:#fff;background:rgba(0,0,0,.6);padding:1px 4px;border-radius:2px;">'+v.type+'</span></div>').join('')+'</div></div>':''}
      ${r.images?.length?'<div style="margin-bottom:12px;"><strong style="font-size:13px;">'+r.images.length+' image(s)</strong><div class="images-grid" style="margin-top:6px;">'+r.images.slice(0,40).map(img=>'<img class="img-thumb" src="'+img.url+'" alt="'+(img.alt||'')+'" loading="lazy" onerror="this.style.display=\'none\'">').join('')+'</div></div>':''}
      ${r.documents?.length?'<div><strong style="font-size:13px;">'+r.documents.length+' document(s) PDF</strong><div style="margin-top:6px;">'+r.documents.map(d=>'<a href="'+d.url+'" target="_blank" style="display:inline-block;padding:6px 12px;background:var(--or-dim);border-radius:6px;font-size:12px;margin:3px;">&#128196; '+d.title+'</a>').join('')+'</div></div>':''}
    </div>

    <!-- 3 MODES + NOUVEAU SITE -->
    <h2 style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;margin:40px 0 20px;text-align:center;">Comment souhaitez-vous ameliorer votre site ?</h2>

    <div style="display:grid;gap:16px;margin-bottom:20px;">
      <!-- MODE STAGING -->
      <div class="cta-card" onclick="startStaging()" style="text-align:left;display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center;">
        <div style="font-size:32px;">&#128640;</div>
        <div>
          <h3 style="font-size:18px;margin-bottom:4px;">Mode Staging</h3>
          <p style="margin-bottom:4px;">Je clone votre site, je l'ameliore, vous validez avant tout deploiement. Aucun mot de passe requis.</p>
          <div style="font-size:11px;color:var(--success);">&#10003; Zero risque &middot; &#10003; Preview complete &middot; &#10003; Tous hebergeurs</div>
        </div>
        <div><div class="price" style="margin:0;">Des 49&euro;</div><button class="btn btn-primary" style="margin-top:8px;">Commencer &rarr;</button></div>
      </div>

      <!-- MODE AUTOMATIQUE -->
      <div class="cta-card" onclick="showWizard()" style="text-align:left;display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center;">
        <div style="font-size:32px;">&#9889;</div>
        <div>
          <h3 style="font-size:18px;margin-bottom:4px;">Mode Automatique</h3>
          <p style="margin-bottom:4px;">Donnez un acces securise, JADOMI modifie directement. Backup auto + rollback en 1 clic.</p>
          <div style="font-size:11px;color:var(--ink-dim);">Necessite identifiants WordPress ou FTP</div>
        </div>
        <div><div class="price" style="margin:0;">Pro 49&euro;/mois</div><button class="btn btn-secondary" style="margin-top:8px;">Configurer &rarr;</button></div>
      </div>
    </div>

    <!-- CTA NOUVEAU SITE -->
    <div style="text-align:center;padding:20px;border-top:1px solid var(--line);margin-top:16px;">
      <p style="font-size:13px;color:var(--ink-dim);margin-bottom:8px;">Ou repartez de zero avec un nouveau site JADOMI</p>
      <a href="/public/vitrines/onboarding-v3.html" class="btn btn-secondary" style="display:inline-block;text-decoration:none;">Creer un nouveau site (60 themes) &rarr;</a>
    </div>

    <!-- WIZARD CREDENTIALS -->
    <div class="wizard" id="wizard">
      <!-- Etape 1 : Hebergeur -->
      <div class="wizard-step active" id="wiz-1">
        <div class="wizard-card">
          <h3>Etape 1 — Votre hebergeur</h3>
          <p style="font-size:13px;color:var(--ink-soft);margin-bottom:16px;">Selectionnez votre hebergeur pour configurer l'acces.</p>
          <div class="hebergeur-grid">
            <div class="heb-card ${r.hebergeur_detecte==='hostinger'?'selected recommended':''}" onclick="selectHeb('hostinger',this)">Hostinger</div>
            <div class="heb-card ${r.hebergeur_detecte==='ovh'?'selected recommended':''}" onclick="selectHeb('ovh',this)">OVH</div>
            <div class="heb-card ${r.hebergeur_detecte==='infomaniak'?'selected recommended':''}" onclick="selectHeb('infomaniak',this)">Infomaniak</div>
            <div class="heb-card" onclick="selectHeb('ionos',this)">1&amp;1 IONOS</div>
            <div class="heb-card" onclick="selectHeb('o2switch',this)">O2switch</div>
            <div class="heb-card" onclick="selectHeb('autre',this)">Autre</div>
          </div>
          <div class="wizard-btns"><button class="btn btn-primary" onclick="wizNext(2)">Suivant</button></div>
        </div>
      </div>

      <!-- Etape 2 : Methode -->
      <div class="wizard-step" id="wiz-2">
        <div class="wizard-card">
          <h3>Etape 2 — Methode d'acces</h3>
          <div class="hebergeur-grid" style="grid-template-columns:1fr 1fr;">
            <div class="heb-card selected" onclick="selectMethod('wordpress_admin',this)">WordPress Admin<div style="font-size:10px;color:var(--success);margin-top:4px;">Recommande</div></div>
            <div class="heb-card" onclick="selectMethod('ftp',this)">FTP / SFTP</div>
          </div>
          <div class="wizard-btns"><button class="btn btn-secondary" onclick="wizBack(1)">Retour</button><button class="btn btn-primary" onclick="wizNext(3)">Suivant</button></div>
        </div>
      </div>

      <!-- Etape 3 : Credentials -->
      <div class="wizard-step" id="wiz-3">
        <div class="wizard-card">
          <h3>Etape 3 — Vos identifiants</h3>
          <div id="cred-fields-wp">
            <div class="field"><label>URL Admin WordPress</label><input id="cred-url" value="${url.replace(/\/$/,'')+'/wp-admin'}"></div>
            <div class="field"><label>Email ou Username</label><input id="cred-user" placeholder="admin@monsite.fr"></div>
            <div class="field"><label>Mot de passe</label><input id="cred-pass" type="password" placeholder="Mot de passe WordPress"></div>
          </div>
          <div id="cred-fields-ftp" style="display:none;">
            <div class="field"><label>Serveur FTP</label><input id="ftp-host" placeholder="ftp.monsite.fr"></div>
            <div class="field"><label>Port</label><input id="ftp-port" value="21"></div>
            <div class="field"><label>Utilisateur</label><input id="ftp-user"></div>
            <div class="field"><label>Mot de passe</label><input id="ftp-pass" type="password"></div>
          </div>
          <div class="security-note">&#128274; Vos identifiants sont chiffres AES-256 et stockes de maniere securisee.</div>
          <div class="wizard-btns"><button class="btn btn-secondary" onclick="wizBack(2)">Retour</button><button class="btn btn-primary" onclick="testConnection()">Tester la connexion</button></div>
          <div class="test-result" id="test-result"></div>
        </div>
      </div>

      <!-- Etape 4 : Succes -->
      <div class="wizard-step" id="wiz-4">
        <div class="wizard-card" style="text-align:center;">
          <div style="font-size:48px;margin-bottom:12px;">&#10003;</div>
          <h3>Connexion etablie !</h3>
          <p style="font-size:14px;color:var(--ink-soft);margin-bottom:20px;">JADOMI IA peut maintenant modifier votre site. Les modifications simples sont traitees automatiquement.</p>
          <a href="/studio/mes-sites/" class="btn btn-primary" style="display:inline-block;text-decoration:none;">Acceder a mes interventions IA &rarr;</a>
        </div>
      </div>
    </div>
  `;
}

// === Staging ===
async function startStaging(){
  if(!confirm('Creer une copie staging de ce site ? (2-5 minutes)'))return;
  const url=scanResult?.url_analysee||sessionStorage.getItem('jadomi_scan_url')||'';
  if(!url){alert('URL manquante');return;}
  try{
    const r=await api('POST','/api/vitrines/staging/create',{url,analysis_id:scanResult?.id||null,societe_id:localStorage.getItem('societe_active_id')});
    if(!r.staging_id){throw new Error(r.error||'Erreur creation staging');}
    // Poll status
    const poll=setInterval(async()=>{
      const s=await api('GET','/api/vitrines/staging/status/'+r.staging_id);
      if(s.statut==='pret'){
        clearInterval(poll);
        alert('Staging pret ! Redirection...');
        window.location.href=r.url_staging;
      }else if(s.statut==='archive'){
        clearInterval(poll);
        alert('Erreur creation staging. Reessayez.');
      }
    },3000);
    // Timeout 5 min
    setTimeout(()=>clearInterval(poll),300000);
    alert('Staging en cours de creation (2-5 min). Vous serez redirige automatiquement.');
  }catch(e){alert('Erreur : '+(e.error||e.message));}
}

let selectedHeb='',selectedMethod='wordpress_admin';

function selectHeb(heb,el){selectedHeb=heb;document.querySelectorAll('.hebergeur-grid .heb-card').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');}

function selectMethod(method,el){
  selectedMethod=method;
  el.parentElement.querySelectorAll('.heb-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('cred-fields-wp').style.display=method==='wordpress_admin'?'block':'none';
  document.getElementById('cred-fields-ftp').style.display=method==='ftp'?'block':'none';
}

function showWizard(){document.getElementById('wizard').classList.add('active');document.getElementById('wizard').scrollIntoView({behavior:'smooth'});}
function wizNext(step){document.querySelectorAll('.wizard-step').forEach(s=>s.classList.remove('active'));document.getElementById('wiz-'+step).classList.add('active');}
function wizBack(step){wizNext(step);}

async function testConnection(){
  const resultEl=document.getElementById('test-result');
  resultEl.className='test-result';resultEl.style.display='block';resultEl.textContent='Test en cours...';

  const url=scanResult?.url_analysee||sessionStorage.getItem('jadomi_scan_url')||'';

  // 1. Enregistrer le site existant
  try{
    const addRes=await api('POST','/api/studio/sites-existants/ajouter',{url,hebergeur:selectedHeb||'autre'});
    if(addRes.site)siteExistantId=addRes.site.id;
  }catch{}

  if(!siteExistantId){resultEl.className='test-result error';resultEl.textContent='Erreur creation site. Reessayez.';return;}

  // 2. Envoyer les credentials
  let body;
  if(selectedMethod==='wordpress_admin'){
    body={type_acces:'wordpress_admin',admin_url:document.getElementById('cred-url')?.value,admin_user:document.getElementById('cred-user')?.value,admin_password:document.getElementById('cred-pass')?.value};
  }else{
    body={type_acces:'ftp',host:document.getElementById('ftp-host')?.value,port:document.getElementById('ftp-port')?.value||21,user:document.getElementById('ftp-user')?.value,password:document.getElementById('ftp-pass')?.value};
  }

  try{
    const credRes=await api('POST','/api/studio/sites-existants/'+siteExistantId+'/credentials',body);
    if(credRes.test_ok){
      resultEl.className='test-result success';
      resultEl.innerHTML='&#10003; Connexion etablie ! Redirection...';
      setTimeout(()=>wizNext(4),1500);
    }else{
      resultEl.className='test-result error';
      resultEl.textContent='Echec : '+(credRes.test_message||'Verifiez vos identifiants.');
    }
  }catch(e){
    resultEl.className='test-result error';
    resultEl.textContent='Erreur : '+(e.message||'Connexion impossible');
  }
}
</script>
