<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JADOMI — Sélection des médias</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#c9a961;--gold-light:#e8c77b;--bg:#0a0a0f;--surface:#1a1a1f;--surface2:#222228;--border:rgba(201,169,97,0.15);--text:#f0ede6;--muted:#8a857c;--green:#10b981;--trans:cubic-bezier(0.16,1,0.3,1);}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

.header{display:flex;justify-content:space-between;align-items:center;padding:24px 40px;border-bottom:1px solid rgba(255,255,255,0.06);background:linear-gradient(180deg,rgba(201,169,97,0.04),transparent);}
.header h1{font-family:'Syne',sans-serif;font-size:1.8rem;margin:0 0 4px;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header p{color:var(--muted);font-size:13px;}
.header-stats{display:flex;gap:16px;}
.stat-box{background:rgba(201,169,97,0.06);border:1px solid rgba(201,169,97,0.15);border-radius:12px;padding:12px 20px;text-align:center;min-width:100px;}
.stat-num{font-size:1.5rem;font-weight:700;color:var(--gold);}
.stat-lbl{font-size:11px;color:var(--muted);}

.actions-bar{display:flex;gap:10px;padding:16px 40px;flex-wrap:wrap;}
.action-btn{background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);padding:8px 16px;border-radius:99px;font-size:13px;cursor:pointer;transition:all 200ms;font-family:'DM Sans',sans-serif;}
.action-btn:hover{border-color:var(--gold);background:rgba(201,169,97,0.06);}
.action-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;font-weight:600;border:none;}

.filters{padding:12px 40px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:24px;flex-wrap:wrap;}
.filter-group{display:flex;align-items:center;gap:6px;}
.filter-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.filter-chip{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);padding:4px 12px;border-radius:99px;font-size:12px;cursor:pointer;transition:all 150ms;font-family:'DM Sans',sans-serif;}
.filter-chip.active{background:rgba(201,169,97,0.12);border-color:var(--gold);color:var(--gold);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:24px 40px;}
.card{background:var(--surface);border:2px solid transparent;border-radius:14px;overflow:hidden;cursor:pointer;transition:all 400ms var(--trans);}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.4);}
.card.selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 12px 32px rgba(201,169,97,0.15);}
.card-preview{position:relative;aspect-ratio:16/10;background:#000;overflow:hidden;}
.card-preview img,.card-preview video{width:100%;height:100%;object-fit:cover;}
.card-select{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);border:2px solid white;color:white;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:all 200ms;opacity:0;}
.card:hover .card-select,.card.selected .card-select{opacity:1;}
.card.selected .card-select{background:var(--gold);border-color:var(--gold);color:#0a0a0f;}
.card-badge{position:absolute;top:10px;left:10px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;}
.badge-hd{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;}
.badge-low{background:rgba(239,68,68,0.85);color:white;}
.badge-ctx{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);padding:3px 8px;border-radius:6px;font-size:10px;color:var(--gold);}
.card-info{padding:12px 14px;}
.card-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,0.7);}
.card-dims{font-size:11px;color:var(--muted);margin-top:2px;}

.footer{position:sticky;bottom:0;background:rgba(10,10,15,0.95);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.08);padding:16px 40px;display:flex;justify-content:space-between;align-items:center;}
.footer-sum{font-size:13px;color:var(--muted);}
.footer-btn{padding:12px 28px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0a0a0f;border:none;border-radius:99px;font-size:15px;font-weight:700;cursor:pointer;transition:all 300ms;}
.footer-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,169,97,0.3);}
.footer-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

.empty{text-align:center;padding:60px 20px;color:var(--muted);}

@media(max-width:768px){
  .header,.actions-bar,.filters,.grid,.footer{padding-left:16px;padding-right:16px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
  .header-stats{display:none;}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Choisissez vos médias</h1>
    <p>Sélectionnez les éléments à garder pour votre nouveau site JADOMI.</p>
  </div>
  <div class="header-stats">
    <div class="stat-box"><div class="stat-num" id="count-selected">0</div><div class="stat-lbl">Sélectionnés</div></div>
    <div class="stat-box"><div class="stat-num" id="count-total">0</div><div class="stat-lbl">Total</div></div>
  </div>
</div>

<div class="actions-bar">
  <button class="action-btn" onclick="selectAll()">✓ Tout sélectionner</button>
  <button class="action-btn" onclick="deselectAll()">✕ Tout désélectionner</button>
  <button class="action-btn" onclick="selectHD()">💎 HD uniquement</button>
  <button class="action-btn" onclick="invertSelection()">↔ Inverser</button>
  <button class="action-btn gold" onclick="letClaudeChoose()">🤖 Laisser Claude choisir</button>
</div>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Type :</span>
    <button class="filter-chip active" onclick="setFilter('type','all',this)">Tous</button>
    <button class="filter-chip" onclick="setFilter('type','image',this)">📸 Photos</button>
    <button class="filter-chip" onclick="setFilter('type','video',this)">🎥 Vidéos</button>
  </div>
  <div class="filter-group">
    <span class="filter-label">Contexte :</span>
    <button class="filter-chip active" onclick="setFilter('ctx','all',this)">Tous</button>
    <button class="filter-chip" onclick="setFilter('ctx','hero',this)">Hero</button>
    <button class="filter-chip" onclick="setFilter('ctx','header',this)">Header</button>
    <button class="filter-chip" onclick="setFilter('ctx','gallery',this)">Galerie</button>
    <button class="filter-chip" onclick="setFilter('ctx','team_member',this)">Équipe</button>
  </div>
</div>

<div class="grid" id="assets-grid"></div>

<div class="footer">
  <div class="footer-sum" id="footer-summary">0 photo · 0 vidéo sélectionnée</div>
  <div style="display:flex;gap:12px;">
    <a href="/organisation.html" style="padding:12px 20px;border:1px solid var(--border);border-radius:99px;color:var(--muted);text-decoration:none;font-size:13px;">← Retour</a>
    <button class="footer-btn" id="btn-validate" onclick="validateSelection()">Valider ma sélection →</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_KEY='sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let token=null,assets=[],selectedIds=new Set(),filters={type:'all',ctx:'all'};
const analysisId=new URLSearchParams(location.search).get('analysis_id');

(async()=>{
  const{data}=await db.auth.getSession();
  if(!data?.session)return location.href='/login.html';
  token=data.session.access_token;
  await loadAssets();
})();

async function loadAssets(){
  const r=await fetch(`/api/site-analysis/${analysisId}/assets`,{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json());
  assets=r.assets||[];
  // Pre-select good ones
  assets.forEach(a=>{
    const w=a.metadata?.width||0;
    const ctx=a.metadata?.context||'';
    if(ctx==='hero'||ctx==='logo'||w>=1200||a.asset_type==='video') selectedIds.add(a.id);
  });
  render();
}

function getFiltered(){
  return assets.filter(a=>{
    if(filters.type!=='all'&&a.asset_type!==filters.type)return false;
    if(filters.ctx!=='all'&&(a.metadata?.context||'content')!==filters.ctx)return false;
    return true;
  });
}

function render(){
  const filtered=getFiltered();
  const grid=document.getElementById('assets-grid');
  if(!filtered.length){grid.innerHTML='<div class="empty">Aucun média trouvé pour ces filtres.</div>';updateStats();return;}
  grid.innerHTML=filtered.map(a=>{
    const sel=selectedIds.has(a.id);
    const url=a.r2_url||a.original_url||'';
    const w=a.metadata?.width||0;
    const ctx=a.metadata?.context||'content';
    const isVideo=a.asset_type==='video'||a.asset_type==='video_embed';
    const qualBadge=w>=1920?'<div class="card-badge badge-hd">4K</div>':w>=1200?'<div class="card-badge badge-hd">HD</div>':w>0&&w<600?'<div class="card-badge badge-low">Basse</div>':'';
    const preview=isVideo?`<video src="${url}" muted style="width:100%;height:100%;object-fit:cover;"></video>`:`<img src="${url}" alt="" loading="lazy">`;
    return `<div class="card${sel?' selected':''}" data-id="${a.id}">
      <div class="card-preview" onclick="toggleSelect('${a.id}')">
        ${preview}
        <button class="card-select" onclick="event.stopPropagation();toggleSelect('${a.id}')">${sel?'✓':'○'}</button>
        ${qualBadge}
        <div class="badge-ctx">${ctx}</div>
      </div>
      <div class="card-info">
        <div class="card-name">${a.metadata?.alt||a.original_url?.split('/').pop()?.split('?')[0]||'Fichier'}</div>
        ${w?`<div class="card-dims">${w}×${a.metadata?.height||'?'}px</div>`:''}
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function toggleSelect(id){
  if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);
  render();
}

function selectAll(){getFiltered().forEach(a=>selectedIds.add(a.id));render();}
function deselectAll(){getFiltered().forEach(a=>selectedIds.delete(a.id));render();}
function selectHD(){
  selectedIds.clear();
  assets.forEach(a=>{if((a.metadata?.width||0)>=1200||a.asset_type==='video')selectedIds.add(a.id);});
  render();
}
function invertSelection(){
  getFiltered().forEach(a=>{if(selectedIds.has(a.id))selectedIds.delete(a.id);else selectedIds.add(a.id);});
  render();
}

async function letClaudeChoose(){
  try{
    const r=await fetch(`/api/site-analysis/${analysisId}/auto-select`,{method:'POST',headers:{'Authorization':'Bearer '+token}}).then(r=>r.json());
    selectedIds=new Set(r.kept_ids||[]);
    render();
    alert(`Claude a sélectionné ${r.kept} éléments sur ${r.total}`);
  }catch(e){alert('Erreur IA');}
}

function setFilter(key,value,btn){
  filters[key]=value;
  btn.parentElement.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function updateStats(){
  document.getElementById('count-selected').textContent=selectedIds.size;
  document.getElementById('count-total').textContent=assets.length;
  const sel=[...selectedIds].map(id=>assets.find(a=>a.id===id)).filter(Boolean);
  const photos=sel.filter(a=>a.asset_type==='image').length;
  const videos=sel.filter(a=>a.asset_type==='video'||a.asset_type==='video_embed').length;
  document.getElementById('footer-summary').textContent=`${photos} photo${photos>1?'s':''} · ${videos} vidéo${videos>1?'s':''} sélectionnée${selectedIds.size>1?'s':''}`;
}

async function validateSelection(){
  if(selectedIds.size===0){alert('Sélectionnez au moins 1 élément');return;}
  const selections=assets.map(a=>({asset_id:a.id,action:selectedIds.has(a.id)?'keep':'discard',category:a.metadata?.context}));
  await fetch(`/api/site-analysis/${analysisId}/select-assets`,{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({asset_selections:selections})
  });
  location.href=`/public/vitrines/site-builder.html?analysis_id=${analysisId}`;
}
</script>
</body>
</html>
