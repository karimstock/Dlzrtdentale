<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JADOMI — Votre univers en 3 minutes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@400;500;600;700&family=Lora:wght@400;600;700&family=Raleway:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/vitrines/onboarding-v2.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="ob-v2" data-step="1">

  <!-- LAYER 1 : Background -->
  <div class="ob-background" id="ob-bg">
    <video autoplay muted loop playsinline id="bg-video">
      <source src="/public/assets/bg-loop-gold.mp4" type="video/mp4">
    </video>
    <div class="ob-gradient-overlay"></div>
    <div class="ob-gradient-animated"></div>
  </div>

  <!-- LAYER 2 : Preview iframe -->
  <iframe id="ob-preview-iframe" src="about:blank" class="ob-preview hidden"></iframe>
  <div class="ob-preview-mask"></div>

  <!-- LAYER 3 : Chatbot -->
  <div class="ob-chat" id="ob-chat">
    <div class="ob-chat-messages" id="chat-messages"></div>
    <div class="ob-chat-input-zone" id="chat-input-zone"></div>
  </div>

  <!-- LAYER 4 : Generative UI -->
  <div class="ob-gui-layer" id="gui-layer"></div>

  <!-- LAYER 5 : Progress -->
  <div class="ob-progress" id="ob-progress">
    <div class="ob-progress-dots">
      <span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <script src="/public/vitrines/onboarding-v2.js"></script>
</body>
</html>
