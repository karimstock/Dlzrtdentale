<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centre d'aide — JADOMI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1629;--bg-card:rgba(255,255,255,.04);--bg-card-hover:rgba(255,255,255,.07);
  --gold:#c9a961;--gold-light:#e8c77b;--gold-dim:rgba(201,169,97,.15);
  --text:#e8e6e1;--text-dim:rgba(232,230,225,.55);--text-muted:rgba(232,230,225,.35);
  --border:rgba(255,255,255,.06);--border-hover:rgba(201,169,97,.25);
  --radius:14px;--radius-sm:10px;
  --ease:cubic-bezier(.16,1,.3,1);
}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased;
}

/* ── Header ── */
.aide-header{
  padding:56px 32px 40px;text-align:center;
  background:linear-gradient(180deg,rgba(201,169,97,.08) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
}
.aide-header h1{
  font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.6rem);
  font-weight:800;letter-spacing:-.02em;margin-bottom:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.aide-header p{color:var(--text-dim);font-size:1rem;margin-bottom:28px}
.search-wrap{
  max-width:520px;margin:0 auto;position:relative;
}
.search-wrap input{
  width:100%;padding:14px 20px 14px 48px;border-radius:50px;
  background:var(--bg-card);border:1px solid var(--border);
  color:var(--text);font-size:.95rem;font-family:inherit;
  outline:none;transition:border .3s var(--ease),box-shadow .3s var(--ease);
}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.search-wrap .search-icon{
  position:absolute;left:18px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);font-size:1.1rem;pointer-events:none;
}

/* ── Layout ── */
.aide-layout{
  display:grid;grid-template-columns:280px 1fr;gap:0;
  max-width:1200px;margin:0 auto;min-height:calc(100vh - 200px);
}
@media(max-width:860px){
  .aide-layout{grid-template-columns:1fr}
}

/* ── Sidebar ── */
.aide-sidebar{
  border-right:1px solid var(--border);padding:32px 20px;
  position:sticky;top:0;height:fit-content;max-height:100vh;overflow-y:auto;
}
@media(max-width:860px){
  .aide-sidebar{
    border-right:none;border-bottom:1px solid var(--border);
    position:relative;display:flex;flex-wrap:wrap;gap:6px;padding:16px;
  }
}
.aide-sidebar h3{
  font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);
  margin-bottom:16px;
}
@media(max-width:860px){.aide-sidebar h3{width:100%;margin-bottom:8px}}
.cat-btn{
  display:block;width:100%;text-align:left;padding:10px 14px;
  border-radius:var(--radius-sm);border:none;background:transparent;
  color:var(--text-dim);font-size:.9rem;font-family:inherit;cursor:pointer;
  transition:all .25s var(--ease);margin-bottom:2px;
}
@media(max-width:860px){.cat-btn{width:auto;margin-bottom:0}}
.cat-btn:hover{background:var(--bg-card-hover);color:var(--text)}
.cat-btn.active{background:var(--gold-dim);color:var(--gold);font-weight:600}

/* ── Support card ── */
.support-card{
  margin-top:32px;padding:20px;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(201,169,97,.08),rgba(201,169,97,.03));
  border:1px solid var(--border-hover);
}
@media(max-width:860px){.support-card{margin-top:16px;width:100%}}
.support-card h4{
  font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;
  color:var(--gold);margin-bottom:8px;
}
.support-card p{font-size:.82rem;color:var(--text-dim);margin-bottom:12px;line-height:1.5}
.support-card a{
  display:inline-block;padding:8px 18px;border-radius:50px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:#0a0a0f;font-size:.82rem;font-weight:600;text-decoration:none;
  transition:all .3s var(--ease);
}
.support-card a:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(201,169,97,.3)}

/* ── Content area ── */
.aide-content{padding:32px 40px}
@media(max-width:860px){.aide-content{padding:20px 16px}}
.aide-content h2{
  font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;
  margin-bottom:24px;color:var(--text);
}

/* ── Accordion ── */
.faq-item{
  border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:10px;overflow:hidden;
  transition:border-color .3s var(--ease);
}
.faq-item.open{border-color:var(--border-hover)}
.faq-question{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border:none;background:var(--bg-card);
  color:var(--text);font-size:.95rem;font-family:inherit;font-weight:500;
  cursor:pointer;text-align:left;transition:all .25s var(--ease);gap:12px;
}
.faq-question:hover{background:var(--bg-card-hover)}
.faq-item.open .faq-question{color:var(--gold)}
.faq-chevron{
  flex-shrink:0;width:20px;height:20px;transition:transform .35s var(--ease);
  color:var(--text-muted);
}
.faq-item.open .faq-chevron{transform:rotate(180deg);color:var(--gold)}
.faq-answer{
  max-height:0;overflow:hidden;transition:max-height .4s var(--ease);
}
.faq-answer-inner{
  padding:0 22px 20px;color:var(--text-dim);font-size:.9rem;line-height:1.7;
}
.faq-answer-inner strong{color:var(--text);font-weight:600}
.faq-answer-inner ul{margin:8px 0 8px 20px}
.faq-answer-inner li{margin-bottom:4px}

/* ── No results ── */
.no-results{
  text-align:center;padding:60px 20px;color:var(--text-muted);
  font-size:.95rem;display:none;
}

/* ── Floating help button ── */
.floating-help{
  position:fixed;bottom:32px;right:32px;width:52px;height:52px;
  border-radius:50%;background:linear-gradient(135deg,#c9a961,#e8c77b);
  color:#0a0a0f;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:700;text-decoration:none;
  box-shadow:0 8px 30px rgba(201,169,97,.3);z-index:100;
  transition:all .4s cubic-bezier(.16,1,.3,1);
}
.floating-help:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 12px 40px rgba(201,169,97,.5);
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}
</style>
</head>

/* ── State ── */
let currentCat = 'premiers-pas';

/* ── Render FAQ ── */
function renderFAQ(category, filter) {
  const list = document.getElementById('faq-list');
  const noRes = document.getElementById('no-results');
  const title = document.getElementById('cat-title');

  const catBtn = document.querySelector('.cat-btn[data-cat="' + category + '"]');
  title.textContent = catBtn ? catBtn.textContent : 'Résultats';

  let items = FAQ_DATA[category] || [];
  if (filter) {
    const q = filter.toLowerCase();
    // When searching, search ALL categories
    items = [];
    Object.values(FAQ_DATA).forEach(function(catItems) {
      catItems.forEach(function(item) {
        if (item.q.toLowerCase().indexOf(q) !== -1 || item.a.toLowerCase().indexOf(q) !== -1) {
          items.push(item);
        }
      });
    });
    title.textContent = 'Résultats de recherche';
  }

  if (items.length === 0) {
    list.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  list.innerHTML = items.map(function(item, i) {
    return '<div class="faq-item" data-idx="' + i + '">' +
      '<button class="faq-question" aria-expanded="false">' +
        '<span>' + item.q + '</span>' +
        '<svg class="faq-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
      '</button>' +
      '<div class="faq-answer"><div class="faq-answer-inner">' + item.a + '</div></div>' +
    '</div>';
  }).join('');
}

/* ── Accordion toggle ── */
document.getElementById('faq-list').addEventListener('click', function(e) {
  var btn = e.target.closest('.faq-question');
  if (!btn) return;
  var item = btn.closest('.faq-item');
  var answer = item.querySelector('.faq-answer');
  var inner = answer.querySelector('.faq-answer-inner');
  var isOpen = item.classList.contains('open');

  // Close all
  document.querySelectorAll('.faq-item.open').forEach(function(el) {
    el.classList.remove('open');
    el.querySelector('.faq-question').setAttribute('aria-expanded', 'false');
    el.querySelector('.faq-answer').style.maxHeight = '0';
  });

  if (!isOpen) {
    item.classList.add('open');
    btn.setAttribute('aria-expanded', 'true');
    answer.style.maxHeight = inner.scrollHeight + 20 + 'px';
  }
});

/* ── Category buttons ── */
document.querySelectorAll('.cat-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentCat = btn.getAttribute('data-cat');
    document.getElementById('aide-search').value = '';
    renderFAQ(currentCat);
  });
});

/* ── Search ── */
var searchTimeout;
document.getElementById('aide-search').addEventListener('input', function(e) {
  clearTimeout(searchTimeout);
  var val = e.target.value.trim();
  searchTimeout = setTimeout(function() {
    if (val.length < 2) {
      renderFAQ(currentCat);
      // Re-highlight active cat
      document.querySelectorAll('.cat-btn').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-cat') === currentCat);
      });
    } else {
      // Remove active from cats during search
      document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
      renderFAQ(currentCat, val);
    }
  }, 200);
});

/* ── Initial render ── */
renderFAQ('premiers-pas');
</script>
</body>
</html>
