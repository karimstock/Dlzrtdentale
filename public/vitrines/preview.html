<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1c">
<title>Previsualiseur — JADOMI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1c;color:#fff;font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.ph{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.85rem 1.5rem;background:#0f172a;border-bottom:1px solid rgba(201,169,97,.15);flex-shrink:0;flex-wrap:wrap}
.pt{display:flex;align-items:center;gap:.75rem}
.pt a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.9rem}
.pt a:hover{color:#c9a961}
.pt h1{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:500}
.sb{background:rgba(201,169,97,.15);color:#c9a961;padding:.2rem .6rem;border-radius:4px;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.sb.pub{background:rgba(34,197,94,.15);color:#22c55e}
.dt{display:flex;gap:.35rem;background:rgba(255,255,255,.05);padding:.25rem;border-radius:8px}
.db{background:transparent;border:none;color:rgba(255,255,255,.6);padding:.45rem .9rem;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .2s;display:flex;align-items:center;gap:.35rem}
.db:hover{color:#fff}
.db.active{background:#c9a961;color:#0f172a;font-weight:600}
.db .ico{font-size:1.1rem}
.pa{display:flex;gap:.6rem}
.ab{padding:.5rem .9rem;border-radius:6px;text-decoration:none;font-size:.85rem;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:transparent;color:#fff;transition:all .2s;font-family:inherit}
.ab:hover{background:rgba(255,255,255,.08)}
.ab.pri{background:#c9a961;color:#0f172a;border-color:#c9a961}
.ab.pri:hover{box-shadow:0 4px 12px rgba(201,169,97,.3);transform:translateY(-1px)}
.ps{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:1.5rem;overflow:auto;background:#0a0f1c}
.df{background:#fff;box-shadow:0 20px 60px rgba(0,0,0,.5);transition:all .4s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.df.desktop{width:100%;max-width:1400px;height:100%;border-radius:6px}
.df.tablet{width:820px;height:1100px;max-height:calc(100vh - 100px);border-radius:20px;border:10px solid #1a1a1a}
.df.mobile{width:390px;height:844px;max-height:calc(100vh - 100px);border-radius:36px;border:10px solid #1a1a1a;position:relative}
.df.mobile::before{content:'';position:absolute;top:8px;left:50%;transform:translateX(-50%);width:80px;height:5px;background:#333;border-radius:3px;z-index:1}
.df iframe{width:100%;height:100%;border:none;border-radius:inherit}
.sp{position:fixed;top:70px;right:1.5rem;background:#1e293b;padding:1.5rem;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5);display:none;z-index:100;min-width:300px;border:1px solid rgba(201,169,97,.2)}
.sp.open{display:block}
.sp h3{font-family:'Syne',sans-serif;margin-bottom:1rem;font-size:1rem}
.su{background:rgba(0,0,0,.3);padding:.6rem .8rem;border-radius:6px;font-family:monospace;font-size:.8rem;margin-bottom:1rem;word-break:break-all}
.sbs{display:flex;flex-wrap:wrap;gap:.4rem}
.sbb{flex:1;min-width:130px;padding:.5rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.82rem;text-align:center}
.sbb:hover{background:rgba(201,169,97,.1);border-color:#c9a961}
.toast{position:fixed;bottom:2rem;left:50%;transform:translate(-50%,80px);background:#c9a961;color:#0f172a;padding:.75rem 1.5rem;border-radius:8px;font-weight:600;z-index:10000;transition:transform .4s cubic-bezier(.16,1,.3,1)}
.toast.show{transform:translate(-50%,0)}
@media(max-width:900px){
  .ph{padding:.6rem 1rem}
  .dt{order:3;width:100%;justify-content:center}
  .db span{display:none}
  .pa{order:2}
  .df.tablet{width:100%;max-width:820px;transform-origin:top center}
  .df.mobile{width:100%;max-width:390px;transform-origin:top center}
  .ps{padding:.75rem}
}
@media(max-width:500px){
  .pa .ab:not(.pri){display:none}
  .pt h1{font-size:.9rem}
}
</style>
</head>
<body>
<div class="ph">
  <div class="pt">
    <a href="javascript:history.back()">&larr;</a>
    <h1 id="sn">Chargement...</h1>
    <span class="sb" id="badge">...</span>
  </div>
  <div class="dt">
    <button class="db active" data-d="desktop" onclick="sd('desktop')"><span class="ico">&#128421;</span> <span>Desktop</span></button>
    <button class="db" data-d="tablet" onclick="sd('tablet')"><span class="ico">&#128241;</span> <span>Tablette</span></button>
    <button class="db" data-d="mobile" onclick="sd('mobile')"><span class="ico">&#128241;</span> <span>Mobile</span></button>
  </div>
  <div class="pa">
    <button class="ab" onclick="ts()">Partager</button>
    <a class="ab" id="orl" target="_blank">Ouvrir</a>
    <a class="ab pri" href="" id="edit-link">Modifier</a>
  </div>
</div>
<div class="ps"><div class="df desktop" id="frame"><iframe id="ifr" src="about:blank"></iframe></div></div>
<div class="sp" id="sp">
  <h3>Partager votre site</h3>
  <div class="su" id="surl"></div>
  <div class="sbs">
    <button class="sbb" onclick="cl()">Copier</button>
    <button class="sbb" onclick="sw()">WhatsApp</button>
    <button class="sbb" onclick="se()">Email</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var p=new URLSearchParams(location.search),siteId=p.get('siteId');
var purl='/site/preview-'+siteId;
document.getElementById('ifr').src=purl;
document.getElementById('orl').href=purl;
document.getElementById('surl').textContent=location.origin+purl;
document.getElementById('edit-link').href='/public/vitrines/edit.html?siteId='+siteId;
fetch('/api/vitrines/public/site/preview-'+siteId).then(function(r){return r.json()}).then(function(d){
  if(d.site){
    document.getElementById('sn').textContent=d.site.societe_nom||'Mon site';
    var b=document.getElementById('badge');
    if(d.site.status==='published'){b.textContent='Publie';b.classList.add('pub')}else{b.textContent='Brouillon'}
  }
}).catch(function(){});
function sd(dv){document.getElementById('frame').className='df '+dv;document.querySelectorAll('.db').forEach(function(b){b.classList.toggle('active',b.dataset.d===dv)})}
function ts(){document.getElementById('sp').classList.toggle('open')}
function cl(){navigator.clipboard.writeText(document.getElementById('surl').textContent);toast('Lien copie')}
function sw(){window.open('https://wa.me/?text='+encodeURIComponent('Mon site : '+location.origin+purl),'_blank')}
function se(){location.href='mailto:?subject=Mon%20site&body='+encodeURIComponent(location.origin+purl)}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
document.addEventListener('click',function(e){var sp=document.getElementById('sp');if(sp.classList.contains('open')&&!sp.contains(e.target)&&!e.target.closest('.ab'))sp.classList.remove('open')});
</script>
</body>
</html>
