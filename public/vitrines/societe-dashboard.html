<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JADOMI — Mon site internet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/jadomi-theme.css">
  <style>
    body { font-family:'DM Sans','Inter',sans-serif; background:#0a0f1e; color:#f8fafc; margin:0; }
    .dash-header { padding:1.5rem 2rem; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.06); }
    .dash-header h1 { font-family:'Syne',sans-serif; font-size:1.5rem; margin:0; }
    .dash-header .back { color:#94a3b8; text-decoration:none; font-size:0.9rem; }
    .dash-header .back:hover { color:#c9a961; }
    .dash-status { display:flex; align-items:center; gap:1rem; }
    .dash-status .badge { padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:600; }
    .badge-draft { background:rgba(251,191,36,0.15); color:#fbbf24; }
    .badge-published { background:rgba(34,197,94,0.15); color:#22c55e; }
    .dash-url { font-size:0.85rem; color:#94a3b8; }
    .dash-url a { color:#c9a961; text-decoration:none; }

    .quick-actions { display:flex; gap:0.75rem; padding:1.5rem 2rem 0; flex-wrap:wrap; }
    .qa-btn { padding:0.6rem 1.2rem; border-radius:10px; font-size:0.88rem; font-weight:600; cursor:pointer; text-decoration:none; border:none; transition:all 0.2s; display:inline-flex; align-items:center; gap:6px; }
    .qa-primary { background:#c9a961; color:#0a0f1e; }
    .qa-primary:hover { background:#e0c47a; }
    .qa-secondary { background:rgba(255,255,255,0.06); color:#f8fafc; border:1px solid rgba(255,255,255,0.1); }
    .qa-secondary:hover { background:rgba(255,255,255,0.1); border-color:rgba(201,169,97,0.3); }

    .dash-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1.25rem; padding:1.5rem 2rem 3rem; }
    .dash-card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:1.5rem; transition:border-color 0.3s,box-shadow 0.3s; }
    .dash-card:hover { border-color:rgba(201,169,97,0.2); box-shadow:0 4px 20px rgba(0,0,0,0.2); }
    .dash-card h3 { font-family:'Syne',sans-serif; font-size:1.05rem; margin:0 0 1rem; color:#f8fafc; }
    .dash-card p { font-size:0.88rem; color:#94a3b8; margin:0 0 1rem; line-height:1.5; }
    .dash-card.full-width { grid-column:1/-1; }

    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
    .stat-box { text-align:center; padding:1rem; background:rgba(255,255,255,0.03); border-radius:12px; }
    .stat-num { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:700; color:#c9a961; display:block; }
    .stat-lbl { font-size:0.78rem; color:#94a3b8; margin-top:4px; }

    .photo-thumbs { display:flex; gap:0.5rem; margin:1rem 0; overflow:hidden; }
    .photo-thumbs img { width:60px; height:60px; object-fit:cover; border-radius:8px; border:1px solid rgba(255,255,255,0.08); }

    .section-checklist { list-style:none; padding:0; margin:0 0 1rem; }
    .section-checklist li { padding:6px 0; font-size:0.88rem; color:#94a3b8; display:flex; align-items:center; gap:8px; }
    .section-checklist .ok { color:#22c55e; }
    .section-checklist .warn { color:#fbbf24; }

    .meta-list { list-style:none; padding:0; margin:0 0 1rem; }
    .meta-list li { padding:5px 0; font-size:0.88rem; color:#94a3b8; }
    .meta-list .missing { color:#fbbf24; }

    .contact-list { list-style:none; padding:0; margin:0 0 1rem; }
    .contact-list li { padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.85rem; }
    .contact-list .ct-name { color:#f8fafc; font-weight:600; }
    .contact-list .ct-date { color:#64748b; font-size:0.75rem; }

    .seo-bar { height:8px; background:rgba(255,255,255,0.06); border-radius:4px; margin:1rem 0; overflow:hidden; }
    .seo-bar-fill { height:100%; background:linear-gradient(90deg,#c9a961,#22c55e); border-radius:4px; transition:width 0.5s; }

    .module-teaser { background:rgba(201,169,97,0.05); border:1px solid rgba(201,169,97,0.15); border-radius:12px; padding:1.25rem; margin-bottom:1rem; }
    .module-teaser strong { color:#f8fafc; font-size:0.95rem; }
    .module-teaser p { font-size:0.82rem; margin:0.5rem 0; }
    .module-teaser .price { color:#c9a961; font-weight:700; font-size:0.9rem; }
    .module-teaser button { background:rgba(201,169,97,0.15); color:#c9a961; border:1px solid rgba(201,169,97,0.3); padding:0.4rem 1rem; border-radius:8px; cursor:pointer; font-size:0.82rem; margin-left:1rem; }

    .card-link { display:inline-block; margin-top:0.75rem; color:#c9a961; font-size:0.88rem; font-weight:600; text-decoration:none; }
    .card-link:hover { text-decoration:underline; }

    .preview-iframe { width:100%; height:300px; border:none; border-radius:12px; background:#fff; }

    @media(max-width:900px) { .dash-grid { grid-template-columns:1fr; } .stats-row { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:500px) { .stats-row { grid-template-columns:1fr; } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="loading" style="text-align:center;padding:20vh 2rem">Chargement...</div>
  <div id="app" style="display:none">
    <div class="dash-header">
      <div>
        <a href="javascript:history.back()" class="back">&larr; Retour</a>
        <h1 id="dash-title">Mon site internet</h1>
        <div class="dash-status">
          <span class="badge" id="dash-badge">Brouillon</span>
          <span class="dash-url" id="dash-url"></span>
        </div>
      </div>
    </div>
    <div class="quick-actions" id="quick-actions"></div>
    <div class="dash-grid" id="dash-grid"></div>
  </div>

  <script>
    var SUPABASE_URL = 'https://vsbomwjzehnfinfjvhqp.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzYm9td2p6ZWhuZmluZmp2aHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzM3NTE4NDQsImV4cCI6MjA0OTMyNzg0NH0.sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
    var db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    var societeId = new URLSearchParams(window.location.search).get('societeId') || localStorage.getItem('societe_active_id');

    async function getToken() {
      var s = await db.auth.getSession();
      if (!s.data.session) { window.location.href='/login.html'; return null; }
      return s.data.session.access_token;
    }

    async function api(path, opts) {
      opts = opts || {};
      var token = await getToken();
      if (!token) return null;
      var h = { 'Content-Type':'application/json', 'Authorization':'Bearer '+token, 'X-Societe-Id':societeId };
      if (opts.headers) Object.assign(h, opts.headers);
      var r = await fetch('/api/vitrines'+path, Object.assign({}, opts, { headers:h }));
      if (r.status===401) { var ref=await db.auth.refreshSession(); if(ref.data&&ref.data.session){h['Authorization']='Bearer '+ref.data.session.access_token;r=await fetch('/api/vitrines'+path,Object.assign({},opts,{headers:h}));} }
      return r.json();
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function load() {
      var data = await api('/dashboard/site');
      if (!data || !data.success) { document.getElementById('loading').textContent='Erreur de chargement'; return; }

      document.getElementById('loading').style.display='none';
      document.getElementById('app').style.display='block';

      if (!data.has_site) {
        document.getElementById('dash-title').textContent='Mon site internet';
        document.getElementById('dash-badge').textContent='Pas encore cree';
        document.getElementById('dash-badge').className='badge badge-draft';
        document.getElementById('quick-actions').innerHTML='<a href="/public/vitrines/onboarding.html" class="qa-btn qa-primary">Creer mon site internet</a>';
        document.getElementById('dash-grid').innerHTML='<div class="dash-card full-width" style="text-align:center;padding:4rem"><h3>Bienvenue</h3><p>Creez votre site internet professionnel en quelques minutes avec notre assistant IA.</p></div>';
        return;
      }

      var site = data.site;
      var isPublished = site.status==='published';

      document.getElementById('dash-title').textContent='Mon site internet — '+esc(site.slug);
      document.getElementById('dash-badge').textContent=isPublished?'En ligne':'Brouillon';
      document.getElementById('dash-badge').className='badge '+(isPublished?'badge-published':'badge-draft');
      document.getElementById('dash-url').innerHTML=isPublished
        ? 'URL : <a href="/site/'+site.slug+'" target="_blank">'+site.slug+'.jadomi.fr</a>'
        : '';

      // Quick actions
      var qa = '';
      qa += '<a href="/site/preview-'+site.id+'" target="_blank" class="qa-btn qa-secondary">Voir mon site</a>';
      if (isPublished) {
        qa += '<button class="qa-btn qa-primary" onclick="republish()">Republier les modifications</button>';
      } else {
        qa += '<button class="qa-btn qa-primary" onclick="publish()">Publier mon site</button>';
      }
      qa += '<a href="/public/vitrines/onboarding.html?siteId='+site.id+'" class="qa-btn qa-secondary">Modifier par conversation</a>';
      document.getElementById('quick-actions').innerHTML=qa;

      // Load stats
      var stats = await api('/dashboard/stats/'+site.id);
      var contacts = null;
      try { contacts = await api('/dashboard/contacts/'+site.id+'?limit=5'); } catch(e){}

      // Build grid
      var grid = '';

      // Card 1: Preview
      grid += '<div class="dash-card full-width"><h3>Apercu du site</h3>'
        +'<iframe src="/site/preview-'+site.id+'" class="preview-iframe"></iframe>'
        +'<a href="/site/preview-'+site.id+'" target="_blank" class="card-link">Ouvrir en plein ecran &rarr;</a></div>';

      // Card 2: Stats
      if (stats && stats.success) {
        grid += '<div class="dash-card"><h3>Statistiques (30 jours)</h3><div class="stats-row">'
          +'<div class="stat-box"><span class="stat-num">'+stats.visites+'</span><span class="stat-lbl">Visites</span></div>'
          +'<div class="stat-box"><span class="stat-num">'+stats.demandes_contact+'</span><span class="stat-lbl">Demandes</span></div>'
          +'<div class="stat-box"><span class="stat-num">'+stats.clics_telephone+'</span><span class="stat-lbl">Appels</span></div>'
          +'<div class="stat-box"><span class="stat-num">'+stats.taux_conversion+'%</span><span class="stat-lbl">Conversion</span></div>'
          +'</div></div>';
      }

      // Card 3: Photos
      grid += '<div class="dash-card"><h3>Mes photos ('+data.media_count+')</h3>'
        +'<p>Ajoutez, re-categorisez vos photos pour ameliorer votre site.</p>'
        +'<a href="/public/vitrines/edit.html?siteId='+site.id+'" class="card-link">Gerer mes photos &rarr;</a></div>';

      // Card 4: Content
      grid += '<div class="dash-card"><h3>Contenu & textes</h3>'
        +'<ul class="section-checklist">'
        +(data.sections||[]).map(function(s){return '<li><span class="'+(s.visible?'ok':'warn')+'">'+(s.visible?'&#10003;':'&#9888;')+'</span> '+esc(s.type)+'</li>';}).join('')
        +'</ul>'
        +'<a href="/public/vitrines/edit.html?siteId='+site.id+'" class="card-link">Modifier les textes &rarr;</a></div>';

      // Card 5: Meta info
      var mc = data.meta_completion;
      grid += '<div class="dash-card"><h3>Infos du cabinet ('+mc.done+'/'+mc.total+')</h3>'
        +'<ul class="meta-list">'
        +['adresse','telephone','email','horaires'].map(function(f){
          var val = site[f];
          return '<li>'+(val?'&#10003; '+esc(f)+' : '+esc(val):'<span class="missing">&#9888; '+esc(f)+' : a completer</span>')+'</li>';
        }).join('')
        +'</ul>'
        +'<a href="/public/vitrines/mes-infos.html" class="card-link">Completer mes infos &rarr;</a></div>';

      // Card 6: Contacts
      if (contacts && contacts.success) {
        var ct = contacts.contacts||[];
        grid += '<div class="dash-card"><h3>Demandes recues'+(data.contact_requests_new?' ('+data.contact_requests_new+' nouvelles)':'')+'</h3>';
        if (ct.length) {
          grid += '<ul class="contact-list">'+ct.map(function(c){return '<li><span class="ct-name">'+esc(c.name)+'</span> — '+esc(c.motif||'Message')+' <span class="ct-date">'+new Date(c.created_at).toLocaleDateString('fr-FR')+'</span></li>';}).join('')+'</ul>';
        } else {
          grid += '<p>Aucune demande pour le moment.</p>';
        }
        grid += '</div>';
      }

      // Card 7: SEO
      if (data.seo) {
        grid += '<div class="dash-card"><h3>Referencement Google</h3>'
          +'<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem"><span style="font-family:Syne;font-size:2rem;color:#c9a961;font-weight:700">'+data.seo.score+'</span><span style="color:#94a3b8;font-size:0.85rem">/ 100</span></div>'
          +'<div class="seo-bar"><div class="seo-bar-fill" style="width:'+data.seo.score+'%"></div></div>'
          +'<ul class="section-checklist">'
          +data.seo.checks.map(function(c){return '<li><span class="'+(c.ok?'ok':'warn')+'">'+(c.ok?'&#10003;':'&#9888;')+'</span> '+esc(c.label)+'</li>';}).join('')
          +'</ul></div>';
      }

      // Card 8: Modules premium
      grid += '<div class="dash-card full-width"><h3>Modules premium disponibles</h3>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">'
        +'<div class="module-teaser"><strong>Chatbot IA Patient 24/7</strong><p>Votre assistant IA repond aux patients jour et nuit.</p><span class="price">+49&euro;/mois</span><button disabled>Bientot</button></div>'
        +'<div class="module-teaser"><strong>Simulateur de sourire IA</strong><p>Vos patients voient leur resultat avant le devis.</p><span class="price">+79&euro;/mois</span><button disabled>Bientot</button></div>'
        +'</div></div>';

      document.getElementById('dash-grid').innerHTML=grid;
    }

    async function publish() {
      var data = await api('/dashboard/site');
      if (!data||!data.has_site) return;
      if (!confirm('Publier votre site ?')) return;
      var r = await api('/publish',{method:'POST',body:JSON.stringify({siteId:data.site.id})});
      if (r&&r.success) { alert('Site publie ! URL : '+r.public_url); load(); }
      else alert(r?r.error:'Erreur');
    }

    async function republish() {
      var data = await api('/dashboard/site');
      if (!data||!data.has_site) return;
      if (!confirm('Republier avec les derniers changements ?')) return;
      var r = await api('/publish',{method:'POST',body:JSON.stringify({siteId:data.site.id})});
      if (r&&r.success) { alert('Site mis a jour.'); load(); }
      else alert(r?r.error:'Erreur');
    }

    load();
  </script>
</body>
</html>
