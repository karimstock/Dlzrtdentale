<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#be185d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JADOMI Labo" />
  <meta name="description" content="Portail prothesiste professionnel - Communication cabinet dentaire" />

  <title>JADOMI Labo</title>

  <link rel="manifest" href="/labo-pro/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/labo-pro/css/main.css" />

  <style>
    /* Critical inline — prevent FOUC */
    body { background: #0a0a0f; }
    .app-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0f;
      transition: opacity .4s ease;
    }
    .app-splash.fade-out { opacity: 0; pointer-events: none; }
    .app-splash-logo {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #be185d, #9d174d);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      animation: splashPulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 30px rgba(190, 24, 93, .3);
    }
    .app-splash-logo span {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 26px; color: #fff;
    }
    .app-splash-text {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 18px; color: #f0f0f5;
    }
    .app-splash-sub {
      font-family: 'Inter', sans-serif; font-weight: 500;
      font-size: 12px; color: #55556a; margin-top: 4px;
      letter-spacing: .08em; text-transform: uppercase;
    }
    @keyframes splashPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div class="app-splash" id="splash">
    <div class="app-splash-logo"><span>L</span></div>
    <div class="app-splash-text">JADOMI Labo</div>
    <div class="app-splash-sub">Espace Prothesiste</div>
  </div>

  <!-- App Shell -->
  <div id="app">

    <!-- Header -->
    <header id="app-header" class="hidden">
      <div class="labo-logo">L</div>
      <span class="labo-name" id="labo-name">JADOMI Labo</span>
      <span class="header-badge">Pro</span>
    </header>

    <!-- Main Content -->
    <main id="app-content"></main>

    <!-- Bottom Navigation -->
    <nav id="app-nav" class="hidden">
      <button class="nav-item" data-route="/mes-cas" aria-label="Mes cas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>
        <span>Mes Cas</span>
      </button>

      <button class="nav-item" data-route="/mes-cas" aria-label="Photos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>Photos</span>
      </button>

      <button class="nav-item" data-route="/mes-cas" aria-label="Messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <span>Messages</span>
      </button>

      <button class="nav-item" data-route="/profil" aria-label="Profil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Profil</span>
      </button>
    </nav>

  </div>

  <!-- Scripts -->
  <script src="/labo-pro/js/api.js"></script>
  <script src="/labo-pro/js/router.js"></script>
  <script src="/labo-pro/js/pages/login.js"></script>
  <script src="/labo-pro/js/pages/mes-cas.js"></script>
  <script src="/labo-pro/js/pages/case-detail.js"></script>
  <script src="/labo-pro/js/pages/profil.js"></script>

  <script>
    /* ── App Init ─────────────────────────── */
    (function () {
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/labo-pro/sw.js')
          .then((reg) => console.log('[SW] Registered:', reg.scope))
          .catch((err) => console.warn('[SW] Registration failed:', err));
      }

      // Set labo name from localStorage
      try {
        const labo = JSON.parse(localStorage.getItem('jadomi_labo') || '{}');
        if (labo.nom) {
          const nameEl = document.getElementById('labo-name');
          if (nameEl) nameEl.textContent = labo.nom;
        }
      } catch {}

      // Auto-login for demo: set a fake token so the demo works
      if (!LaboAPI.isAuthenticated()) {
        // Set demo token so users can explore
        LaboAPI.setToken('demo-labo-token');
        localStorage.setItem('jadomi_labo', JSON.stringify({
          nom: 'Laboratoire Precision Dentaire',
          email: 'contact@precision-dentaire.fr',
          specialites: ['Ceramique', 'Zircone', 'CFAO'],
        }));
      }

      // Nav click handlers
      document.querySelectorAll('.nav-item').forEach((item) => {
        item.addEventListener('click', () => {
          const route = item.dataset.route;
          if (route) Router.navigate(route);
        });
      });

      // Dismiss splash and init router
      window.addEventListener('DOMContentLoaded', () => {
        Router.init();

        // Fade out splash
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 400);
          }
        }, 800);
      });
    })();
  </script>

</body>
</html>
