<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JADOMI" />
  <meta name="description" content="Votre espace patient securise - Rendez-vous, chat, documents" />

  <title>JADOMI Patient</title>

  <link rel="manifest" href="/patient/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/patient/css/main.css" />

  <style>
    /* Critical inline — prevent FOUC */
    body { background: #0a0a0f; }
    .app-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0f;
      transition: opacity .4s ease;
    }
    .app-splash.fade-out { opacity: 0; pointer-events: none; }
    .app-splash-logo {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #0d9488, #115e59);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      animation: splashPulse 1.5s ease-in-out infinite;
    }
    .app-splash-logo span {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 26px; color: #fff;
    }
    .app-splash-text {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 18px; color: #f0f0f5;
    }
    @keyframes splashPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div class="app-splash" id="splash">
    <div class="app-splash-logo"><span>J</span></div>
    <div class="app-splash-text">JADOMI</div>
  </div>

  <!-- App Shell -->
  <div id="app">

    <!-- Header -->
    <header id="app-header" class="hidden">
      <div class="cabinet-logo">J</div>
      <span class="cabinet-name" id="cabinet-name">JADOMI Patient</span>
    </header>

    <!-- Main Content -->
    <main id="app-content"></main>

    <!-- Bottom Navigation -->
    <nav id="app-nav" class="hidden">
      <button class="nav-item" data-route="/mes-rdv" aria-label="Mes rendez-vous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
          <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        <span>Mes RDV</span>
      </button>

      <button class="nav-item" data-route="/chat" aria-label="Chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <span>Chat</span>
      </button>

      <button class="nav-item" data-route="/chat-ia" aria-label="Assistant IA">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z"/>
          <path d="M6 10v1a6 6 0 0012 0v-1"/>
          <path d="M12 18v4M8 22h8"/>
        </svg>
        <span>IA</span>
      </button>

      <button class="nav-item" data-route="/mon-equipe" aria-label="Mon equipe de soins">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span>Equipe</span>
      </button>

      <button class="nav-item" data-route="/profil" aria-label="Profil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Profil</span>
      </button>
    </nav>

  </div>

  <!-- Scripts -->
  <script src="/patient/js/api.js"></script>
  <script src="/patient/js/router.js"></script>
  <script src="/patient/js/pages/login.js"></script>
  <script src="/patient/js/pages/mes-rdv.js"></script>
  <script src="/patient/js/pages/chat.js"></script>
  <script src="/patient/js/pages/chat-ia.js"></script>
  <script src="/patient/js/pages/documents.js"></script>
  <script src="/patient/js/pages/mon-equipe.js"></script>
  <script src="/patient/js/pages/profil.js"></script>

  <script>
    /* ── App Init ─────────────────────────── */
    (function () {
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/patient/sw.js')
          .then((reg) => console.log('[SW] Registered:', reg.scope))
          .catch((err) => console.warn('[SW] Registration failed:', err));
      }

      // Nav click handlers
      document.querySelectorAll('.nav-item').forEach((item) => {
        item.addEventListener('click', () => {
          const route = item.dataset.route;
          if (route) Router.navigate(route);
        });
      });

      // Dismiss splash and init router
      window.addEventListener('DOMContentLoaded', () => {
        Router.init();

        // Fade out splash
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 400);
          }
        }, 600);
      });
    })();
  </script>

</body>
</html>
