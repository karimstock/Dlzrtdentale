<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#c8f060"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="JADOMI"><title>JADOMI — Gestion de stock dentaire</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f0e0d;--surface:#1a1917;--surface2:#242220;--border:#2e2c29;
  --text:#f0ede8;--muted:#6b6760;--accent:#c8f060;--accent-dark:#8fb840;
  --amber:#f0a030;--amber-l:#2a1f0a;--red:#f05050;--red-l:#2a0f0f;
  --blue:#60a8f0;--blue-l:#0a1525;--purple:#a060f0;--purple-l:#160a2a;
  --green:#60d090;--green-l:#0a2018;
  --font:'DM Sans',sans-serif;--font-display:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
}


body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;overflow-x:hidden;}


/* ── DESKTOP SIDEBAR LAYOUT ── */
.shell{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:50;transition:transform 0.3s;}
.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh;}


/* ── SIDEBAR ── */
.logo-wrap{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
.logo{font-family:var(--font-display);font-size:26px;font-weight:800;color:var(--accent);letter-spacing:-1px;}
.logo-tagline{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:0.5px;}


.nav{padding:16px 0;flex:1;overflow-y:auto;}
.nav-section{padding:12px 24px 4px;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;font-weight:500;}
