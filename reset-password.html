<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JADOMI — Nouveau mot de passe</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f0e0d;--surface:#1a1917;--surface2:#242220;--border:#2e2c29;--text:#f0ede8;--muted:#6b6760;--accent:#10b981;--red:#f05050;--green:#60d090;--font:'DM Sans',sans-serif;--display:'Syne',sans-serif;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;width:100%;max-width:420px;text-align:center;}
.logo{font-family:var(--display);font-size:28px;font-weight:800;color:var(--accent);letter-spacing:-1px;margin-bottom:8px;}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:28px;}
.field{margin-bottom:14px;text-align:left;}
.field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:5px;}
.field input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color 0.2s;}
.field input:focus{border-color:var(--accent);}
.btn{width:100%;padding:14px;background:var(--accent);color:#0f0e0d;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.2s;margin-top:8px;}
.btn:hover{background:#059669;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.link{font-size:13px;color:var(--muted);margin-top:20px;}
.link a{color:var(--accent);font-weight:500;text-decoration:none;}
.error{background:rgba(240,80,80,0.1);border:1px solid rgba(240,80,80,0.3);border-radius:8px;padding:10px;font-size:12px;color:#f09090;margin-bottom:12px;display:none;}
.success{background:rgba(96,208,144,0.1);border:1px solid rgba(96,208,144,0.3);border-radius:8px;padding:10px;font-size:12px;color:var(--green);margin-bottom:12px;display:none;}
.hint{font-size:11px;color:var(--muted);margin-top:4px;}
.invalid-token{padding:16px;background:rgba(240,80,80,0.08);border:1px solid rgba(240,80,80,0.3);border-radius:10px;color:#f09090;font-size:13px;line-height:1.5;}
.eye-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:6px;color:var(--muted);display:flex;align-items:center;}
.eye-btn:hover{color:var(--accent);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">JADOMI</div>
  <div class="subtitle">Nouveau mot de passe</div>

  <div class="error" id="error"></div>
  <div class="success" id="success"></div>

  <div id="token-invalid" class="invalid-token" style="display:none;">
    Le lien de reinitialisation est invalide ou a expire.<br><br>
    <a href="/login.html" style="color:var(--accent);">Retour a la connexion</a>
  </div>

  <div id="form-reset">
    <div class="field">
      <label>Nouveau mot de passe</label>
      <div style="position:relative;">
        <input type="password" id="password" placeholder="Au moins 8 caracteres" autofocus style="padding-right:42px;">
        <button type="button" class="eye-btn" id="toggle-eye-1" onclick="toggleEye('password','toggle-eye-1')" aria-label="Afficher">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <div class="hint">Minimum 8 caracteres</div>
    </div>
    <div class="field">
      <label>Confirmation</label>
      <div style="position:relative;">
        <input type="password" id="password2" placeholder="Retapez le mot de passe" onkeypress="if(event.key==='Enter')reinitialiser()" style="padding-right:42px;">
        <button type="button" class="eye-btn" id="toggle-eye-2" onclick="toggleEye('password2','toggle-eye-2')" aria-label="Afficher">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <button class="btn" id="btn-submit" onclick="reinitialiser()">Changer le mot de passe</button>
  </div>

  <div class="link"><a href="/login.html">← Retour a la connexion</a></div>
</div>

<script>
const SUPABASE_URL='https://vsbomwjzehnfinfjvhqp.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_RcfR0_sq5Z-oWK97ij27Yw_tGfur7UF';
let sb;
try { const { createClient } = supabase; sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e){}

function showError(msg){
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('success').style.display = 'none';
}
function showSuccess(msg){
  const el = document.getElementById('success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('error').style.display = 'none';
}

function toggleEye(inputId, btnId){
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  const svg = btn.querySelector('svg');
  if(input.type === 'password'){
    input.type = 'text';
    svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  } else {
    input.type = 'password';
    svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  }
}

// Recupere le token depuis le hash URL
const hashParams = new URLSearchParams(window.location.hash.substring(1));
const accessToken = hashParams.get('access_token');
const refreshToken = hashParams.get('refresh_token');
const hashError = hashParams.get('error') || hashParams.get('error_description');

(async function init(){
  if (hashError) {
    document.getElementById('form-reset').style.display = 'none';
    const ti = document.getElementById('token-invalid');
    ti.style.display = 'block';
    ti.innerHTML = 'Lien invalide ou expire : <strong>' + decodeURIComponent(hashError).replace(/\+/g,' ') + '</strong><br><br><a href="/login.html" style="color:var(--accent);">Retour a la connexion</a>';
    return;
  }
  if (!accessToken) {
    document.getElementById('form-reset').style.display = 'none';
    document.getElementById('token-invalid').style.display = 'block';
    return;
  }
  // Etablir la session a partir du token re\u00e7u par email
  try {
    if (!sb) throw new Error('Supabase non disponible');
    const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
    if (error) throw error;
  } catch(e) {
    console.warn('[reset-password] setSession:', e.message);
    document.getElementById('form-reset').style.display = 'none';
    const ti = document.getElementById('token-invalid');
    ti.style.display = 'block';
    ti.innerHTML = 'Session invalide : <strong>' + (e.message || 'erreur') + '</strong><br><br><a href="/login.html" style="color:var(--accent);">Retour a la connexion</a>';
  }
})();

async function reinitialiser(){
  const pass = document.getElementById('password').value;
  const pass2 = document.getElementById('password2').value;

  if (!pass || !pass2) { showError('Remplissez les deux champs'); return; }
  if (pass.length < 8) { showError('Le mot de passe doit faire au moins 8 caracteres'); return; }
  if (pass !== pass2) { showError('Les mots de passe ne correspondent pas'); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Mise a jour en cours...';

  try {
    if (!sb) throw new Error('Supabase non disponible');
    const { error } = await sb.auth.updateUser({ password: pass });
    if (error) throw error;

    showSuccess('Mot de passe change avec succes. Redirection...');
    setTimeout(async () => {
      try { await sb.auth.signOut(); } catch(e){}
      window.location.href = '/login.html?reset=success';
    }, 1200);
  } catch(e) {
    showError(e.message || 'Erreur lors du changement de mot de passe');
    btn.disabled = false;
    btn.textContent = 'Changer le mot de passe';
  }
}
</script>
</body>
</html>
